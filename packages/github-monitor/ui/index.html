<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/sdk/tokens.css">
  <title>GitHub</title>
  <style>
    [hidden] { display: none !important; }
    html, body { height: 100%; overflow: hidden; max-width: 100vw; }

    .app { height: 100%; display: flex; flex-direction: column; }

    /* ── Top bar: navigation + sync instrument ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      height: 38px;
      padding: 0 10px 0 10px;
      background: var(--color-chrome-high);
      border-bottom: 1px solid var(--color-rule-light);
      flex-shrink: 0;
    }
    .nav { display: flex; gap: 2px; }
    .tab {
      height: 26px;
      padding: 0 11px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      color: var(--color-ink-3);
      white-space: nowrap;
    }
    .tab:hover { background: var(--color-chrome-mid); color: var(--color-ink); }
    .tab.active { background: var(--color-accent-soft); color: var(--color-accent); }
    .tab .key { font-size: 9px; color: var(--color-ink-4); margin-left: 5px; font-weight: 400; }
    .tab.active .key { color: var(--color-accent); opacity: 0.6; }
    .spacer { flex: 1; min-width: var(--space-sm); }

    /* Sync instrument: one control, three states */
    .sync {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      height: 26px;
      padding: 0 9px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      color: var(--color-ink-3);
      white-space: nowrap;
    }
    button.sync:hover { background: var(--color-chrome-mid); color: var(--color-ink); }
    .sync .glyph { font-size: 12px; line-height: 1; }
    .sync.done { color: var(--color-add); }
    .sync.running { color: var(--color-ink-2); }
    .sync-meter { width: 72px; height: 3px; background: var(--color-rule-light); border-radius: 2px; overflow: hidden; }
    .sync-meter i { display: block; height: 100%; background: var(--color-accent); transition: width 0.3s; }
    .sync-step { max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
    .icon-btn {
      width: 28px; height: 28px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 5px;
      color: var(--color-ink-3);
      font-size: 16px;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--color-chrome-mid); color: var(--color-ink); }
    .brand {
      display: inline-flex; align-items: center; justify-content: center;
      width: 26px; height: 26px;
      border-radius: 5px;
      color: var(--color-ink-3);
      flex-shrink: 0;
    }
    .brand:hover { background: var(--color-chrome-mid); color: var(--color-ink); }

    /* Hairline progress over the content while syncing */
    .content-wrap { position: relative; flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .hairline { position: absolute; top: 0; left: 0; height: 2px; z-index: 5; background: var(--color-accent); transition: width 0.3s; pointer-events: none; }

    /* ── Contextual bar: one per view ── */
    .ctxbar {
      flex-shrink: 0;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-rule-light);
    }
    .ctx-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 36px;
      padding: 4px var(--space-md);
      flex-wrap: wrap;
    }
    .ctx-pills {
      display: flex;
      align-items: center;
      gap: 5px;
      min-height: 26px;
      padding: 3px var(--space-md);
      border-top: 1px solid var(--color-line-soft);
      flex-wrap: wrap;
      background: var(--color-chrome-high);
    }
    .count-note { font-size: 10.5px; color: var(--color-ink-4); white-space: nowrap; font-variant-numeric: tabular-nums; }
    .ctx-sep { width: 1px; height: 16px; background: var(--color-rule-light); margin: 0 2px; flex-shrink: 0; }

    /* Segmented control (All/Issues/PRs, List/Board, timeframes) */
    .seg { display: inline-flex; background: var(--color-chrome-mid); border-radius: var(--radius-sm); padding: 2px; gap: 1px; }
    .seg-btn {
      height: 20px;
      padding: 0 9px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      color: var(--color-ink-3);
      white-space: nowrap;
    }
    .seg-btn:hover { color: var(--color-ink); }
    .seg-btn.active { background: var(--color-surface); color: var(--color-ink); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }

    .search-box {
      display: flex; align-items: center; gap: 5px;
      height: 24px; padding: 0 8px;
      border-radius: var(--radius-md);
      background: var(--color-chrome-mid);
      border: 1px solid transparent;
    }
    .search-box:focus-within { border-color: var(--color-accent); background: var(--color-surface); }
    .search-box .glyph { font-size: 10px; color: var(--color-ink-4); }
    .search-input { width: 150px; background: transparent; border: none; font-size: 11px; color: var(--color-ink); outline: none; padding: 0; }
    .search-input::placeholder { color: var(--color-ink-4); }

    .select {
      font-size: 11px; color: var(--color-ink-2);
      background: var(--color-surface); border: 1px solid var(--color-rule-light);
      border-radius: var(--radius-sm); padding: 2px 6px; height: 24px; outline: none; max-width: 150px;
    }
    .select:focus { border-color: var(--color-accent); }

    /* Combobox (searchable multi-select) */
    .combo { position: relative; display: inline-flex; }
    .combo-trigger {
      display: inline-flex; align-items: center; gap: 5px;
      height: 24px; padding: 0 9px;
      border-radius: 999px;
      font-size: 11px; font-weight: 500;
      color: var(--color-ink-3);
      border: 1px solid transparent;
      background: transparent;
      white-space: nowrap;
    }
    .combo-trigger:hover { background: var(--color-chrome-mid); color: var(--color-ink); }
    .combo-trigger.has-selection { color: var(--color-accent); background: var(--color-accent-soft); }
    .combo-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 16px; height: 15px; padding: 0 4px;
      border-radius: 8px; font-size: 9px; font-weight: 600;
      background: var(--color-accent); color: var(--color-accent-ink); line-height: 1;
    }
    .combo-trigger .arrow { font-size: 8px; opacity: 0.5; margin-left: 1px; }
    .combo-drop, .menu-drop {
      position: absolute; top: calc(100% + 4px); left: 0;
      min-width: 200px; max-width: 300px;
      background: var(--color-surface);
      border: 1px solid var(--color-rule);
      border-radius: 6px;
      box-shadow: 0 4px 12px rgba(0,0,0,.18);
      z-index: 50;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .menu-drop { min-width: 180px; padding: 4px; }
    .combo-search {
      width: 100%; border: none; border-bottom: 1px solid var(--color-rule-light);
      background: transparent; font-size: 11px; color: var(--color-ink); padding: 7px 10px; outline: none;
    }
    .combo-search::placeholder { color: var(--color-ink-4); }
    .combo-list { max-height: 240px; overflow-y: auto; overscroll-behavior: contain; padding: 4px 0; }
    .combo-opt {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 10px; font-size: 11px; color: var(--color-ink-2);
    }
    .combo-opt:hover { background: var(--color-chrome-mid); }
    .combo-opt.checked { background: var(--color-accent-soft); }
    .combo-check {
      width: 13px; height: 13px; border-radius: 3px;
      border: 1.5px solid var(--color-rule);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 9px; color: transparent; background: transparent;
    }
    .combo-opt.checked .combo-check { background: var(--color-accent); border-color: var(--color-accent); color: var(--color-accent-ink); }
    .combo-opt-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .combo-opt-count { font-size: 10px; color: var(--color-ink-4); font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .menu-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 9px; border-radius: var(--radius-sm);
      font-size: 11px; color: var(--color-ink-2); white-space: nowrap;
    }
    .menu-item:hover { background: var(--color-chrome-mid); color: var(--color-ink); }
    .menu-item.active { color: var(--color-accent); }
    .menu-item.danger { color: var(--color-rem); }
    .menu-sep { height: 1px; background: var(--color-rule-light); margin: 4px 2px; }
    .menu-head { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-ink-4); padding: 4px 9px 2px; }

    /* Date dropdown */
    .date-drop {
      position: absolute; top: calc(100% + 4px); left: 0; width: 252px;
      background: var(--color-surface); border: 1px solid var(--color-rule);
      border-radius: 6px; box-shadow: 0 4px 12px rgba(0,0,0,.18);
      z-index: 50; padding: 10px; display: flex; flex-direction: column; gap: 8px;
    }
    .date-presets { display: flex; gap: 4px; flex-wrap: wrap; }
    .date-preset {
      height: 22px; padding: 0 8px; border-radius: 999px;
      font-size: 10px; font-weight: 500; color: var(--color-ink-3);
      border: 1px solid var(--color-rule-light); background: transparent;
    }
    .date-preset:hover { background: var(--color-chrome-mid); color: var(--color-ink); }
    .date-preset.active { color: var(--color-accent); background: var(--color-accent-soft); border-color: var(--color-accent); }
    .date-row { display: flex; align-items: center; gap: 6px; }
    .date-label { font-size: 10px; color: var(--color-ink-4); width: 38px; flex-shrink: 0; }
    .date-input {
      flex: 1; height: 24px; font-size: 11px; color: var(--color-ink);
      background: var(--color-surface); border: 1px solid var(--color-rule-light);
      border-radius: var(--radius-sm); padding: 0 6px; outline: none;
    }
    .date-input:focus { border-color: var(--color-accent); }

    /* Active-filter pills */
    .pill {
      display: inline-flex; align-items: center; gap: 4px;
      height: 20px; padding: 0 4px 0 8px;
      border-radius: 999px; font-size: 10px; color: var(--color-ink-2);
      background: var(--color-chrome-mid); white-space: nowrap;
    }
    .pill:hover { background: var(--color-chrome-high); }
    .pill-field { font-weight: 600; color: var(--color-ink-3); }
    .pill-x {
      display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px; border-radius: 50%;
      font-size: 11px; color: var(--color-ink-4); line-height: 1;
    }
    .pill-x:hover { background: var(--color-rem); color: var(--color-surface); }
    .pills-clear { font-size: 10px; color: var(--color-ink-4); margin-left: 4px; }
    .pills-clear:hover { color: var(--color-accent); text-decoration: underline; }

    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      height: 26px; padding: 0 12px;
      border-radius: var(--radius-sm);
      font-size: 11px; font-weight: 500; color: var(--color-ink-2);
      border: 1px solid var(--color-rule); background: var(--color-surface); white-space: nowrap;
    }
    .btn:hover { background: var(--color-chrome-mid); }
    .btn.primary { background: var(--color-accent); border-color: var(--color-accent); color: var(--color-accent-ink); }
    .btn.primary:hover { opacity: 0.92; }
    .btn.danger { color: var(--color-rem); }
    .btn:disabled { opacity: 0.5; }

    /* ── Content split ── */
    .content { flex: 1; min-height: 0; display: flex; }
    .pane { flex: 1; min-width: 0; overflow-y: auto; overflow-x: hidden; overscroll-behavior: contain; }

    /* ── Activity feed ── */
    .feed { padding: 0 var(--space-md) var(--space-md); }
    .feed-day {
      font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--color-ink-4);
      padding: var(--space-md) 0 4px; position: sticky; top: 0;
      background: var(--color-surface); z-index: 2;
    }
    .feed-row { display: flex; gap: var(--space-sm); padding: 4px 0; font-size: 12px; align-items: baseline; border-bottom: 1px solid var(--color-line-soft); }
    .feed-row:hover { background: var(--color-chrome-mid); }
    .feed-time { font-family: var(--font-mono); font-size: 9.5px; color: var(--color-ink-4); width: 40px; flex-shrink: 0; }
    .feed-glyph { width: 16px; flex-shrink: 0; font-size: 11px; text-align: center; color: var(--color-ink-3); line-height: 1.4; }
    .feed-glyph.open { color: var(--color-add); }
    .feed-glyph.merged { color: var(--color-accent); }
    .feed-actor { font-weight: 600; color: var(--color-ink-2); flex-shrink: 0; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .feed-repo { color: var(--color-ink-3); font-size: 10px; flex-shrink: 0; font-family: var(--font-mono); }
    .feed-summary { color: var(--color-ink-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
    .feed-note { font-size: 10.5px; color: var(--color-ink-4); padding: var(--space-md) 0 0; }

    /* ── Work rows ── */
    .row {
      display: flex; align-items: center; gap: var(--space-sm);
      padding: 6px var(--space-md);
      border-bottom: 1px solid var(--color-line-soft);
      min-width: 0; max-width: 100%;
    }
    .row:hover { background: var(--color-chrome-mid); }
    .row.selected { background: var(--color-accent-tint); }
    .mark { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .mark.pr { border-radius: 2px; transform: rotate(45deg); width: 7px; height: 7px; }
    .mark.OPEN { background: var(--color-add); }
    .mark.DRAFT { background: transparent; border: 1.5px solid var(--color-ink-4); }
    .mark.MERGED { background: var(--color-accent); }
    .mark.CLOSED { background: var(--color-ink-3); }
    .row-key { font-family: var(--font-mono); font-size: 10px; color: var(--color-ink-4); flex-shrink: 0; width: 132px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .row-title { font-size: 12px; color: var(--color-ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 60px; }
    .row-labels { display: flex; gap: 4px; flex-shrink: 1; min-width: 0; overflow: hidden; }
    .label-chip {
      font-size: 9px; padding: 1px 6px; border-radius: 8px;
      border: 1px solid var(--color-rule-light); color: var(--color-ink-3);
      white-space: nowrap; display: inline-flex; align-items: center; gap: 4px;
    }
    .label-chip i { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .row-meta { font-size: 10px; color: var(--color-ink-4); flex-shrink: 0; white-space: nowrap; font-variant-numeric: tabular-nums; }
    .row-author { font-size: 10px; color: var(--color-ink-3); flex-shrink: 0; width: 88px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Board ── */
    .board { display: flex; gap: var(--space-md); padding: var(--space-md); overflow-x: auto; height: 100%; align-items: flex-start; scrollbar-width: none; }
    .board::-webkit-scrollbar { height: 0; }
    .column { width: 240px; flex-shrink: 0; display: flex; flex-direction: column; max-height: 100%; }
    .column-head { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: var(--color-ink-2); padding: 0 4px 8px; text-transform: capitalize; }
    .column-head .count { font-weight: 400; color: var(--color-ink-4); font-variant-numeric: tabular-nums; }
    .column-cards { overflow-y: auto; overscroll-behavior: contain; display: flex; flex-direction: column; gap: 6px; }
    .gcard { background: var(--color-surface); border: 1px solid var(--color-rule-light); border-radius: var(--radius-md); padding: 8px 10px; }
    .gcard:hover { border-color: var(--color-rule); background: var(--color-chrome-high); }
    .gcard.selected { border-color: var(--color-accent); }
    .gcard-key { font-family: var(--font-mono); font-size: 9px; color: var(--color-ink-4); }
    .gcard-title { font-size: 11.5px; color: var(--color-ink); margin: 2px 0 4px; }
    .gcard-meta { font-size: 9.5px; color: var(--color-ink-4); display: flex; gap: 6px; }

    /* ── People ── */
    .people { padding: var(--space-sm) var(--space-md); }
    .people-row {
      display: flex; align-items: center; gap: var(--space-md);
      padding: 8px 6px; margin: 0 -6px; border-radius: var(--radius-sm);
      border-bottom: 1px solid var(--color-line-soft);
    }
    .people-row:hover { background: var(--color-chrome-mid); }
    .monogram {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; color: var(--color-accent);
      background: var(--color-accent-soft); text-transform: uppercase;
    }
    .people-name { font-size: 12.5px; font-weight: 600; color: var(--color-ink); flex-shrink: 0; min-width: 120px; }
    .people-stats { display: flex; gap: var(--space-lg); flex: 1; min-width: 0; flex-wrap: wrap; }
    .stat { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.2; }
    .stat-num { font-size: 13px; font-weight: 600; color: var(--color-ink); font-variant-numeric: tabular-nums; }
    .stat-num.muted { color: var(--color-ink-3); }
    .stat-label { font-size: 9px; color: var(--color-ink-4); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 1px; }
    .people-meta { font-size: 10px; color: var(--color-ink-4); flex-shrink: 0; text-align: right; font-variant-numeric: tabular-nums; }

    /* ── Reports ── */
    .reports { padding: var(--space-lg) var(--space-md); max-width: 680px; }
    .r-block { margin-bottom: var(--space-lg); }
    .r-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-ink-4); margin-bottom: 7px; }
    .r-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .r-controls input[type="date"] { height: 26px; font-size: 11px; }
    .r-controls input[type="text"] { height: 26px; font-size: 11px; flex: 1; min-width: 180px; }
    .r-hint { font-size: 10.5px; margin-top: 6px; color: var(--color-ink-4); }
    .r-hint.err { color: var(--color-rem); }
    .r-eligibility { font-size: 12px; color: var(--color-ink-2); padding: 9px 11px; background: var(--color-chrome-mid); border-radius: var(--radius-sm); margin-bottom: 10px; line-height: 1.4; }
    .r-eligibility strong { color: var(--color-ink); font-weight: 600; font-variant-numeric: tabular-nums; }
    .r-eligibility.zero { color: var(--color-rem); background: rgba(192,93,60,0.06); }
    .r-eligibility.warn { color: var(--color-ink-3); }
    .r-model { display: inline-flex; align-items: center; gap: 6px; margin-left: auto; }
    .r-model-label { font-size: 9px; color: var(--color-ink-4); text-transform: uppercase; letter-spacing: 0.04em; }
    .r-running { display: inline-flex; align-items: center; gap: 7px; font-size: 11px; color: var(--color-ink-2); height: 26px; }
    .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--color-accent); animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
    .report-row {
      display: flex; align-items: baseline; gap: var(--space-sm);
      padding: 8px 6px; margin: 0 -6px; border-radius: var(--radius-sm);
      border-bottom: 1px solid var(--color-line-soft);
    }
    .report-row:hover { background: var(--color-chrome-mid); }
    .report-date { font-family: var(--font-mono); font-size: 10px; color: var(--color-ink-4); flex-shrink: 0; }
    .report-headline { font-size: 12px; color: var(--color-ink); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .report-range { font-size: 10px; color: var(--color-ink-4); flex-shrink: 0; font-variant-numeric: tabular-nums; }

    /* ── Detail panel ── */
    .detail {
      width: 336px; flex-shrink: 0;
      border-left: 1px solid var(--color-rule-light);
      overflow-y: auto; overscroll-behavior: contain;
      padding: var(--space-md); background: var(--color-chrome-high);
    }
    .detail-top { display: flex; align-items: baseline; gap: var(--space-sm); }
    .detail-key { font-family: var(--font-mono); font-size: 10px; color: var(--color-ink-4); flex: 1; }
    .detail-close { color: var(--color-ink-4); font-size: 13px; width: 22px; height: 22px; border-radius: 5px; flex-shrink: 0; }
    .detail-close:hover { background: var(--color-chrome-mid); color: var(--color-ink); }
    .detail-title { font-size: 14px; font-weight: 600; margin: 4px 0 8px; user-select: text; -webkit-user-select: text; }
    .detail-state { display: inline-flex; align-items: center; gap: 6px; font-size: 10.5px; font-weight: 500; color: var(--color-ink-2); margin-bottom: var(--space-sm); }
    .detail-grid { display: grid; grid-template-columns: 76px 1fr; gap: 4px 8px; font-size: 11px; margin: var(--space-sm) 0; }
    .detail-grid dt { color: var(--color-ink-4); }
    .detail-grid dd { color: var(--color-ink-2); user-select: text; -webkit-user-select: text; }
    .detail-body {
      font-size: 11.5px; color: var(--color-ink-2); white-space: pre-wrap;
      user-select: text; -webkit-user-select: text;
      border-top: 1px solid var(--color-rule-light); padding-top: var(--space-sm);
      margin-top: var(--space-sm); max-height: 320px; overflow-y: auto; overscroll-behavior: contain;
    }
    .detail-section { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-ink-4); padding: 12px 0 4px; }

    /* ── Status footer ── */
    .status {
      display: flex; align-items: center; gap: 6px;
      height: 26px; padding: 0 var(--space-md);
      background: var(--color-chrome-high);
      border-top: 1px solid var(--color-rule-light);
      font-size: 10.5px; color: var(--color-ink-4);
      flex-shrink: 0; white-space: nowrap; overflow: hidden;
    }
    .status .org { font-weight: 600; color: var(--color-ink-3); }
    .status .sep { opacity: 0.6; }
    .status .stat { font-variant-numeric: tabular-nums; }
    .status .stale { color: var(--color-rem); }
    .status .warn { color: var(--color-rem); }
    .status .warn:hover { text-decoration: underline; }

    /* ── Empty / setup ── */
    .empty { display: flex; align-items: center; justify-content: center; height: 100%; padding: var(--space-lg); }
    .setup-card { max-width: 400px; text-align: center; }
    .setup-card h2 { font-size: 15px; margin-bottom: 6px; }
    .setup-card p { font-size: 12px; color: var(--color-ink-3); margin-bottom: var(--space-md); }
    .empty-stack { max-width: 440px; text-align: center; color: var(--color-ink-3); font-size: 12px; }
    .empty-stack p { margin-bottom: var(--space-sm); }
    .empty-quiet { color: var(--color-ink-4); font-size: 12px; text-align: center; max-width: 420px; }
    .empty-quiet .btn { margin-top: var(--space-sm); }

    /* ── Settings modal ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(26, 26, 24, 0.25);
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 48px; z-index: 10;
    }
    .modal {
      width: 480px; max-height: calc(100vh - 96px); overflow-y: auto; overscroll-behavior: contain;
      background: var(--color-surface); border-radius: var(--radius-lg);
      border: 1px solid var(--color-rule); padding: var(--space-lg);
    }
    .modal h2 { font-size: 14px; margin-bottom: var(--space-md); }
    .field { margin-bottom: var(--space-md); }
    .field label { display: block; font-size: 11px; font-weight: 600; color: var(--color-ink-2); margin-bottom: 4px; }
    .field .hint { font-size: 10px; color: var(--color-ink-4); margin-top: 3px; }
    .field input[type="text"], .field input[type="password"], .field input[type="number"], .field textarea, .field select { width: 100%; font-size: 12px; }
    .field textarea { min-height: 56px; resize: vertical; }
    .field-row { display: flex; gap: var(--space-sm); align-items: center; }
    .field-row input { flex: 1; }
    .token-status { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--color-ink-3); margin-bottom: 6px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot.ok { background: var(--color-add); }
    .dot.bad { background: var(--color-ink-4); }
    .validation { font-size: 11px; margin-top: 6px; user-select: text; -webkit-user-select: text; }
    .validation.ok { color: var(--color-add); }
    .validation.err { color: var(--color-rem); }
    .modal-actions { display: flex; gap: var(--space-sm); justify-content: flex-end; margin-top: var(--space-lg); }
    .modal-actions .grow { flex: 1; display: flex; }

    .toast {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      background: var(--color-ink); color: var(--color-surface);
      font-size: 11.5px; padding: 7px 14px; border-radius: var(--radius-md);
      z-index: 20; max-width: 70vw;
    }

    a { color: var(--color-accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    @container (max-width: 640px) {
      .ctx-controls { gap: 4px; padding: 4px 8px; }
      .search-input { width: 90px; }
      .select { max-width: 90px; font-size: 10px; }
      .row { padding: 5px 8px; gap: 6px; }
      .row-labels { display: none; }
      .detail { max-width: 50%; }
      .status { padding: 0 8px; font-size: 10px; }
      .people-name { min-width: 90px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <a class="brand" id="org-link" href="https://github.com" target="_blank" rel="noreferrer" title="Open organization on GitHub" hidden>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
      <nav class="nav" id="nav"></nav>
      <span class="spacer"></span>
      <span id="sync-slot"></span>
      <button class="icon-btn" id="btn-settings" title="GitHub Monitor settings">⚙</button>
    </header>
    <div class="ctxbar" id="ctxbar">
      <div class="ctx-controls" id="ctx-controls"></div>
      <div class="ctx-pills" id="ctx-pills" hidden></div>
    </div>

  </div>
  <div id="modal-root"></div>
  <div id="toast-root"></div>

<script type="module">
import { runtime } from '/sdk/mim.js'

// ── Model ──────────────────────────────────────────────────────────────────
//
// Four views, each mapped to a distinct job:
//   Activity  — "what happened recently?" (live, derived + org-feed timeline)
//   Work      — "what's open / in flight?" (issues + PRs, list or board)
//   People    — "who did what? how's Jane doing?" (per-contributor stats)
//   Reports   — "write me a digest" (AI summaries)
//
// One topbar (nav + sync + settings). One contextual bar per view. A single
// coherent filter model per view — no scope/state/type overlap.

const VIEWS = [
  { id: 'activity', label: 'Activity', key: '1' },
  { id: 'work', label: 'Work', key: '2' },
  { id: 'people', label: 'People', key: '3' },
  { id: 'reports', label: 'Reports', key: '4' },
]

const WORK_PRESETS = [
  { id: 'all-open', label: 'All open', apply: { type: 'all', state: ['OPEN', 'DRAFT'], datePreset: 'any', dateFrom: '', dateTo: '' } },
  { id: 'open-issues', label: 'Open issues', apply: { type: 'issue', state: ['OPEN', 'DRAFT'], datePreset: 'any', dateFrom: '', dateTo: '' } },
  { id: 'open-prs', label: 'Open PRs', apply: { type: 'pr', state: ['OPEN', 'DRAFT'], datePreset: 'any', dateFrom: '', dateTo: '' } },
  { id: 'recently-closed', label: 'Recently closed', apply: { type: 'all', state: ['CLOSED', 'MERGED'], datePreset: '14d', dateFrom: '', dateTo: '' } },
]

const DATE_PRESETS = [
  { id: 'any', label: 'Any time' },
  { id: '7d', label: '7 days' },
  { id: '14d', label: '14 days' },
  { id: '30d', label: '30 days' },
  { id: '90d', label: '90 days' },
  { id: 'custom', label: 'Custom…' },
]

const ACTIVITY_TYPES = [
  { id: 'all', label: 'All' },
  { id: 'push', label: 'Pushes' },
  { id: 'review', label: 'Reviews' },
  { id: 'comment', label: 'Comments' },
  { id: 'issue', label: 'Issues' },
  { id: 'pr', label: 'PRs' },
  { id: 'release', label: 'Releases' },
  { id: 'other', label: 'Other' },
]

const AUTO_SYNC_AFTER_MS = 15 * 60_000

const S = {
  items: [], events: [], repos: [],
  settings: null, syncState: null, reports: [], savedViews: [],
  view: 'activity',
  work: {
    viewId: 'all-open',
    type: 'all', state: ['OPEN', 'DRAFT'],
    repo: [], author: [], label: [], projectStatus: [],
    dateField: 'updated', datePreset: 'any', dateFrom: '', dateTo: '',
    q: '', sort: 'updated', layout: 'list', groupBy: 'state',
  },
  activity: { type: 'all', repo: [], author: [], q: '' },
  people: { preset: '30d', from: '', to: '' },
  reports_form: { range: '7d', from: '', to: '', users: [], repos: [], focus: '' },
  selectedKey: null,
  tokenSet: false,
  syncing: null,
  justSynced: false,

  models: [],
  validateToolName: null,
  savingView: false,
}

const $ = (id) => document.getElementById(id)
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]))

// ── Data loading ───────────────────────────────────────────────────────────

const unwrap = (rows) => (rows || []).map((r) => (r && typeof r === 'object' && 'value' in r ? r.value : r)).filter(Boolean)

async function loadAll() {
  const [items, events, repos, settings, syncState, reports, savedViews, uiState, secretStatus] = await Promise.all([
    runtime.data.collection('items').list(),
    runtime.data.collection('events').list(),
    runtime.data.collection('repos').list(),
    runtime.data.kv.get('settings'),
    runtime.data.kv.get('syncState'),
    runtime.data.kv.get('reports'),
    runtime.data.kv.get('savedViews'),
    runtime.data.kv.get('uiState'),
    runtime.secrets.status().catch(() => []),
  ])
  S.items = unwrap(items)
  S.events = unwrap(events).sort((a, b) => (a.createdAt < b.createdAt ? 1 : -1))
  S.repos = unwrap(repos)
  S.settings = settings || null
  S.syncState = syncState || null
  S.reports = Array.isArray(reports) ? reports : []
  S.savedViews = Array.isArray(savedViews) ? savedViews : []
  S.tokenSet = (secretStatus || []).some((s) => s.name === 'github_token' && s.exists)
  if (uiState && typeof uiState === 'object') hydrateUiState(uiState)
}

function hydrateUiState(u) {
  if (typeof u.view === 'string' && VIEWS.some((v) => v.id === u.view)) S.view = u.view
  if (u.work && typeof u.work === 'object') {
    const w = u.work
    Object.assign(S.work, {
      viewId: typeof w.viewId === 'string' ? w.viewId : S.work.viewId,
      type: w.type === 'issue' || w.type === 'pr' ? w.type : 'all',
      state: Array.isArray(w.state) ? w.state : S.work.state,
      repo: Array.isArray(w.repo) ? w.repo : [],
      author: Array.isArray(w.author) ? w.author : [],
      label: Array.isArray(w.label) ? w.label : [],
      projectStatus: Array.isArray(w.projectStatus) ? w.projectStatus : [],
      dateField: w.dateField === 'created' ? 'created' : 'updated',
      datePreset: typeof w.datePreset === 'string' ? w.datePreset : 'any',
      dateFrom: typeof w.dateFrom === 'string' ? w.dateFrom : '',
      dateTo: typeof w.dateTo === 'string' ? w.dateTo : '',
      q: typeof w.q === 'string' ? w.q : '',
      sort: ['updated', 'created', 'comments'].includes(w.sort) ? w.sort : 'updated',
      layout: w.layout === 'board' ? 'board' : 'list',
      groupBy: typeof w.groupBy === 'string' ? w.groupBy : 'state',
    })
  }
  if (u.activity && typeof u.activity === 'object') {
    const a = u.activity
    Object.assign(S.activity, {
      type: typeof a.type === 'string' ? a.type : 'all',
      repo: Array.isArray(a.repo) ? a.repo : [],
      author: Array.isArray(a.author) ? a.author : [],
      q: typeof a.q === 'string' ? a.q : '',
    })
  }
  if (u.people && typeof u.people === 'object') {
    Object.assign(S.people, {
      preset: typeof u.people.preset === 'string' ? u.people.preset : '30d',
      from: typeof u.people.from === 'string' ? u.people.from : '',
      to: typeof u.people.to === 'string' ? u.people.to : '',
    })
  }
}

let uiStateTimer = null
function persistUiState() {
  clearTimeout(uiStateTimer)
  uiStateTimer = setTimeout(() => {
    runtime.data.kv.set('uiState', {
      view: S.view,
      work: S.work,
      activity: S.activity,
      people: S.people,
    }).catch(() => {})
  }, 400)
}

async function loadAuxiliary() {
  try {
    const registry = await runtime.ai.registry()
    S.models = Array.isArray(registry?.models) ? registry.models : []
  } catch { S.models = [] }
  try {
    const tools = await runtime.tools.list()
    const tool = tools.find((t) => t.packageId === 'github-monitor' && t.id === 'validateToken')
    S.validateToolName = tool?.name || null
  } catch { S.validateToolName = null }
  // The Reports model picker renders from S.models; refresh it once they land.
  if (S.view === 'reports') renderPane()
}

// ── Jobs ───────────────────────────────────────────────────────────────────
//
// Sync and summary feedback is driven by the global `package:job:event` stream,
// keyed by jobId — not per-run subscriptions. This keeps the UI honest about
// what is running regardless of who started it (auto-sync, a click, or chat)
// and survives the "click while already running" race that previously cleared
// the sync meter. Sync is single-concurrency; summary is parallel, so active
// summary runs are tracked in a set.

const activeSummaries = new Map() // runId -> { label }

function summarizing() {
  if (activeSummaries.size === 0) return null
  const entries = [...activeSummaries.values()]
  return entries[entries.length - 1]
}

function setupJobListener() {
  runtime.on('package:job:event', (event) => {
    if (!event || event.packageId !== 'github-monitor') return
    if (event.jobId === 'sync') handleSyncEvent(event)
    else if (event.jobId === 'summarize') handleSummarizeEvent(event)
  })
}

function handleSyncEvent(event) {
  if (event.type === 'job.started') {
    S.syncing = { runId: event.runId, label: event.data?.label || 'Syncing', fraction: 0 }
  } else if (event.type === 'job.step') {
    S.syncing = S.syncing
      ? { ...S.syncing, label: event.data?.name || S.syncing.label }
      : { runId: event.runId, label: event.data?.name || 'Syncing', fraction: 0 }
  } else if (event.type === 'job.progress') {
    S.syncing = S.syncing
      ? { ...S.syncing, fraction: event.data?.value ?? 0, label: event.data?.label || S.syncing.label }
      : { runId: event.runId, label: event.data?.label || 'Syncing', fraction: event.data?.value ?? 0 }
  } else if (event.type === 'job.done' || event.type === 'job.failed' || event.type === 'job.cancelled') {
    const ours = S.syncing?.runId === event.runId || !S.syncing
    S.syncing = null
    if (!ours) return
    if (event.type === 'job.failed') toast(`Sync failed: ${event.data?.error || 'unknown error'}`)
    else if (event.type === 'job.done') { S.justSynced = true; setTimeout(() => { S.justSynced = false; renderSync() }, 2500) }
    loadAll().then(render)
    return
  }
  renderSync(); renderStatus()
}

function handleSummarizeEvent(event) {
  if (event.type === 'job.started') {
    activeSummaries.set(event.runId, { label: event.data?.label || 'Summarizing' })
  } else if (event.type === 'job.step' || event.type === 'job.progress') {
    if (activeSummaries.has(event.runId)) {
      const cur = activeSummaries.get(event.runId)
      activeSummaries.set(event.runId, { label: event.data?.label || event.data?.name || cur.label })
    }
  } else if (event.type === 'job.done' || event.type === 'job.failed' || event.type === 'job.cancelled') {
    activeSummaries.delete(event.runId)
    if (event.type === 'job.failed') toast(`Summary failed: ${event.data?.error || 'unknown error'}`)
    loadAll().then(() => { if (S.view === 'reports') renderPane() })
    return
  }
  if (S.view === 'reports') renderPane()
}

async function startSync(full) {
  // A sync is already running (auto-sync, a prior click, or chat) — surface it
  // instead of erroring on "Job already running". The global listener keeps
  // the meter accurate.
  if (S.syncing) { renderSync(); return }
  try {
    const run = await runtime.jobs.start('sync', { full: !!full }, { openWork: false })
    if (!S.syncing) S.syncing = { runId: run.runId, label: full ? 'Full sync' : 'Syncing', fraction: 0 }
    renderSync(); renderStatus()
  } catch (err) {
    if (/already running/i.test(err.message)) {
      // A sync started between our idle check and the start call. Show a minimal
      // syncing state; the global listener refines it from live events.
      if (!S.syncing) S.syncing = { runId: null, label: 'Syncing', fraction: 0 }
      renderSync()
      return
    }
    toast(`Sync failed to start: ${err.message}`)
    render()
  }
}

async function startSummarize() {
  if (summarizing()) return
  const range = reportsRange()
  if (!range) { toast('Pick a valid timeframe first.'); return }
  const inputs = { from: range.from, to: range.to }
  if (S.reports_form.users.length) inputs.users = [...S.reports_form.users]
  if (S.reports_form.repos.length) inputs.repos = [...S.reports_form.repos]
  if (S.reports_form.focus.trim()) inputs.focus = S.reports_form.focus.trim()
  try {
    const run = await runtime.jobs.start('summarize', inputs, { openWork: false })
    activeSummaries.set(run.runId, { label: 'Starting' })
    renderPane()
  } catch (err) {
    toast(`Summary failed to start: ${err.message}`)
    renderPane()
  }
}

// ── Time helpers ───────────────────────────────────────────────────────────

function fmtAgo(iso) {
  if (!iso) return 'never'
  const sec = Math.max(0, (Date.now() - Date.parse(iso)) / 1000)
  if (sec < 60) return 'just now'
  if (sec < 3600) return `${Math.floor(sec / 60)}m ago`
  if (sec < 86400) return `${Math.floor(sec / 3600)}h ago`
  return `${Math.floor(sec / 86400)}d ago`
}

function isStale(iso) { return !iso || Date.now() - Date.parse(iso) > 86_400_000 }

function todayISO() { return new Date().toISOString().slice(0, 10) }
function daysAgoISO(n) { return new Date(Date.now() - n * 86_400_000).toISOString().slice(0, 10) }

function presetRange(preset, fromStr, toStr) {
  const now = new Date()
  if (preset === 'any' || !preset) return null
  if (preset === '7d') return { from: new Date(now.getTime() - 7 * 86_400_000).toISOString(), to: now.toISOString() }
  if (preset === '14d') return { from: new Date(now.getTime() - 14 * 86_400_000).toISOString(), to: now.toISOString() }
  if (preset === '30d') return { from: new Date(now.getTime() - 30 * 86_400_000).toISOString(), to: now.toISOString() }
  if (preset === '90d') return { from: new Date(now.getTime() - 90 * 86_400_000).toISOString(), to: now.toISOString() }
  if (preset === 'custom') {
    if (!fromStr || !toStr) return null
    const from = new Date(`${fromStr}T00:00:00`)
    const to = new Date(`${toStr}T23:59:59`)
    if (Number.isNaN(from.getTime()) || Number.isNaN(to.getTime()) || from > to) return null
    return { from: from.toISOString(), to: to.toISOString() }
  }
  return null
}

function fmtDateShort(iso) {
  if (!iso) return ''
  const d = new Date(iso.length === 10 ? `${iso}T00:00:00` : iso)
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
}

function fmtDay(iso) {
  if (!iso) return ''
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
}

// ── Derived data ───────────────────────────────────────────────────────────

function displayState(item) {
  if (item.mergedAt || item.state === 'MERGED') return 'MERGED'
  return item.state || 'OPEN'
}

function uniqueSorted(values) { return [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b)) }

function allPeople() {
  return uniqueSorted([
    ...S.items.flatMap((i) => [i.author, ...(i.assignees || [])]),
    ...S.events.map((e) => e.actor),
  ])
}

function repoShortName(repo) { return repo && repo.includes('/') ? repo.split('/').pop() : repo || '' }

// Unified activity timeline: org-feed events + derived item lifecycle.
// Derived open events fill history the org feed no longer covers (the feed
// only retains ~300 recent events). Open events are de-duplicated against
// feed Issues/PullRequest "opened" actions so each opening shows once.
function buildActivityFeed() {
  const openedCovered = new Set()
  for (const e of S.events) {
    const p = e.payload || {}
    const num = p.issue?.number ?? p.pull_request?.number
    if (num && (e.type === 'IssuesEvent' || e.type === 'PullRequestEvent') && /open/i.test(p.action || '')) {
      openedCovered.add(`${e.repo}#${num}`)
    }
  }
  const entries = []
  for (const e of S.events) {
    entries.push({ ts: e.createdAt, actor: e.actor, repo: e.repo, kind: 'feed', event: e })
  }
  for (const item of S.items) {
    if (item.createdAt && !openedCovered.has(item.key)) {
      entries.push({ ts: item.createdAt, actor: item.author, repo: item.repo, kind: 'opened', item })
    }
  }
  return entries.filter((e) => e.ts).sort((a, b) => (a.ts < b.ts ? 1 : -1))
}

function activityCategory(entry) {
  if (entry.kind === 'opened') return entry.item.type === 'pr' ? 'pr' : 'issue'
  const t = entry.event.type
  if (t === 'PushEvent') return 'push'
  if (t === 'PullRequestReviewEvent' || t === 'PullRequestReviewCommentEvent') return 'review'
  if (t === 'IssueCommentEvent') return 'comment'
  if (t === 'IssuesEvent') return 'issue'
  if (t === 'PullRequestEvent') return 'pr'
  if (t === 'ReleaseEvent') return 'release'
  return 'other'
}

function activityGlyph(entry) {
  const cat = activityCategory(entry)
  if (entry.kind === 'opened') return { ch: '+', cls: 'open' }
  if (cat === 'push') return { ch: '↑', cls: '' }
  if (cat === 'review') return { ch: '✓', cls: '' }
  if (cat === 'comment') return { ch: '·', cls: '' }
  if (cat === 'release') return { ch: '★', cls: 'merged' }
  if (cat === 'issue') return { ch: '●', cls: '' }
  if (cat === 'pr') return { ch: '◆', cls: entry.event.type === 'PullRequestEvent' && /merg/i.test(entry.event.summary || '') ? 'merged' : '' }
  return { ch: '·', cls: '' }
}

function activitySummary(entry) {
  if (entry.kind === 'opened') {
    const t = entry.item.type === 'pr' ? 'PR' : 'issue'
    return `opened ${t} #${entry.item.number}: ${entry.item.title}`
  }
  return entry.event.summary || entry.event.type.replace(/Event$/, '')
}

function viewActivity() {
  let entries = buildActivityFeed()
  const f = S.activity
  if (f.type !== 'all') entries = entries.filter((e) => activityCategory(e) === f.type)
  if (f.repo.length) entries = entries.filter((e) => f.repo.includes(e.repo))
  if (f.author.length) entries = entries.filter((e) => f.author.includes(e.actor))
  if (f.q) {
    const q = f.q.toLowerCase()
    entries = entries.filter((e) => (e.actor || '').toLowerCase().includes(q) || (e.repo || '').toLowerCase().includes(q) || activitySummary(e).toLowerCase().includes(q))
  }
  return entries
}

// Per-contributor stats over a range, from items (author) + events (actor).
function peopleStats(from, to) {
  const stats = new Map()
  const ensure = (login) => {
    if (!login) return null
    if (!stats.has(login)) stats.set(login, {
      login, openedIssues: 0, openedPRs: 0, mergedPRs: 0, closedIssues: 0,
      pushes: 0, reviews: 0, comments: 0, releases: 0, events: 0,
      repos: new Set(), lastActive: '',
    })
    return stats.get(login)
  }
  const inRange = (iso) => iso && iso >= from && iso <= to
  const touch = (s, iso, repo) => { if (iso > s.lastActive) s.lastActive = iso; if (repo) s.repos.add(repo) }

  for (const item of S.items) {
    const s = ensure(item.author); if (!s) continue
    if (inRange(item.createdAt)) { if (item.type === 'pr') s.openedPRs++; else s.openedIssues++; touch(s, item.createdAt, item.repo) }
    if (item.mergedAt && inRange(item.mergedAt)) { s.mergedPRs++; touch(s, item.mergedAt, item.repo) }
    else if (item.closedAt && inRange(item.closedAt)) { if (item.type === 'issue') s.closedIssues++; touch(s, item.closedAt, item.repo) }
  }
  for (const e of S.events) {
    if (!inRange(e.createdAt)) continue
    const s = ensure(e.actor); if (!s) continue
    s.events++
    if (e.type === 'PushEvent') s.pushes++
    else if (e.type === 'PullRequestReviewEvent' || e.type === 'PullRequestReviewCommentEvent') s.reviews++
    else if (e.type === 'IssueCommentEvent') s.comments++
    else if (e.type === 'ReleaseEvent') s.releases++
    touch(s, e.createdAt, e.repo)
  }
  const score = (s) => s.openedIssues + s.openedPRs + s.mergedPRs + s.closedIssues + s.events
  return [...stats.values()].filter((s) => score(s) > 0).sort((a, b) => score(b) - score(a))
}

// ── Work filtering ─────────────────────────────────────────────────────────

function workDateRange() { return presetRange(S.work.datePreset, S.work.dateFrom, S.work.dateTo) }

function workItems() {
  const f = S.work
  let rows = S.items
  if (f.type === 'issue') rows = rows.filter((i) => i.type === 'issue')
  else if (f.type === 'pr') rows = rows.filter((i) => i.type === 'pr')
  if (f.state.length) rows = rows.filter((i) => f.state.includes(displayState(i)))
  if (f.repo.length) rows = rows.filter((i) => f.repo.includes(i.repo))
  if (f.author.length) rows = rows.filter((i) => f.author.includes(i.author) || (i.assignees || []).some((a) => f.author.includes(a)))
  if (f.label.length) rows = rows.filter((i) => (i.labels || []).some((l) => f.label.includes(l.name)))
  if (f.projectStatus.length) rows = rows.filter((i) => f.projectStatus.includes(i.projectStatus || ''))
  const dr = workDateRange()
  if (dr) {
    const key = f.dateField === 'created' ? 'createdAt' : 'updatedAt'
    rows = rows.filter((i) => i[key] && i[key] >= dr.from && i[key] <= dr.to)
  }
  if (f.q) {
    const q = f.q.toLowerCase()
    rows = rows.filter((i) => i.title.toLowerCase().includes(q) || i.key.toLowerCase().includes(q) || (i.author || '').toLowerCase().includes(q) || (i.bodyExcerpt || '').toLowerCase().includes(q))
  }
  const sorters = {
    updated: (a, b) => (a.updatedAt < b.updatedAt ? 1 : -1),
    created: (a, b) => (a.createdAt < b.createdAt ? 1 : -1),
    comments: (a, b) => (b.commentCount || 0) - (a.commentCount || 0),
  }
  return [...rows].sort(sorters[f.sort] || sorters.updated)
}

function workHasActiveFilters() {
  const f = S.work
  return !!(f.q || f.type !== 'all' || f.repo.length || f.author.length || f.label.length || f.projectStatus.length || f.datePreset !== 'any' || (f.state.length && (f.state.length !== 2 || !f.state.includes('OPEN') || !f.state.includes('DRAFT'))))
}

function clearWorkFilters() {
  S.work = { viewId: 'custom', type: 'all', state: ['OPEN', 'DRAFT'], repo: [], author: [], label: [], projectStatus: [], dateField: 'updated', datePreset: 'any', dateFrom: '', dateTo: '', q: '', sort: S.work.sort, layout: S.work.layout, groupBy: S.work.groupBy }
}

function activityHasActiveFilters() {
  const f = S.activity
  return !!(f.q || f.type !== 'all' || f.repo.length || f.author.length)
}

function filterOptions() {
  // Counts computed from the base set (type filter applied, nothing else).
  const base = S.work.type === 'issue' ? S.items.filter((i) => i.type === 'issue') : S.work.type === 'pr' ? S.items.filter((i) => i.type === 'pr') : S.items
  const countBy = (items, fn) => {
    const counts = new Map()
    for (const item of items) for (const val of [].concat(fn(item))) if (val) counts.set(val, (counts.get(val) || 0) + 1)
    return counts
  }
  const map = (counts, short = false) => [...counts.entries()].sort((a, b) => a[0].localeCompare(b[0])).map(([v, c]) => ({ value: v, label: short ? repoShortName(v) : v, count: c }))
  const repoCounts = countBy(base, (i) => i.repo)
  const authorCounts = countBy(base, (i) => [i.author, ...(i.assignees || [])].filter(Boolean))
  const labelCounts = countBy(base, (i) => (i.labels || []).map((l) => l.name))
  const stateCounts = countBy(base, (i) => displayState(i))
  const statusCounts = countBy(base, (i) => i.projectStatus || '')
  return {
    repos: map(repoCounts, true),
    authors: map(authorCounts),
    labels: map(labelCounts),
    states: ['OPEN', 'DRAFT', 'MERGED', 'CLOSED'].map((s) => ({ value: s, label: s.charAt(0) + s.slice(1).toLowerCase(), count: stateCounts.get(s) || 0 })),
    statuses: map(statusCounts).filter((s) => s.value),
  }
}

function viewLabel() {
  if (S.work.viewId === 'custom') return 'Custom'
  const preset = WORK_PRESETS.find((p) => p.id === S.work.viewId)
  if (preset) return preset.label
  if (S.work.viewId.startsWith('saved:')) {
    const v = S.savedViews.find((sv) => `saved:${sv.id}` === S.work.viewId)
    if (v) return v.name
  }
  return 'Custom'
}

function applyPreset(presetId) {
  const preset = WORK_PRESETS.find((p) => p.id === presetId)
  if (!preset) return
  S.work = { ...S.work, ...preset.apply, viewId: preset.id, repo: [], author: [], label: [], projectStatus: [], q: '' }
  persistUiState()
  renderCtxbar(); renderPills(); renderPane()
}

function applySavedView(id) {
  const view = S.savedViews.find((v) => `saved:${v.id}` === id)
  if (!view?.state) return
  const w = view.state
  S.work = {
    viewId: id,
    type: w.type === 'issue' || w.type === 'pr' ? w.type : 'all',
    state: Array.isArray(w.state) ? w.state : ['OPEN', 'DRAFT'],
    repo: Array.isArray(w.repo) ? w.repo : [],
    author: Array.isArray(w.author) ? w.author : [],
    label: Array.isArray(w.label) ? w.label : [],
    projectStatus: Array.isArray(w.projectStatus) ? w.projectStatus : [],
    dateField: w.dateField === 'created' ? 'created' : 'updated',
    datePreset: typeof w.datePreset === 'string' ? w.datePreset : 'any',
    dateFrom: typeof w.dateFrom === 'string' ? w.dateFrom : '',
    dateTo: typeof w.dateTo === 'string' ? w.dateTo : '',
    q: typeof w.q === 'string' ? w.q : '',
    sort: ['updated', 'created', 'comments'].includes(w.sort) ? w.sort : 'updated',
    layout: w.layout === 'board' ? 'board' : 'list',
    groupBy: typeof w.groupBy === 'string' ? w.groupBy : 'state',
  }
  persistUiState()
  renderCtxbar(); renderPills(); renderPane()
}

function markCustom() { if (S.work.viewId !== 'custom') S.work.viewId = 'custom' }

// ── Combobox (searchable multi-select) ─────────────────────────────────────

let openComboId = null

function renderCombobox(id, label, options, selected) {
  const count = selected.length
  const showSearch = options.length > 5
  return `<span class="combo" id="combo-${esc(id)}">
    <button class="combo-trigger ${count ? 'has-selection' : ''}" id="combo-trigger-${esc(id)}">
      ${esc(label)}${count ? ` <span class="combo-badge">${count}</span>` : ''}
      <span class="arrow">▾</span>
    </button>
    <div class="combo-drop" id="combo-drop-${esc(id)}" ${openComboId === id ? '' : 'hidden'}>
      ${showSearch ? `<input class="combo-search" id="combo-search-${esc(id)}" placeholder="Filter…" autocomplete="off">` : ''}
      <div class="combo-list" id="combo-list-${esc(id)}">${renderComboOptions(options, selected)}</div>
    </div>
  </span>`
}

function renderComboOptions(options, selected) {
  if (options.length === 0) return `<div class="combo-opt" style="color:var(--color-ink-4)">Nothing to show</div>`
  return options.map((opt) => {
    const checked = selected.includes(opt.value)
    return `<div class="combo-opt ${checked ? 'checked' : ''}" data-value="${esc(opt.value)}">
      <span class="combo-check">${checked ? '✓' : ''}</span>
      <span class="combo-opt-label">${esc(opt.label)}</span>
      <span class="combo-opt-count">${opt.count}</span>
    </div>`
  }).join('')
}

function bindCombobox(id, options, selected, onChange) {
  const trigger = $(`combo-trigger-${id}`)
  const drop = $(`combo-drop-${id}`)
  const search = $(`combo-search-${id}`)
  const list = $(`combo-list-${id}`)
  if (!trigger || !drop || !list) return

  trigger.addEventListener('click', (ev) => {
    ev.stopPropagation()
    if (openComboId === id) closeAllCombos()
    else { closeAllCombos(); openComboId = id; drop.hidden = false; search?.focus() }
  })
  drop.addEventListener('click', (ev) => ev.stopPropagation())
  if (search) {
    search.addEventListener('input', () => {
      const q = search.value.toLowerCase()
      const filtered = q ? options.filter((o) => o.label.toLowerCase().includes(q)) : options
      list.innerHTML = renderComboOptions(filtered, selected)
      wireComboOpts(list, selected, onChange)
    })
    search.addEventListener('keydown', (ev) => { ev.stopPropagation(); if (ev.key === 'Escape') closeAllCombos() })
  }
  wireComboOpts(list, selected, onChange)
}

function wireComboOpts(list, selected, onChange) {
  list.querySelectorAll('.combo-opt[data-value]').forEach((el) => {
    el.addEventListener('click', (ev) => {
      ev.stopPropagation()
      const val = el.dataset.value
      const idx = selected.indexOf(val)
      if (idx >= 0) selected.splice(idx, 1); else selected.push(val)
      onChange()
    })
  })
}

function closeAllCombos() {
  if (openComboId) {
    const drop = $(`combo-drop-${openComboId}`)
    if (drop) drop.hidden = true
    openComboId = null
  }
  for (const id of ['date-drop', 'views-drop']) { const d = $(id); if (d) d.hidden = true }
}

document.addEventListener('click', () => closeAllCombos())
document.addEventListener('keydown', (ev) => { if (ev.key === 'Escape' && openComboId) closeAllCombos() })

// ── Date filter (Work) ─────────────────────────────────────────────────────

function renderDateFilter() {
  const f = S.work
  const isOpen = openComboId === '_date'
  const presetActive = f.datePreset !== 'any'
  return `<span class="combo" id="combo-date">
    <button class="combo-trigger ${presetActive ? 'has-selection' : ''}" id="combo-trigger-date">
      Date${presetActive ? ` <span class="combo-badge">·</span>` : ''}

      </div>
      <div class="date-presets">

function bindDateFilter() {
  const trigger = $('combo-trigger-date')
  const drop = $('date-drop')
  if (!trigger || !drop) return
  trigger.addEventListener('click', (ev) => {
    ev.stopPropagation()
    if (openComboId === '_date') closeAllCombos()
    else { closeAllCombos(); openComboId = '_date'; drop.hidden = false }
  })
  drop.addEventListener('click', (ev) => ev.stopPropagation())
  drop.querySelectorAll('[data-datefield]').forEach((el) => el.addEventListener('click', () => { S.work.dateField = el.dataset.datefield; markCustom(); persistUiState(); renderCtxbar(); renderPills(); renderPane() }))
  drop.querySelectorAll('[data-datepreset]').forEach((el) => el.addEventListener('click', () => {
    S.work.datePreset = el.dataset.datepreset
    if (el.dataset.datepreset !== 'custom') { S.work.dateFrom = ''; S.work.dateTo = '' }
    markCustom(); persistUiState(); renderCtxbar(); renderPills(); renderPane()
  }))
  $('date-from')?.addEventListener('change', () => { S.work.dateFrom = $('date-from').value; markCustom(); persistUiState(); renderCtxbar(); renderPills(); renderPane() })
  $('date-to')?.addEventListener('change', () => { S.work.dateTo = $('date-to').value; markCustom(); persistUiState(); renderCtxbar(); renderPills(); renderPane() })

  $('date-to')?.addEventListener('keydown', (ev) => ev.stopPropagation())
}

// ── Views menu (Work) ──────────────────────────────────────────────────────

function renderViewsMenu() {
  const isOpen = openComboId === '_views'
  const savedRows = S.savedViews.length
    ? S.savedViews.map((v) => `<div class="menu-item ${S.work.viewId === `saved:${v.id}` ? 'active' : ''}" data-apply-saved="saved:${v.id}">${esc(v.name)}<span class="combo-opt-count" style="margin-left:auto" data-del-view="${v.id}" title="Delete view">×</span></div>`).join('')
    : `<div class="menu-item" style="color:var(--color-ink-4)">No saved views yet</div>`
  const saveRow = S.savingView
    ? `<div class="menu-item" style="gap:6px"><input type="text" id="save-view-name" placeholder="View name" maxlength="40" style="flex:1;height:22px;font-size:11px"></div>`
    : `<div class="menu-item" data-save-view="1">+ Save current as view…</div>`
  return `<span class="combo" id="combo-views">
    <button class="combo-trigger" id="combo-trigger-views">★ ${esc(viewLabel())} <span class="arrow">▾</span></button>
    <div class="menu-drop" id="views-drop" ${isOpen ? '' : 'hidden'}>
      <div class="menu-head">Built-in</div>
      ${WORK_PRESETS.map((p) => `<div class="menu-item ${S.work.viewId === p.id ? 'active' : ''}" data-apply-preset="${p.id}">${esc(p.label)}</div>`).join('')}
      <div class="menu-sep"></div>
      <div class="menu-head">Saved</div>
      ${savedRows}
      <div class="menu-sep"></div>
      ${saveRow}
    </div>
  </span>`
}

function bindViewsMenu() {
  const trigger = $('combo-trigger-views')
  const drop = $('views-drop')
  if (!trigger || !drop) return
  trigger.addEventListener('click', (ev) => {
    ev.stopPropagation()
    if (openComboId === '_views') closeAllCombos()
    else { closeAllCombos(); openComboId = '_views'; drop.hidden = false; if (S.savingView) $('save-view-name')?.focus() }
  })
  drop.addEventListener('click', (ev) => ev.stopPropagation())
  drop.querySelectorAll('[data-apply-preset]').forEach((el) => el.addEventListener('click', () => applyPreset(el.dataset.applyPreset)))
  drop.querySelectorAll('[data-apply-saved]').forEach((el) => {
    el.addEventListener('click', (ev) => {
      if (ev.target.dataset.delView) return
      applySavedView(el.dataset.applySaved)
    })
  })
  drop.querySelectorAll('[data-del-view]').forEach((el) => el.addEventListener('click', async (ev) => {
    ev.stopPropagation()
    S.savedViews = S.savedViews.filter((v) => String(v.id) !== el.dataset.delView)
    await runtime.data.kv.set('savedViews', S.savedViews)
    if (S.work.viewId === `saved:${el.dataset.delView}`) S.work.viewId = 'custom'
    renderCtxbar()
  }))
  drop.querySelector('[data-save-view]')?.addEventListener('click', () => { S.savingView = true; renderCtxbar(); $('save-view-name')?.focus() })
  const nameInput = $('save-view-name')
  if (nameInput) {
    nameInput.addEventListener('keydown', async (ev) => {
      ev.stopPropagation()
      if (ev.key === 'Escape') { S.savingView = false; renderCtxbar(); return }
      if (ev.key !== 'Enter') return
      const name = nameInput.value.trim()
      if (!name) return
      const id = String(Date.now())
      S.savedViews.push({ id, name: name.slice(0, 40), state: { ...S.work, state: [...S.work.state], repo: [...S.work.repo], author: [...S.work.author], label: [...S.work.label], projectStatus: [...S.work.projectStatus] } })
      await runtime.data.kv.set('savedViews', S.savedViews)
      S.savingView = false
      S.work.viewId = `saved:${id}`
      persistUiState()
      renderCtxbar()
    })
    nameInput.addEventListener('blur', () => { S.savingView = false; renderCtxbar() })
  }
}

// ── Render: top bar ────────────────────────────────────────────────────────

function renderNav() {
  $('nav').innerHTML = VIEWS.map((v) => `
    <button class="tab ${S.view === v.id ? 'active' : ''}" data-view="${v.id}" title="${esc(v.label)} (${v.key})">
      ${esc(v.label)}<span class="key">${v.key}</span>
    </button>`).join('')
  $('nav').querySelectorAll('[data-view]').forEach((el) => {
    el.addEventListener('click', () => {
      if (S.view === el.dataset.view) return
      S.view = el.dataset.view
      S.selectedKey = null
      persistUiState()
      render()
    })
  })
  const orgLink = $('org-link')
  if (orgLink) {
    const org = S.settings?.org
    if (org) {
      orgLink.href = `https://github.com/${encodeURIComponent(org)}`
      orgLink.title = `Open ${org} on GitHub`
      orgLink.hidden = false
    } else {
      orgLink.hidden = true
    }
  }
}

function renderSync() {
  const slot = $('sync-slot')
  const hairline = $('hairline')
  if (S.syncing) {
    const pct = Math.round((S.syncing.fraction || 0) * 100)
    slot.innerHTML = `<span class="sync running"><span class="sync-meter"><i style="width:${pct}%"></i></span><span class="sync-step">${esc(S.syncing.label || 'Syncing')}</span></span>`
    hairline.hidden = false
    hairline.style.width = `${pct}%`
    return
  }
  hairline.hidden = true
  if (S.justSynced) { slot.innerHTML = `<span class="sync done"><span class="glyph">✓</span>Up to date</span>`; return }
  const last = S.syncState?.lastSyncAt
  slot.innerHTML = `<button class="sync" id="btn-sync" title="Sync now (⌥-click for a full re-sync). Last synced ${esc(fmtAgo(last))} (press s)."><span class="glyph">↻</span>Synced ${esc(fmtAgo(last))}</button>`
  $('btn-sync')?.addEventListener('click', (ev) => startSync(ev.altKey))
}

// ── Render: contextual bar ─────────────────────────────────────────────────

function renderCtxbar() {
  const controls = $('ctx-controls')
  if (!configured() || S.view === 'reports') { controls.innerHTML = ''; return }
  if (S.view === 'activity') renderActivityCtxbar(controls)
  else if (S.view === 'work') renderWorkCtxbar(controls)
  else if (S.view === 'people') renderPeopleCtxbar(controls)
}

function option(value, label, selected) {
  return `<option value="${esc(value)}" ${selected ? 'selected' : ''}>${esc(label)}</option>`
}

function renderActivityCtxbar(controls) {
  const peopleOpts = allPeople().map((p) => ({ value: p, label: p, count: S.events.filter((e) => e.actor === p).length + S.items.filter((i) => i.author === p).length }))
  const repoCounts = new Map()
  for (const i of S.items) if (i.repo) repoCounts.set(i.repo, (repoCounts.get(i.repo) || 0) + 1)
  for (const e of S.events) if (e.repo) repoCounts.set(e.repo, (repoCounts.get(e.repo) || 0) + 1)
  const repoOpts = [...repoCounts.entries()].sort((a, b) => a[0].localeCompare(b[0])).map(([v, c]) => ({ value: v, label: repoShortName(v), count: c }))
  const count = viewActivity().length
  controls.innerHTML = `
    <select class="select" id="act-type" title="Activity type">
      ${ACTIVITY_TYPES.map((t) => option(t.id, t.label, S.activity.type === t.id)).join('')}
    </select>
    ${renderCombobox('act-repo', 'Repo', repoOpts, S.activity.repo)}
    ${renderCombobox('act-person', 'Person', peopleOpts, S.activity.author)}
    <span class="ctx-sep"></span>
    <span class="search-box"><span class="glyph">⌕</span><input class="search-input" id="act-q" placeholder="Search activity (/)" value="${esc(S.activity.q)}"></span>
    <span class="spacer"></span>
    <span class="count-note">${count} event${count !== 1 ? 's' : ''}</span>`
  $('act-type').addEventListener('change', () => { S.activity.type = $('act-type').value; persistUiState(); renderCtxbar(); renderPills(); renderPane() })
  bindCombobox('act-repo', repoOpts, S.activity.repo, () => { persistUiState(); renderCtxbar(); renderPills(); renderPane() })
  bindCombobox('act-person', peopleOpts, S.activity.author, () => { persistUiState(); renderCtxbar(); renderPills(); renderPane() })
  const q = $('act-q')
  q.addEventListener('input', () => { S.activity.q = q.value; persistUiState(); renderPills(); renderPane(); updateCountNote() })
  q.addEventListener('keydown', (ev) => { ev.stopPropagation(); if (ev.key === 'Escape') { q.value = ''; S.activity.q = ''; persistUiState(); renderPills(); renderPane(); q.blur() } })
}

function renderWorkCtxbar(controls) {
  const opts = filterOptions()
  const shown = workItems().length
  controls.innerHTML = `
    <div class="seg" title="Item type">
      <button class="seg-btn ${S.work.type === 'all' ? 'active' : ''}" data-type="all">All</button>
      <button class="seg-btn ${S.work.type === 'issue' ? 'active' : ''}" data-type="issue">Issues</button>
      <button class="seg-btn ${S.work.type === 'pr' ? 'active' : ''}" data-type="pr">PRs</button>
    </div>
    ${renderCombobox('state', 'State', opts.states, S.work.state)}
    ${renderDateFilter()}
    ${renderCombobox('repo', 'Repo', opts.repos, S.work.repo)}

function updateCountNote() {
  const note = $('ctx-controls')?.querySelector('.count-note')
  if (!note) return
  if (S.view === 'work') {
    const shown = workItems().length
    note.textContent = workHasActiveFilters() ? `${shown} of ${S.items.length}` : `${shown} items`
  } else if (S.view === 'activity') {
    note.textContent = `${viewActivity().length} events`
  }

// ── Render: active filter pills ────────────────────────────────────────────

function renderPills() {
  const bar = $('ctx-pills')
  if (!bar) return
  if (!configured() || S.view === 'reports' || S.view === 'people') { bar.hidden = true; return }
  let pills = []
  if (S.view === 'work') pills = workPills()
  else if (S.view === 'activity') pills = activityPills()
  if (pills.length === 0) { bar.hidden = true; return }
  bar.hidden = false
  bar.innerHTML = pills.map((p) =>
    `<span class="pill" data-pfield="${esc(p.field)}" data-pvalue="${esc(p.value)}">
      <span class="pill-field">${esc(p.fieldLabel)}:</span>${esc(p.label)}
      <span class="pill-x">×</span>
    </span>`).join('') +
    `<span class="pills-clear" id="pills-clear-all">Clear all</span>`
  bar.querySelectorAll('.pill').forEach((el) => {
    el.querySelector('.pill-x').addEventListener('click', () => {
      const { pfield, pvalue } = el.dataset
      if (S.view === 'work') removeWorkPill(pfield, pvalue)
      else removeActivityPill(pfield, pvalue)
    })
  })
  $('pills-clear-all')?.addEventListener('click', () => {
    if (S.view === 'work') clearWorkFilters()
    else S.activity = { type: 'all', repo: [], author: [], q: '' }
    persistUiState(); renderCtxbar(); renderPills(); renderPane()
  })
}

function workPills() {
  const f = S.work
  const pills = []
  if (f.type !== 'all') pills.push({ field: 'type', value: f.type, label: f.type === 'pr' ? 'PRs' : 'Issues', fieldLabel: 'Type' })
  for (const s of f.state) pills.push({ field: 'state', value: s, label: s.charAt(0) + s.slice(1).toLowerCase(), fieldLabel: 'State' })
  for (const v of f.repo) pills.push({ field: 'repo', value: v, label: repoShortName(v), fieldLabel: 'Repo' })
  for (const v of f.author) pills.push({ field: 'author', value: v, label: v, fieldLabel: 'Person' })
  for (const v of f.label) pills.push({ field: 'label', value: v, label: v, fieldLabel: 'Label' })
  for (const v of f.projectStatus) pills.push({ field: 'projectStatus', value: v, label: v, fieldLabel: 'Project' })
  if (f.datePreset !== 'any') {
    const p = DATE_PRESETS.find((d) => d.id === f.datePreset)
    let label = p?.label || 'Custom'
    if (f.datePreset === 'custom' && (f.dateFrom || f.dateTo)) label = `${fmtDateShort(f.dateFrom)} – ${fmtDateShort(f.dateTo)}`
    pills.push({ field: 'date', value: '', label: `${f.dateField === 'created' ? 'Created' : 'Updated'}: ${label}`, fieldLabel: 'Date' })
  }
  if (f.q) pills.push({ field: 'q', value: '', label: `"${f.q}"`, fieldLabel: 'Search' })
  return pills
}

function removeWorkPill(field, value) {
  const f = S.work
  if (field === 'type') f.type = 'all'
  else if (field === 'date') { f.datePreset = 'any'; f.dateFrom = ''; f.dateTo = '' }
  else if (field === 'q') f.q = ''
  else f[field] = f[field].filter((v) => v !== value)
  markCustom(); persistUiState(); renderCtxbar(); renderPills(); renderPane()
}

function activityPills() {
  const f = S.activity
  const pills = []
  if (f.type !== 'all') pills.push({ field: 'type', value: f.type, label: ACTIVITY_TYPES.find((t) => t.id === f.type)?.label || f.type, fieldLabel: 'Type' })
  for (const v of f.repo) pills.push({ field: 'repo', value: v, label: repoShortName(v), fieldLabel: 'Repo' })
  for (const v of f.author) pills.push({ field: 'author', value: v, label: v, fieldLabel: 'Person' })
  if (f.q) pills.push({ field: 'q', value: '', label: `"${f.q}"`, fieldLabel: 'Search' })
  return pills
}

function removeActivityPill(field, value) {
  const f = S.activity
  if (field === 'type') f.type = 'all'
  else if (field === 'q') f.q = ''
  else f[field] = f[field].filter((v) => v !== value)
  persistUiState(); renderCtxbar(); renderPills(); renderPane()
}

function renderActivity() {
  const entries = viewActivity()
  if (entries.length === 0) {
    const hasAny = S.items.length > 0 || S.events.length > 0
    $('pane').innerHTML = `<div class="empty"><div class="empty-quiet">
      <p>${hasAny ? 'No activity matches the current filters.' : 'No activity synced yet.'}</p>
      <p style="font-size:10.5px;margin-top:6px">${hasAny ? 'Try clearing filters or widening the view.' : 'Sync to load the org activity feed and recent item history.'}</p>
      ${hasAny ? '<button class="btn" id="btn-clear-act">Clear filters</button>' : '<button class="btn primary" id="btn-sync-act">Sync now</button>'}
    </div></div>`
    $('btn-clear-act')?.addEventListener('click', () => { S.activity = { type: 'all', repo: [], author: [], q: '' }; persistUiState(); renderCtxbar(); renderPills(); renderPane() })
    $('btn-sync-act')?.addEventListener('click', () => startSync(false))
    return
  }
  const byDay = new Map()
  for (const entry of entries) {
    const day = entry.ts.slice(0, 10)
    if (!byDay.has(day)) byDay.set(day, [])
    byDay.get(day).push(entry)
  }
  $('pane').innerHTML = `<div class="feed">${[...byDay.entries()].map(([day, dayEntries]) => `
    <div class="feed-day">${esc(fmtDayLabel(day))}</div>
    ${dayEntries.map((entry) => {
      const g = activityGlyph(entry)
      const summary = activitySummary(entry)
      return `<div class="feed-row" ${entry.item?.url ? `data-url="${esc(entry.item.url)}"` : ''} title="${esc(summary)}">
        <span class="feed-time">${esc(entry.ts.slice(11, 16))}</span>
        <span class="feed-glyph ${g.cls}">${g.ch}</span>
        <span class="feed-actor">${esc(entry.actor || '—')}</span>
        <span class="feed-repo">${esc(repoShortName(entry.repo))}</span>
        <span class="feed-summary">${esc(summary)}</span>
      </div>`
    }).join('')}`).join('')}
    <div class="feed-note">Activity merges GitHub's org feed with derived item history. The org feed only retains the most recent ~300 events.</div>
  </div>`
  $('pane').querySelectorAll('[data-url]').forEach((el) => el.addEventListener('click', () => window.open(el.dataset.url, '_blank', 'noreferrer')))
}

function fmtDayLabel(day) {
  const d = new Date(`${day}T00:00:00`)
  const today = new Date(); today.setHours(0, 0, 0, 0)
  const diff = Math.round((today - d) / 86_400_000)
  if (diff === 0) return 'Today'
  if (diff === 1) return 'Yesterday'
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
}

function renderBoard() {
  const rows = workItems()
  let columns
  if (S.work.groupBy === 'assignee') {
    const names = uniqueSorted(rows.map((i) => (i.assignees || [])[0] || ''))
    columns = names.map((name) => ({ title: name || 'Unassigned', items: rows.filter((i) => ((i.assignees || [])[0] || '') === name) }))
  } else if (S.work.groupBy === 'projectStatus') {
