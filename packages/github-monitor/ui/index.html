function initials(login) {
  if (!login) return '?'
  const parts = login.split(/[-_]/).filter(Boolean)
  if (parts.length > 1) return (parts[0][0] + parts[1][0]).toUpperCase()
  return login.slice(0, 2).toUpperCase()
}

// ── Reports ────────────────────────────────────────────────────────────────

function reportsRange() { return presetRange(S.reports_form.range, S.reports_form.from, S.reports_form.to) }

function reportMatchCount() {
  const range = reportsRange()
  if (!range) return null
  const { from, to } = range
  const people = S.reports_form.users.length ? S.reports_form.users : null
  const repos = S.reports_form.repos.length ? S.reports_form.repos : null
  const matchedItems = S.items.filter((item) => {
    if (!item.updatedAt || item.updatedAt < from || item.updatedAt > to) return false
    if (people && !people.includes(item.author) && !(item.assignees || []).some((a) => people.includes(a))) return false
    if (repos && !repos.includes(item.repo)) return false
    return true
  })
  const matchedEvents = S.events.filter((event) => {
    if (!event.createdAt || event.createdAt < from || event.createdAt > to) return false
    if (people && !people.includes(event.actor)) return false
    if (repos && !repos.includes(event.repo)) return false
    return true
  })
  return { items: matchedItems.length, events: matchedEvents.length }
}

// Dependent facet counts for the Reports scope dropdowns. Each facet's per-value
// badge reflects the OTHER active facet plus the timeframe — never its own
// selection — so selecting repo X makes person Y's badge show Y's activity on X
// (and vice versa). This matches the eligibility total's logic but varies one
// facet at a time. Options with zero count (and not already selected) are
// dropped by the caller so the list stays relevant as filters narrow.
function reportFacetCounts(range) {
  const people = new Map() // login -> activities involving them
  const repos = new Map()  // repo  -> activities in it
  if (!range) return { people, repos }
  const { from, to } = range
  const selRepos = S.reports_form.repos
  const selPeople = S.reports_form.users
  const inRange = (iso) => iso && iso >= from && iso <= to
  // People badges reflect the selected repos; repoOk does not see selPeople.
  const repoOk = (repo) => selRepos.length === 0 || selRepos.includes(repo)
  // Repo badges reflect the selected people; personOk does not see selRepos.
  const personOkItem = (item) => selPeople.length === 0 || selPeople.includes(item.author) || (item.assignees || []).some((a) => selPeople.includes(a))
  const personOkEvent = (event) => selPeople.length === 0 || selPeople.includes(event.actor)

  for (const item of S.items) {
    if (!inRange(item.updatedAt)) continue
    if (repoOk(item.repo)) {
      for (const login of new Set([item.author, ...(item.assignees || [])].filter(Boolean))) {
        people.set(login, (people.get(login) || 0) + 1)
      }
    }
    if (personOkItem(item)) repos.set(item.repo, (repos.get(item.repo) || 0) + 1)
  }
  for (const event of S.events) {
    if (!inRange(event.createdAt)) continue
    if (repoOk(event.repo) && event.actor) people.set(event.actor, (people.get(event.actor) || 0) + 1)
    if (personOkEvent(event)) repos.set(event.repo, (repos.get(event.repo) || 0) + 1)
  }
  return { people, repos }
}

function renderReports() {
  const range = reportsRange()
  const facets = reportFacetCounts(range)
  const peopleOpts = allPeople()
    .map((p) => ({ value: p, label: p, count: facets.people.get(p) || 0 }))
    .filter((o) => o.count > 0 || S.reports_form.users.includes(o.value))
  const repoOpts = uniqueSorted(S.items.map((i) => i.repo))
    .map((r) => ({ value: r, label: repoShortName(r), count: facets.repos.get(r) || 0 }))
    .filter((o) => o.count > 0 || S.reports_form.repos.includes(o.value))
  const running = summarizing()
  const customInvalid = S.reports_form.range === 'custom' && (S.reports_form.from || S.reports_form.to) && !range
  const match = reportMatchCount()
  const matchEmpty = match && match.items === 0 && match.events === 0
  const total = match ? match.items + match.events : 0
  const large = total > 1500
  const currentModel = S.settings?.summaryModel || ''
  const canSummarize = !!range && !matchEmpty && !running
  const eligibility = !match
    ? `<div class="r-eligibility warn">Pick a timeframe to see how much will be summarized.</div>`
    : matchEmpty
      ? `<div class="r-eligibility zero">No activity matches this scope — widen the timeframe or clear filters.</div>`
      : `<div class="r-eligibility"><strong>${match.items}</strong> item${match.items !== 1 ? 's' : ''} · <strong>${match.events}</strong> event${match.events !== 1 ? 's' : ''} will be summarized${large ? ' · large dataset, per-repo truncation applies' : ''}</div>`
  $('pane').innerHTML = `<div class="reports">
    <div class="r-block">
      <div class="r-label">Scope</div>
      <div class="r-controls">
        <div class="seg" title="Timeframe">
          <button class="seg-btn ${S.reports_form.range === '7d' ? 'active' : ''}" data-range="7d">7d</button>
          <button class="seg-btn ${S.reports_form.range === '30d' ? 'active' : ''}" data-range="30d">30d</button>
          <button class="seg-btn ${S.reports_form.range === '90d' ? 'active' : ''}" data-range="90d">90d</button>
          <button class="seg-btn ${S.reports_form.range === 'custom' ? 'active' : ''}" data-range="custom">Custom</button>
        </div>
        ${S.reports_form.range === 'custom' ? `
          <input type="date" id="rep-from" value="${esc(S.reports_form.from)}" style="height:26px">
          <span style="color:var(--color-ink-4);font-size:11px">to</span>
          <input type="date" id="rep-to" value="${esc(S.reports_form.to)}" style="height:26px">` : ''}
      </div>
      ${customInvalid ? '<div class="r-hint err">Pick a start date that is on or before the end date.</div>' : ''}
      <div class="r-controls" style="margin-top:8px">
        ${renderCombobox('rep-repos', 'Repos', repoOpts, S.reports_form.repos)}
        ${renderCombobox('rep-people', 'People', peopleOpts, S.reports_form.users)}
      </div>
    </div>

    <div class="r-block">
      <div class="r-label">Focus <span style="text-transform:none;font-weight:400;color:var(--color-ink-4);letter-spacing:0">— optional instruction for the summarizer</span></div>
      <div class="r-controls">
        <input type="text" id="rep-focus" placeholder="e.g. release readiness, blockers, who shipped what" value="${esc(S.reports_form.focus)}">
      </div>
    </div>

    ${eligibility}
    <div class="r-block">
      <div class="r-controls">
        ${running
          ? `<span class="r-running"><span class="pulse"></span>${esc(running.label || 'Summarizing')}</span>`
          : `<button class="btn primary" id="btn-summarize" ${canSummarize ? '' : 'disabled'} title="Reads the local cache only; writes a markdown report to reports/github/">Summarize activity</button>`}
        <span class="r-model">
          <span class="r-model-label">Model</span>
          <select class="select" id="rep-model" title="Model used for summaries (blank = workspace default)">
            ${option('', 'Workspace default', !currentModel)}
            ${S.models.map((m) => option(m.id || m.model, m.label || m.id || m.model, currentModel === (m.id || m.model))).join('')}
          </select>
        </span>
      </div>
    </div>

    <div class="r-block">
      <div class="r-label">Past reports</div>
      ${S.reports.length ? S.reports.map((report) => `
        <div class="report-row" data-report="${esc(report.path)}" title="Open this report in the editor">
          <span class="report-date">${esc((report.generatedAt || '').slice(0, 10))}</span>
          <span class="report-headline">${esc(report.headline || report.path)}</span>
          <span class="report-range">${esc((report.from || '').slice(0, 10))} → ${esc((report.to || '').slice(0, 10))}${report.user ? ` · ${esc(report.user)}` : ''}</span>
        </div>`).join('')
      : '<p style="font-size:11px;color:var(--color-ink-4)">No reports yet. Pick a timeframe and press Summarize.</p>'}
    </div>
  </div>`

  $('pane').querySelectorAll('[data-range]').forEach((el) => el.addEventListener('click', () => { S.reports_form.range = el.dataset.range; renderPane() }))
  $('rep-from')?.addEventListener('change', () => { S.reports_form.from = $('rep-from').value; renderPane() })
  $('rep-to')?.addEventListener('change', () => { S.reports_form.to = $('rep-to').value; renderPane() })
  bindCombobox('rep-repos', repoOpts, S.reports_form.repos, () => renderReports())
  bindCombobox('rep-people', peopleOpts, S.reports_form.users, () => renderReports())
  $('rep-focus')?.addEventListener('input', () => { S.reports_form.focus = $('rep-focus').value })
  $('rep-focus')?.addEventListener('keydown', (ev) => ev.stopPropagation())
  $('rep-model')?.addEventListener('change', () => saveSummaryModel($('rep-model').value))
  $('btn-summarize')?.addEventListener('click', startSummarize)
  $('pane').querySelectorAll('[data-report]').forEach((el) => el.addEventListener('click', () => runtime.call('editor.open', { path: el.dataset.report }).catch((err) => toast(err.message))))
}

async function saveSummaryModel(modelId) {
  const settings = { ...(S.settings || {}), summaryModel: modelId || '' }
  await runtime.data.kv.set('settings', settings)
  S.settings = settings
}

// ── Detail panel ───────────────────────────────────────────────────────────

function selectItem(key) {
  S.selectedKey = S.selectedKey === key ? null : key
  renderPane()
}

function moveSelection(delta) {
  if (S.view !== 'work' || S.work.layout !== 'list') return
  const rows = workItems()
  if (!rows.length) return
  const index = rows.findIndex((i) => i.key === S.selectedKey)
  const next = index === -1 ? (delta > 0 ? 0 : rows.length - 1) : Math.min(rows.length - 1, Math.max(0, index + delta))
  S.selectedKey = rows[next].key
  renderPane()
  $('pane').querySelector('.row.selected')?.scrollIntoView({ block: 'nearest' })
}

function renderDetail() {
  const item = S.items.find((i) => i.key === S.selectedKey)
  const panel = $('detail')
  if (!item || S.view !== 'work') { panel.hidden = true; return }
  panel.hidden = false
  const recentEvents = S.events.filter((e) => e.repo === item.repo).slice(0, 8)
  panel.innerHTML = `
    <div class="detail-top">
      <span class="detail-key">${esc(item.key)}</span>
      <button class="detail-close" id="detail-close" title="Close (Esc)">×</button>
    </div>
    <div class="detail-title">${esc(item.title)}</div>
    <div class="detail-state">${stateMark(item)} ${esc(item.type === 'pr' ? 'pull request' : 'issue')} · ${esc(displayState(item).toLowerCase())}</div>
    <dl class="detail-grid">
      <dt>Author</dt><dd>${esc(item.author || '—')}</dd>
      <dt>Assignees</dt><dd>${esc((item.assignees || []).join(', ') || '—')}</dd>
      ${item.milestone ? `<dt>Milestone</dt><dd>${esc(item.milestone)}</dd>` : ''}
      ${item.projectStatus ? `<dt>Project</dt><dd>${esc(item.projectTitle || '')}: ${esc(item.projectStatus)}</dd>` : ''}
      <dt>Comments</dt><dd>${item.commentCount || 0}</dd>
      <dt>Updated</dt><dd>${fmtAgo(item.updatedAt)}</dd>
      <dt>Created</dt><dd>${esc((item.createdAt || '').slice(0, 10))}</dd>
      <dt>Link</dt><dd><a href="${esc(item.url)}" target="_blank" rel="noreferrer">Open on GitHub ↗</a></dd>
    </dl>
    ${(item.labels || []).length ? `<div style="display:flex;gap:4px;flex-wrap:wrap;margin:6px 0">${item.labels.map((l) =>
      `<span class="label-chip"><i style="background:#${esc(l.color || 'ccc')}"></i>${esc(l.name)}</span>`).join('')}</div>` : ''}
    ${item.bodyExcerpt ? `<div class="detail-body">${esc(item.bodyExcerpt)}</div>` : ''}
    ${recentEvents.length ? `
      <div class="detail-section">Recent repo activity</div>
      ${recentEvents.map((e) => `
        <div class="feed-row" style="border:none;padding:3px 0">
          <span class="feed-time">${esc((e.createdAt || '').slice(5, 10))}</span>
          <span class="feed-actor">${esc(e.actor)}</span>
          <span class="feed-summary" title="${esc(e.summary)}">${esc(e.summary)}</span>
        </div>`).join('')}` : ''}`
  $('detail-close').addEventListener('click', () => { S.selectedKey = null; renderPane() })
}

// ── Keyboard ───────────────────────────────────────────────────────────────

document.addEventListener('keydown', (ev) => {
  if ($('overlay')) return
  const inField = ev.target.matches('input, textarea, select, [contenteditable]')
  if (!inField && ev.key === '/') {
    const q = S.view === 'work' ? $('f-q') : S.view === 'activity' ? $('act-q') : null
    if (q) { ev.preventDefault(); q.focus(); q.select() }
    return
  }
  if (inField) return
  if (['1', '2', '3', '4'].includes(ev.key)) {
    const v = VIEWS.find((x) => x.key === ev.key)
    if (v && S.view !== v.id) { S.view = v.id; S.selectedKey = null; persistUiState(); render() }
    return
  }
  if (ev.key === 's' && configured()) { ev.preventDefault(); startSync(ev.altKey); return }
  if (ev.key === 'Escape') {
    if (S.selectedKey) { S.selectedKey = null; renderPane() }
    return
  }
  if (S.view === 'work') {
    if (ev.key === 'ArrowDown' || ev.key === 'j') { ev.preventDefault(); moveSelection(1); return }
    if (ev.key === 'ArrowUp' || ev.key === 'k') { ev.preventDefault(); moveSelection(-1); return }
    if (ev.key === 'Enter' && S.selectedKey) {
      const item = S.items.find((i) => i.key === S.selectedKey)
      if (item?.url) window.open(item.url, '_blank', 'noreferrer')
    }
  }
})

// ── Settings ───────────────────────────────────────────────────────────────

function openSettings() {
  const s = S.settings || {}
  const repoList = Array.isArray(s.repoList) ? s.repoList.join('\n') : ''
  $('modal-root').innerHTML = `<div class="overlay" id="overlay"><div class="modal">
    <h2>GitHub Monitor settings</h2>

    <div class="field">
      <label>GitHub token</label>
      <div class="token-status">
        <span class="dot ${S.tokenSet ? 'ok' : 'bad'}"></span>
        ${S.tokenSet ? 'A token is stored in the system keychain.' : 'No token stored yet.'}
      </div>
      <div class="field-row">
        <input type="password" id="set-token" placeholder="${S.tokenSet ? 'Paste a new token to replace it' : 'ghp_… or github_pat_…'}" autocomplete="off">
        <button class="btn" id="btn-token-save">Save</button>
        ${S.tokenSet ? '<button class="btn danger" id="btn-token-del">Remove</button>' : ''}
      </div>
      <div class="field-row" style="margin-top:6px">
        <button class="btn" id="btn-validate" ${S.tokenSet ? '' : 'disabled'}>Validate token</button>
        <span class="validation" id="validation"></span>
      </div>
      <div class="hint">Classic PAT with repo, read:org, and read:project (or project) scopes. Stored in the OS keychain, never written to files.</div>
    </div>

    <div class="field">
      <label>Organization</label>
      <input type="text" id="set-org" value="${esc(s.org || '')}" placeholder="my-org" autocomplete="off">
    </div>

    <div class="field">
      <label>Sync window (days)</label>
      <input type="number" id="set-window" value="${esc(s.syncWindowDays || 90)}" min="1" max="730">
      <div class="hint">How far back recently closed items and activity are kept. Open issues and PRs are always indexed.</div>
    </div>

    <div class="field">
      <label>Repositories</label>
      <select class="select" id="set-repomode" style="margin-bottom:6px">
        ${option('all', 'All repositories', !s.repoMode || s.repoMode === 'all')}
        ${option('include', 'Only these', s.repoMode === 'include')}
        ${option('exclude', 'All except these', s.repoMode === 'exclude')}
      </select>
      <textarea id="set-repolist" placeholder="one repo per line, e.g. my-org/app">${esc(repoList)}</textarea>
    </div>

    <div class="field">
      <label>Summary model</label>
      <select class="select" id="set-model" style="max-width:100%">
        ${option('', 'Workspace default', !s.summaryModel)}
        ${S.models.map((m) => option(m.id || m.model, m.label || m.id || m.model, s.summaryModel === (m.id || m.model))).join('')}
      </select>
      <div class="hint">Used for AI activity summaries.</div>
    </div>

    <div class="modal-actions">
      <span class="grow"><button class="btn" id="btn-fullsync" title="Save settings, then rebuild the whole cache">Save &amp; full re-sync</button></span>
      <button class="btn" id="btn-cancel">Cancel</button>
      <button class="btn primary" id="btn-save">Save</button>
    </div>
  </div></div>`

  $('overlay').addEventListener('click', (ev) => { if (ev.target.id === 'overlay') closeSettings() })
  $('overlay').addEventListener('keydown', (ev) => { ev.stopPropagation(); if (ev.key === 'Escape') closeSettings() })
  $('btn-cancel').addEventListener('click', closeSettings)
  $('btn-token-save').addEventListener('click', saveToken)
  $('btn-token-del')?.addEventListener('click', deleteToken)
  $('btn-validate').addEventListener('click', validateToken)
  $('btn-save').addEventListener('click', () => saveSettings(false))
  $('btn-fullsync').addEventListener('click', () => saveSettings(true))
}

function closeSettings() { $('modal-root').innerHTML = '' }

async function saveToken() {
  const input = $('set-token')
  const value = input.value.trim()
  if (!value) { toast('Paste a token first.'); return }
  try {
    await runtime.secrets.set('github_token', value)
    input.value = ''
    S.tokenSet = true
    toast('Token saved to the keychain.')
    openSettings()
    validateToken()
  } catch (err) { toast(`Could not save token: ${err.message}`) }
}

async function deleteToken() {
  try {
    await runtime.secrets.delete('github_token')
    S.tokenSet = false
    toast('Token removed.')
    openSettings()
  } catch (err) { toast(`Could not remove token: ${err.message}`) }
}

async function validateToken() {
  const out = $('validation')
  if (!out) return
  out.className = 'validation'
  out.textContent = 'Checking…'
  try {
    if (!S.validateToolName) await loadAuxiliary()
    if (!S.validateToolName) throw new Error('validateToken tool not available')
    const result = await runtime.call('package.tools.execute', { name: S.validateToolName, input: {} })
    const scopes = (result.scopes || '').split(',').map((s) => s.trim()).filter(Boolean)
    const missing = [
      hasScope(scopes, 'repo') ? null : 'repo',
      hasScope(scopes, 'read:org', ['admin:org']) ? null : 'read:org',
      hasScope(scopes, 'read:project', ['project']) ? null : 'read:project',
    ].filter(Boolean)
    out.className = 'validation ok'
    out.textContent = `OK, authenticated as ${result.login}${scopes.length ? ` (${scopes.join(', ')})` : ''}`
    if (missing.length && scopes.length) {
      out.className = 'validation err'
      out.textContent = `Authenticated as ${result.login}, but missing scopes: ${missing.join(', ')}`
    }
  } catch (err) {
    out.className = 'validation err'
    out.textContent = err.message
  }
}

function hasScope(scopes, required, equivalents = []) {
  return scopes.includes(required) || equivalents.some((scope) => scopes.includes(scope))
}

async function saveSettings(fullSync) {
  const repoList = $('set-repolist').value.split(/[\n,]+/).map((s) => s.trim()).filter(Boolean)
  const windowDays = parseInt($('set-window').value, 10)
  const settings = {
    ...(S.settings || {}),
    org: $('set-org').value.trim(),
    syncWindowDays: Number.isFinite(windowDays) && windowDays > 0 ? Math.min(windowDays, 730) : 90,
    repoMode: $('set-repomode').value,
    repoList,
    summaryModel: $('set-model').value || '',
  }
  if (!settings.org) { toast('Set an organization name.'); return }
  await runtime.data.kv.set('settings', settings)
  S.settings = settings
  closeSettings()
  render()
  if (fullSync) startSync(true)
}

// ── Toast ──────────────────────────────────────────────────────────────────

let toastTimer = null
function toast(message) {
  $('toast-root').innerHTML = `<div class="toast">${esc(message)}</div>`
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => { $('toast-root').innerHTML = '' }, 4000)
}

// ── Boot ───────────────────────────────────────────────────────────────────

function render() { renderNav(); renderSync(); renderCtxbar(); renderPills(); renderPane(); renderStatus() }

function maybeAutoSync() {
  if (!configured() || S.syncing) return
  const last = S.syncState?.lastSyncAt
  if (!last || Date.now() - Date.parse(last) > AUTO_SYNC_AFTER_MS) startSync(false)
}

async function boot() {
  await runtime.ready
  $('btn-settings').addEventListener('click', () => openSettings())
  // Register the job listener before any awaits so live job events arriving
  // during loadAll (e.g. a sync already running when the view opened) are caught.
  setupJobListener()
  await loadAll()
  render()
  loadAuxiliary()
  maybeAutoSync()
  setInterval(() => { if (!S.syncing) { renderSync(); renderStatus() } }, 30_000)
}

function bootFailed(err) {
  document.body.innerHTML = `
    <div class="empty" style="height:100%">
      <div class="setup-card card">
        <h2>GitHub Monitor could not connect</h2>
        <p style="user-select:text;-webkit-user-select:text">${esc(err.message)}</p>
        <button class="btn primary" id="btn-retry">Retry</button>
      </div>
    </div>`
  document.getElementById('btn-retry').addEventListener('click', () => location.reload())
}

boot().catch(bootFailed)
</script>
