<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/sdk/tokens.css">
  <title>Board</title>
  <style>
    /* ── Reset & Layout ── */
    html, body { height: 100%; overflow: hidden; margin: 0; }
    body {
      display: flex;
      flex-direction: column;
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.2;
      color: var(--color-ink);
      background: var(--color-surface);
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }
    * { box-sizing: border-box; }
    button {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 0;
      margin: 0;
      color: inherit;
      font: inherit;
    }
    input, textarea, select, [contenteditable] { user-select: text; }

    .svg-defs { position: absolute; width: 0; height: 0; overflow: hidden; }
    .icon {
      width: 13px; height: 13px;
      display: inline-block;
      vertical-align: -2px;
      color: currentColor;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      flex: 0 0 auto;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      position: relative;
    }

    /* ── Header ── */
    .header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 40px;
      padding: 0 14px;
      border-bottom: 1px solid var(--color-rule-light);
      flex-shrink: 0;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--color-ink);
    }
    .header-btn {
      width: 26px; height: 26px;
      display: grid;
      place-items: center;
      border-radius: 5px;
      color: var(--color-ink-3);
    }
    .header-btn:hover { background: var(--color-chrome-mid); color: var(--color-ink); }
    .header-back {
      width: 26px; height: 26px;
      display: grid;
      place-items: center;
      border-radius: 5px;
      color: var(--color-ink-3);
    }
    .header-back:hover { background: var(--color-chrome-mid); color: var(--color-ink); }
    .header-back-label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px 3px 4px;
      border-radius: 5px;
      color: var(--color-ink-3);
      font-size: 12px;
      font-weight: 600;
    }
    .header-back-label:hover { background: var(--color-chrome-mid); color: var(--color-ink); }
    .header-crumb-sep { color: var(--color-ink-4); }
    .header-crumb-current {
      color: var(--color-ink);
      font-weight: 700;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Tab Bar ── */
    .tab-bar {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      border-bottom: 1px solid var(--color-rule-light);
      flex-shrink: 0;
    }
    .tabs-left { display: flex; gap: 5px; align-items: center; }
    .tabs-right { display: flex; gap: 5px; align-items: center; }
    .tab-pill {
      height: 26px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--color-rule-light);
      border-radius: 13px;
      color: var(--color-ink-3);
      font-weight: 650;
      font-size: 12px;
    }
    .tab-pill:hover { background: var(--color-chrome-mid); color: var(--color-ink-2); }
    .tab-pill.active {
      color: var(--color-ink-2);
      background: var(--color-chrome-mid);
      border-color: var(--color-rule);
    }
    .tab-btn {
      width: 26px; height: 26px;
      display: grid;
      place-items: center;
      border: 1px solid var(--color-rule-light);
      border-radius: 50%;
      color: var(--color-ink-3);
    }
    .tab-btn:hover { background: var(--color-chrome-mid); color: var(--color-ink-2); }
    .tab-btn.active { background: var(--color-chrome-mid); color: var(--color-ink); }
    .tab-sep {
      width: 1px;
      height: 14px;
      background: var(--color-rule-light);
      margin: 0 2px;
    }

    /* ── View Toggle (inline in tab bar) ── */
    .view-toggle {
      display: inline-flex;
      gap: 2px;
      align-items: center;
      border: 1px solid var(--color-rule-light);
      border-radius: 13px;
      padding: 2px;
    }
    .vt-btn {
      height: 20px;
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 10px;
      color: var(--color-ink-3);
      font-size: 11px;
      font-weight: 600;
    }
    .vt-btn:hover { color: var(--color-ink-2); }
    .vt-btn.active {
      background: var(--color-chrome-mid);
      color: var(--color-ink-2);
    }

    /* ── Filter Pills ── */
    .filter-group {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .filter-pill {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      height: 22px;
      padding: 0 7px;
      border-radius: 11px;
      font-size: 10px;
      font-weight: 600;
      color: var(--color-ink-3);
      border: 1px solid transparent;
    }
    .filter-pill:hover { color: var(--color-ink-2); background: var(--color-chrome-mid); }
    .filter-pill.active {
      color: var(--color-accent);
      border-color: var(--color-accent);
      background: var(--color-accent-soft);
    }
    .fpill-dot {
      width: 5px; height: 5px; border-radius: 50%;
    }

    /* ── Sort ── */
    .sort-select {
      font-family: var(--font-sans);
      font-size: 10px;
      color: var(--color-ink-3);
      background: transparent;
      border: 1px solid var(--color-rule-light);
      border-radius: 11px;
      padding: 2px 6px;
      height: 22px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    .sort-select:focus { border-color: var(--color-accent); }

    /* ── Search ── */
    .search-box {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 26px;
      padding: 0 7px;
      border-radius: 13px;
      border: 1px solid var(--color-rule-light);
    }
    .search-box:focus-within { border-color: var(--color-accent); }
    .search-box .icon { color: var(--color-ink-3); flex-shrink: 0; }
    .search-input {
      flex: 1;
      min-width: 0;
      width: 100px;
      background: transparent;
      border: none;
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--color-ink);
      outline: none;
      padding: 0;
    }
    .search-input::placeholder { color: var(--color-ink-4); }

    /* ── Content ── */
    #content {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    /* ── Board ── */
    .board {
      height: 100%;
      display: flex;
      gap: 20px;
      padding: 10px 14px 20px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .board::-webkit-scrollbar { width: 0; height: 0; }

    .column {
      width: 280px;
      flex: 0 0 280px;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .column.col-hidden {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      min-width: 26px;
      width: 26px;
      flex: 0 0 26px;
      padding: 8px 3px;
      border-radius: 5px;
    }
    .column.col-hidden:hover { background: var(--color-chrome-mid); }
    .col-hidden-label {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-size: 10px;
      font-weight: 600;
      color: var(--color-ink-3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .col-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 3px;
      margin-bottom: 6px;
    }
    .col-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--color-ink-2);
    }
    .col-count {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--color-ink-3);
    }
    .col-spacer { flex: 1; }
    .col-menu-btn {
      width: 20px; height: 20px;
      display: grid;
      place-items: center;
      border-radius: 4px;
      color: var(--color-ink-4);
    }
    .col-menu-btn:hover { background: var(--color-chrome-mid); color: var(--color-ink-2); }
    .col-add-btn {
      width: 20px; height: 20px;
      display: grid;
      place-items: center;
      border-radius: 4px;
      color: var(--color-ink-4);
      font-size: 14px;
      font-weight: 500;
    }
    .col-add-btn:hover { background: var(--color-chrome-mid); color: var(--color-ink-2); }

    .col-cards {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      min-height: 40px;
      overflow-y: auto;
      border-radius: 5px;
      scrollbar-width: thin;
    }
    .col-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 0;
      font-size: 11px;
      color: var(--color-ink-4);
    }
    .card-add {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 26px;
      color: var(--color-ink-4);
      border-radius: 5px;
      font-size: 13px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .card-add:hover { background: var(--color-chrome-mid); color: var(--color-ink-3); }
    .col-drop-active .col-cards { background: var(--color-accent-tint); }

    /* ── Card ── */
    .card {
      position: relative;
      min-height: 80px;
      padding: 8px 10px 7px;
      background: var(--color-surface);
      border: 1px solid var(--color-rule-light);
      border-radius: 6px;
    }
    .card:hover { background: var(--color-chrome-high); }
    .card.dragging { opacity: 0.35; }
    .card.card-done { opacity: 0.55; }
    .card.card-done:hover { opacity: 0.75; }
    .card-title-row {
      display: flex;
      gap: 5px;
      align-items: flex-start;
      padding-right: 24px;
    }
    .card-title {
      font-size: 12px;
      line-height: 1.35;
      font-weight: 600;
      color: var(--color-ink);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .card-status .status-token { margin-top: 1px; }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 6px;
      flex-wrap: wrap;
      min-height: 20px;
    }
    .card-created {
      margin-top: 5px;
      font-size: 10px;
      color: var(--color-ink-4);
    }
    .card-assignee {
      position: absolute;
      top: 7px;
      right: 7px;
    }
    .card-priority { border-radius: 50%; }
    .card-project {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      color: var(--color-ink-4);
    }

    /* ── Status Tokens ── */
    .status-token {
      width: 13px; height: 13px;
      flex: 0 0 13px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
    }
    .status-backlog {
      border: 1.5px dotted var(--color-ink-4);
    }
    .status-plan {
      border: 1.5px solid var(--color-ink-3);
    }
    .status-progress {
      border: 1.5px solid var(--color-accent);
      background: linear-gradient(to right, var(--color-accent) 50%, transparent 50%);
    }
    .status-review {
      border: 1.5px solid var(--color-accent);
    }
    .status-done {
      background: var(--color-accent);
    }
    .status-done::before {
      content: "";
      width: 5.5px; height: 3px;
      border-left: 1.5px solid var(--color-accent-ink, #fff);
      border-bottom: 1.5px solid var(--color-accent-ink, #fff);
      transform: rotate(-45deg);
      margin-top: -1px;
    }

    /* ── Priority Bars ── */
    .priority-bars {
      width: 13px; height: 11px;
      display: inline-flex;
      align-items: flex-end;
      justify-content: center;
      gap: 1.5px;
    }
    .priority-bars i {
      width: 2px;
      border-radius: 1px 1px 0 0;
      background: currentColor;
      opacity: .2;
      font-style: normal;
    }
    .fm-priority { color: var(--color-ink-3); }

    /* ── Field Controls ── */
    .field-ctrl {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid transparent;
      border-radius: 10px;
      color: var(--color-ink-3);
      line-height: 1;
      padding: 2px;
    }
    .field-ctrl:hover, .field-ctrl.open {
      background: var(--color-chrome-mid);
      border-color: var(--color-rule-light);
    }

    /* ── Labels ── */
    .label-pill {
      height: 20px;
      padding: 0 7px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid var(--color-rule-light);
      border-radius: 10px;
      color: var(--color-ink-3);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .label-pill.compact { height: 17px; padding: 0 5px; font-size: 10px; }
    .label-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex: 0 0 6px;
    }

    /* ── Date Chips ── */
    .date-chip {
      height: 20px;
      padding: 0 6px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      border: 1px solid var(--color-rule-light);
      border-radius: 10px;
      color: var(--color-ink-3);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .date-chip.overdue { color: var(--color-rem, #c0392b); border-color: var(--color-rem, #c0392b); }
    .date-chip-inline {
      font-size: 10px;
      color: var(--color-ink-3);
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }
    .date-chip-inline.overdue { color: var(--color-rem, #c0392b); }

    /* ── Avatars ── */
    .avatar-sm {
      width: 20px; height: 20px;
      flex: 0 0 20px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      font-size: 9px;
      font-weight: 700;
      color: var(--color-accent-ink, #fff);
      background: var(--color-accent);
    }
    .avatar-sm.avatar-empty {
      background: transparent;
      border: 1.5px dashed var(--color-ink-4);
      color: var(--color-ink-4);
    }

    /* ── Field Menu ── */
    .field-menu {
      position: absolute;
      z-index: 95;
      width: 220px;
      padding: 5px;
      background: var(--color-surface);
      border: 1px solid var(--color-rule);
      border-radius: 9px;
      box-shadow: 0 12px 36px rgba(0,0,0,.14), 0 2px 8px rgba(0,0,0,.06);
      color: var(--color-ink-2);
      font-size: 12px;
    }
    .fm-title {
      height: 24px;
      padding: 0 7px;
      display: flex;
      align-items: center;
      color: var(--color-ink-4);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .fm-item {
      width: 100%;
      height: 28px;
      padding: 0 7px;
      display: flex;
      align-items: center;
      gap: 7px;
      border-radius: 5px;
      color: var(--color-ink-2);
      text-align: left;
      font-weight: 600;
      font-size: 12px;
    }
    .fm-item:hover, .fm-item:focus { background: var(--color-chrome-mid); outline: none; }
    .fm-item.selected { background: var(--color-chrome-mid); }
    .fm-item-label { flex: 1; min-width: 0; }
    .fm-check { color: var(--color-accent); font-weight: 800; font-size: 11px; }
    .fm-icon-muted { width: 13px; text-align: center; color: var(--color-ink-4); }
    .fm-input {
      width: 100%;
      height: 26px;
      margin: 2px 0;
      padding: 0 7px;
      border: 1px solid var(--color-rule-light);
      border-radius: 5px;
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--color-ink);
      background: var(--color-surface);
      outline: none;
    }
    .fm-input:focus { border-color: var(--color-accent); }
    .fm-input::placeholder { color: var(--color-ink-4); }
    .fm-date-input {
      width: 100%;
      height: 26px;
      margin: 2px 0;
      padding: 0 7px;
      border: 1px solid var(--color-rule-light);
      border-radius: 5px;
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--color-ink);
      background: var(--color-surface);
      outline: none;
    }
    .fm-date-input:focus { border-color: var(--color-accent); }
    .fm-sep {
      height: 1px;
      margin: 3px 4px;
      background: var(--color-rule-light);
    }
    .fm-colors {
      display: flex;
      gap: 3px;
      padding: 2px 7px 4px 28px;
    }
    .fm-color-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1.5px solid transparent;
    }
    .fm-color-dot:hover { border-color: var(--color-ink-3); }
    .fm-color-dot.active { border-color: var(--color-ink); }
    .fm-color-dot span {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: block;
    }

    /* ── Settings Popover ── */
    .settings-popover {
      position: absolute;
      top: 0;
      right: 10px;
      width: 260px;
      z-index: 30;
      padding: 12px;
      background: var(--color-surface);
      border: 1px solid var(--color-rule);
      border-radius: 9px;
      box-shadow: 0 12px 36px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.05);
      font-size: 12px;
    }
    .setting-row {
      min-height: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .setting-label { color: var(--color-ink-3); font-weight: 600; font-size: 11px; }
    .setting-select {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      border: 1px solid var(--color-rule-light);
      border-radius: 5px;
      color: var(--color-ink-3);
      font-size: 11px;
      font-weight: 600;
    }
    .settings-sep { height: 1px; margin: 8px 0; background: var(--color-rule-light); }
    .settings-subhead {
      margin-bottom: 6px;
      color: var(--color-ink-3);
      font-weight: 700;
      font-size: 11px;
    }
    .chip-list { display: flex; flex-wrap: wrap; gap: 4px; }
    .prop-chip {
      height: 20px;
      padding: 0 7px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--color-rule-light);
      border-radius: 10px;
      background: var(--color-chrome-high);
      color: var(--color-ink-3);
      font-size: 10px;
      font-weight: 650;
    }
    .prop-chip:hover { background: var(--color-chrome-mid); }
    .prop-chip.active {
      background: var(--color-accent-soft);
      border-color: var(--color-accent);
      color: var(--color-accent);
    }

    /* ── List View ── */
    .list-view {
      height: 100%;
      padding: 4px 8px 14px;
      overflow-y: auto;
    }
    .list-group-head {
      height: 30px;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 10px;
      color: var(--color-ink-2);
      font-weight: 700;
      font-size: 12px;
      background: var(--color-chrome-high);
      border-radius: 4px;
      margin-top: 2px;
    }
    .list-group-count {
      color: var(--color-ink-4);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
    }
    .list-row {
      height: 36px;
      display: grid;
      grid-template-columns: 26px 58px 20px minmax(0,1fr) auto 24px 50px;
      align-items: center;
      gap: 5px;
      padding: 0 12px 0 20px;
      border-radius: 4px;
    }
    .list-row:hover { background: var(--color-chrome-high); }
    .list-id {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--color-ink-4);
      font-weight: 600;
    }
    .list-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--color-ink);
      font-weight: 600;
      font-size: 12px;
    }
    .list-props {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
      min-width: 180px;
    }
    .list-assignee { display: grid; place-items: center; }
    .list-date {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--color-ink-4);
      text-align: right;
    }

    /* ── Detail View ── */
    .detail-layout {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      padding: 28px 14px 14px;
      overflow-y: auto;
    }
    .detail-center {
      display: grid;
      grid-template-columns: minmax(360px, 1fr) 240px;
      gap: 20px;
      width: 100%;
      max-width: 920px;
    }
    .detail-main { max-width: 660px; }
    .detail-title {
      display: block;
      width: 100%;
      border: none;
      outline: none;
      font-family: var(--font-sans);
      font-size: 20px;
      font-weight: 700;
      color: var(--color-ink);
      background: transparent;
      padding: 0;
      margin-bottom: 20px;
    }
    .detail-title::placeholder { color: var(--color-ink-4); }
    .detail-section { margin-bottom: 16px; }
    .detail-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--color-ink-4);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 5px;
    }
    .detail-textarea {
      display: block;
      width: 100%;
      min-height: 100px;
      resize: vertical;
      border: 1px solid var(--color-rule-light);
      border-radius: 5px;
      padding: 8px;
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.6;
      color: var(--color-ink);
      background: var(--color-surface);
      outline: none;
    }
    .detail-textarea:focus { border-color: var(--color-accent); }
    .detail-textarea::placeholder { color: var(--color-ink-4); }
    .detail-rule { height: 1px; background: var(--color-rule-light); margin: 16px 0; }
    .detail-created-line {
      font-size: 11px;
      color: var(--color-ink-4);
      padding: 4px 0;
    }
    .detail-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--color-ink-4);
    }

    /* ── Detail Sidebar ── */
    .detail-sidebar { padding-top: 2px; }
    .prop-card {
      margin-bottom: 6px;
      padding: 10px 12px;
      border: 1px solid var(--color-rule-light);
      border-radius: 7px;
    }
    .prop-card-title {
      margin-bottom: 8px;
      color: var(--color-ink-3);
      font-size: 11px;
      font-weight: 700;
    }
    .prop-row {
      width: 100%;
      height: 28px;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 5px;
      border-radius: 4px;
      border: 1px solid transparent;
      color: var(--color-ink-2);
      font-size: 12px;
      font-weight: 600;
      text-align: left;
    }
    .prop-row:hover { background: var(--color-chrome-mid); border-color: var(--color-rule-light); }
    .prop-muted { color: var(--color-ink-4); }
    .prop-add { margin-left: auto; color: var(--color-ink-4); font-size: 13px; }
    .detail-meta {
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--color-ink-4);
      margin-bottom: 8px;
    }
    .detail-delete {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--color-rem, #c0392b);
      padding: 3px 6px;
      border-radius: 4px;
    }
    .detail-delete:hover { background: rgba(192,60,60,.08); }

    /* ── Create Modal ── */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 80;
      background: rgba(0,0,0,.22);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 100px;
    }
    .create-modal {
      width: 580px;
      max-width: 95vw;
      background: var(--color-surface);
      border: 1px solid var(--color-rule);
      border-radius: 14px;
      box-shadow: 0 16px 48px rgba(0,0,0,.16), 0 2px 8px rgba(0,0,0,.06);
      overflow: hidden;
    }
    .create-header {
      height: 34px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 7px;
      color: var(--color-ink-3);
      font-size: 12px;
      font-weight: 600;
    }
    .create-team {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      border: 1px solid var(--color-rule-light);
      border-radius: 8px;
      font-size: 11px;
    }
    .create-sep { color: var(--color-ink-4); }
    .create-spacer { flex: 1; }
    .create-close {
      width: 22px; height: 22px;
      display: grid;
      place-items: center;
      border-radius: 4px;
      color: var(--color-ink-3);
    }
    .create-close:hover { background: var(--color-chrome-mid); }
    .create-body { padding: 14px 16px 10px; }
    .name-prompt {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 10px;
      font-size: 12px;
      color: var(--color-ink-3);
    }
    .name-input {
      flex: 1;
      border: 1px solid var(--color-accent);
      border-radius: 5px;
      padding: 3px 7px;
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--color-ink);
      background: var(--color-surface);
      outline: none;
    }
    .create-title {
      min-height: 26px;
      font-size: 16px;
      font-weight: 600;
      color: var(--color-ink);
      outline: none;
      margin-bottom: 3px;
    }
    .create-title:empty::before {
      content: attr(data-placeholder);
      color: var(--color-ink-4);
    }
    .create-desc {
      color: var(--color-ink-4);
      width: 100%;
      min-height: 38px;
      padding: 0;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.35;
      margin-bottom: 14px;
    }
    .create-desc:not(:placeholder-shown) { color: var(--color-ink-2); }
    .create-desc::placeholder { color: var(--color-ink-4); }
    .create-chips {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }
    .create-chip {
      height: 24px;
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid var(--color-rule-light);
      border-radius: 12px;
      color: var(--color-ink-3);
      font-size: 11px;
      font-weight: 600;
    }
    .create-chip:hover { background: var(--color-chrome-mid); }
    .create-footer {
      height: 42px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      border-top: 1px solid var(--color-rule-light);
    }
    .create-more-toggle {
      display: inline-flex;
      align-items: center;
    }
    .toggle-track {
      width: 26px; height: 14px;
      padding: 2px;
      border-radius: 7px;
      background: var(--color-ink-4);
      display: inline-flex;
      align-items: center;
    }
    .create-more-toggle.on .toggle-track { background: var(--color-accent); justify-content: flex-end; }
    .toggle-knob {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--color-surface);
    }
    .create-more-label {
      font-size: 11px;
      color: var(--color-ink-3);
      font-weight: 600;
    }
    .create-submit {
      height: 26px;
      padding: 0 14px;
      background: var(--color-accent);
      color: var(--color-accent-ink, #fff);
      border-radius: 13px;
      font-size: 12px;
      font-weight: 700;
      margin-left: auto;
    }
    .create-submit:hover { opacity: .9; }
    .create-submit:disabled { opacity: .55; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      z-index: 90;
      left: 50%;
      bottom: 16px;
      height: 28px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      transform: translateX(-50%);
      border: 1px solid var(--color-rule);
      border-radius: 14px;
      background: var(--color-surface);
      box-shadow: 0 6px 18px rgba(0,0,0,.12);
      color: var(--color-ink-2);
      font-size: 12px;
      font-weight: 650;
    }

    /* ── Offer ── */
    .offer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      height: 100%;
      text-align: center;
      padding: 20px;
    }
    .offer-title { font-size: 13px; color: var(--color-ink-2); margin-bottom: 5px; font-weight: 600; }
    .offer-sub { font-size: 11px; color: var(--color-ink-3); max-width: 240px; line-height: 1.5; margin-bottom: 12px; }
    .offer-btn {
      height: 26px;
      padding: 0 12px;
      border-radius: 13px;
      background: var(--color-accent);
      color: var(--color-accent-ink, #fff);
      font-size: 11px;
      font-weight: 600;
    }
    .offer-btn:hover { opacity: .9; }
    .offer-error { font-size: 11px; color: var(--color-rem, #c0392b); max-width: 240px; line-height: 1.5; margin-top: 8px; }

    /* ── Loading ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--color-ink-4);
      font-size: 12px;
    }

    /* ── Keyboard hint ── */
    .kbd-hint {
      position: fixed;
      bottom: 5px;
      right: 8px;
      font-family: var(--font-mono);
      font-size: 8px;
      color: var(--color-ink-4);
      z-index: 1;
    }
    .kbd-hint kbd {
      background: var(--color-chrome);
      border: 1px solid var(--color-rule-light);
      border-radius: 3px;
      padding: 1px 3px;
      font-family: var(--font-mono);
      font-size: 8px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { init } from './js/render.js'
    init()
  </script>
</body>
</html>
