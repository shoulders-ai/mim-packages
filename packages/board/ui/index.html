<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/sdk/tokens.css">
  <title>Board</title>
  <style>
    /* ── Layout ── */
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; }

    .toolbar {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: 6px var(--space-md);
      border-bottom: 1px solid var(--color-rule-light);
      flex-shrink: 0;
    }
    .toolbar-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-ink-2);
    }
    .toolbar-spacer { flex: 1; }

    /* ── Filter pills ── */
    .filter-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .filter-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 22px;
      padding: 0 7px;
      border-radius: var(--radius-sm);
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 500;
      color: var(--color-ink-3);
      border: 1px solid transparent;
    }
    .filter-pill:hover { color: var(--color-ink-2); background: var(--color-chrome-mid); }
    .filter-pill.active {
      color: var(--color-accent);
      border-color: var(--color-accent);
      background: var(--color-accent-soft);
    }
    .filter-pill .fpill-dot {
      width: 5px; height: 5px; border-radius: 50%;
    }

    .filter-sep {
      width: 1px;
      height: 14px;
      background: var(--color-rule-light);
      margin: 0 4px;
    }

    .sort-select {
      font-family: var(--font-sans);
      font-size: 10px;
      color: var(--color-ink-3);
      background: transparent;
      border: 1px solid var(--color-rule-light);
      border-radius: var(--radius-sm);
      padding: 2px 6px;
      height: 22px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    .sort-select:focus { border-color: var(--color-accent); }

    .search-box {
      display: flex;
      align-items: center;
      gap: 5px;
      height: 26px;
      padding: 0 8px;
      border-radius: var(--radius-md);
      background: var(--color-chrome-mid);
      border: 1px solid var(--color-rule-light);
    }
    .search-box:focus-within { border-color: var(--color-accent); }
    .search-box svg { flex-shrink: 0; color: var(--color-ink-3); }
    .search-input {
      flex: 1;
      min-width: 0;
      width: 160px;
      background: transparent;
      border: none;
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--color-ink);
      outline: none;
      padding: 0;
    }
    .search-input::placeholder { color: var(--color-ink-3); }

    .board {
      display: flex;
      gap: var(--space-md);
      flex: 1;
      min-height: 0;
      padding: var(--space-sm) var(--space-md) var(--space-md);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .board::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    /* ── Column ── */
    .column {
      display: flex;
      flex-direction: column;
      min-width: 180px;
      flex: 1;
    }
    .column.col-hidden {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 28px;
      flex: 0 0 28px;
      padding: 10px 4px;
      border-radius: var(--radius-sm);
    }
    .column.col-hidden:hover { background: var(--color-chrome-mid); }
    .col-hidden-label {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 600;
      color: var(--color-ink-3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .col-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: var(--space-sm) 2px;
      border-bottom: 1px solid var(--color-rule-light);
    }
    .col-header-menu {
      margin-left: auto;
      position: relative;
      opacity: 0;
      transition: opacity 0.1s;
    }
    .col-header:hover .col-header-menu { opacity: 1; }
    .col-menu-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: var(--radius-sm);
      color: var(--color-ink-3);
    }
    .col-menu-btn:hover { color: var(--color-ink-2); background: var(--color-chrome-mid); }
    .col-menu {
      position: absolute;
      z-index: 50;
      top: 100%;
      right: 0;
      min-width: 140px;
      padding: 4px;
      background: var(--color-surface);
      border: 1px solid var(--color-rule);
      border-radius: var(--radius-md);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.18);
    }
    .col-menu-item {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      height: 26px;
      padding: 0 8px;
      border-radius: var(--radius-sm);
      color: var(--color-ink-2);
      font-family: var(--font-sans);
      font-size: 11px;
      text-align: left;
    }
    .col-menu-item:hover { background: var(--color-chrome-mid); color: var(--color-ink); }

    .col-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .col-dot--backlog   { background: var(--color-ink-4); }
    .col-dot--plan      { background: var(--color-ink-3); }
    .col-dot--in-progress { background: var(--color-accent); }
    .col-dot--review    { background: color-mix(in srgb, var(--color-accent) 60%, var(--color-ink-3)); }
    .col-dot--done      { background: var(--color-add); }

    .col-label {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 600;
      color: var(--color-ink-2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .col-count {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--color-ink-3);
      background: var(--color-chrome);
      border-radius: 100px;
      padding: 1px 5px;
      min-width: 18px;
      text-align: center;
    }
    .col-cards {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-top: var(--space-sm);
      flex: 1;
      min-height: 40px;
      overflow-y: auto;
      border-radius: var(--radius-sm);
      transition: background 0.15s;
    }
    .col-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-lg) 0;
      font-family: var(--font-sans);
      font-size: 10px;
      color: var(--color-ink-3);
    }
    .col-add {
      width: 100%;
      text-align: left;
      font-family: var(--font-sans);
      font-size: 10.5px;
      color: var(--color-ink-3);
      padding: 4px 6px;
      border-radius: var(--radius-sm);
      margin-top: 2px;
      flex-shrink: 0;
    }
    .col-add:hover { color: var(--color-ink-2); background: var(--color-chrome-mid); }

    .col-drop-active .col-cards {
      background: var(--color-accent-tint);
    }

    /* ── Drop indicator line ── */
    .drop-line {
      height: 2px;
      border-radius: 1px;
      background: var(--color-accent);
      margin: -1px 4px;
      flex-shrink: 0;
    }

    /* ── Card ── */
    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-rule-light);
      border-radius: var(--radius-md);
      padding: var(--space-sm);
      transition: background 0.1s, opacity 0.15s;
    }
    .card:hover { background: var(--color-chrome-high); }
    .card.dragging { opacity: 0.3; }
    .card.card--done { opacity: 0.55; }
    .card.card--done:hover { opacity: 0.75; }

    .card-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }
    .card-title {
      flex: 1;
      font-family: var(--font-sans);
      font-size: 11.5px;
      font-weight: 500;
      color: var(--color-ink);
      line-height: 1.35;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .priority-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .priority-dot--urgent   { background: var(--color-rem); }
    .priority-dot--high     { background: #d08030; }
    .priority-dot--normal   { background: var(--color-accent); }
    .priority-dot--low      { background: var(--color-ink-3); }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }
    .card-date {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--color-ink-3);
    }
    .card-tags {
      display: flex;
      gap: 3px;
      flex-wrap: wrap;
    }
    .card-tag {
      font-family: var(--font-sans);
      font-size: 9px;
      color: var(--color-ink-3);
      background: var(--color-chrome);
      border-radius: 3px;
      padding: 1px 4px;
    }

    /* ── Inline Add Form ── */
    .inline-form {
      background: var(--color-surface);
      border: 1px solid var(--color-accent);
      border-radius: var(--radius-md);
      padding: var(--space-sm);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .inline-form input[type="text"] {
      font-family: var(--font-sans);
      font-size: 11.5px;
      border: none;
      padding: 2px 0;
      background: transparent;
      color: var(--color-ink);
      outline: none;
    }
    .inline-form input[type="text"]::placeholder { color: var(--color-ink-3); }
    .inline-form-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .inline-form select {
      font-family: var(--font-sans);
      font-size: 10px;
      color: var(--color-ink-2);
      background: var(--color-chrome-mid);
      border: 1px solid var(--color-rule-light);
      border-radius: var(--radius-sm);
      padding: 2px 4px;
      outline: none;
    }
    .inline-form-btn {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
    }
    .inline-form-btn--save {
      background: var(--color-accent);
      color: var(--color-accent-ink);
    }
    .inline-form-btn--save:hover { opacity: 0.9; }
    .inline-form-btn--cancel {
      color: var(--color-ink-3);
    }
    .inline-form-btn--cancel:hover { color: var(--color-ink-2); }

    /* ── Detail Overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 60px;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .overlay.visible { opacity: 1; }
    .detail {
      background: var(--color-surface);
      border: 1px solid var(--color-rule);
      border-radius: var(--radius-lg);
      width: 520px;
      max-width: 95vw;
      max-height: calc(100vh - 120px);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      transform: translateY(8px);
      transition: transform 0.15s;
    }
    .overlay.visible .detail { transform: translateY(0); }

    .detail-header {
      display: flex;
      align-items: flex-start;
      gap: var(--space-sm);
      padding: var(--space-md);
      border-bottom: 1px solid var(--color-rule-light);
    }
    .detail-title-input {
      display: block;
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font-sans);
      font-size: 16px;
      font-weight: 400;
      color: var(--color-ink);
      padding: 0;
    }
    .detail-title-input::placeholder { color: var(--color-ink-3); }
    .detail-close {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: var(--radius-sm);
      color: var(--color-ink-3);
      font-size: 16px;
      line-height: 1;
      flex-shrink: 0;
    }
    .detail-close:hover { background: var(--color-chrome-mid); color: var(--color-ink-2); }

    .detail-props {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      padding: var(--space-sm) var(--space-md);
      border-bottom: 1px solid var(--color-rule-light);
    }
    .prop-pill {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 26px;
      padding: 0 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-rule-light);
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--color-ink-2);
    }
    .prop-pill:hover { background: var(--color-chrome-mid); }
    .prop-pill select {
      border: none;
      background: transparent;
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--color-ink-2);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      padding-right: 2px;
    }

    .detail-body {
      padding: var(--space-md);
      flex: 1;
    }
    .detail-label {
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      color: var(--color-ink-3);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 6px;
    }
    .detail-textarea {
      display: block;
      width: 100%;
      min-height: 100px;
      resize: vertical;
      border: 1px solid var(--color-rule-light);
      border-radius: var(--radius-sm);
      padding: var(--space-sm);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.6;
      color: var(--color-ink);
      background: var(--color-surface);
      outline: none;
    }
    .detail-textarea:focus { border-color: var(--color-accent); }
    .detail-textarea::placeholder { color: var(--color-ink-3); }

    .detail-tags {
      padding: 0 var(--space-md) var(--space-sm);
    }
    .detail-tags-label {
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      color: var(--color-ink-3);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 6px;
    }
    .detail-tags-row {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }
    .detail-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-family: var(--font-sans);
      font-size: 10px;
      color: var(--color-ink-2);
      background: var(--color-chrome);
      border-radius: 3px;
      padding: 2px 6px;
      height: 20px;
    }
    .detail-tag-x {
      color: var(--color-ink-3);
      font-size: 12px;
      line-height: 1;
    }
    .detail-tag-x:hover { color: var(--color-ink); }
    .detail-tag-add {
      font-family: var(--font-sans);
      font-size: 10px;
      color: var(--color-ink-3);
      padding: 2px 6px;
      height: 20px;
      border-radius: 3px;
    }
    .detail-tag-add:hover { background: var(--color-chrome-mid); color: var(--color-ink-2); }
    .detail-tag-input {
      font-family: var(--font-sans);
      font-size: 10px;
      border: 1px solid var(--color-accent);
      border-radius: 3px;
      padding: 2px 6px;
      height: 20px;
      width: 80px;
      background: var(--color-surface);
      color: var(--color-ink);
      outline: none;
    }

    .detail-footer {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md) var(--space-md);
    }
    .detail-footer-spacer { flex: 1; }
    .detail-delete {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      color: var(--color-rem);
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-rem);
    }
    .detail-delete:hover { background: rgba(192, 93, 60, 0.08); }
    .detail-date {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--color-ink-3);
    }

    /* ── Loading ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--color-ink-3);
      font-size: 12px;
    }

    /* ── No-folder offer panel ── */
    .offer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      padding: var(--space-lg);
    }
    .offer-title {
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--color-ink-2);
      margin-bottom: 4px;
    }
    .offer-sub {
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--color-ink-3);
      max-width: 260px;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .offer-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 28px;
      padding: 0 12px;
      border-radius: var(--radius-md);
      background: var(--color-accent);
      color: var(--color-accent-ink);
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
    }
    .offer-btn:hover { opacity: 0.9; }
    .offer-error {
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--color-danger, #c0392b);
      max-width: 260px;
      line-height: 1.5;
      margin-top: 10px;
    }

    /* ── Kbd hint ── */
    .kbd-hint {
      position: fixed;
      bottom: 8px;
      right: 12px;
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--color-ink-4);
    }
    .kbd-hint kbd {
      background: var(--color-chrome);
      border: 1px solid var(--color-rule-light);
      border-radius: 3px;
      padding: 1px 4px;
      font-family: var(--font-mono);
      font-size: 9px;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .board {
        flex-direction: column;
        gap: var(--space-lg);
        overflow-x: visible;
        overflow-y: auto;
      }
      .column { min-width: 0; }
      .filter-group { display: none; }
    }
  </style>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-title">Board</span>
  <div class="filter-group" id="filterGroup">
    <button class="filter-pill active" data-priority="all">All</button>
    <button class="filter-pill" data-priority="urgent"><span class="fpill-dot" style="background:var(--color-rem)"></span> Urgent</button>
    <button class="filter-pill" data-priority="high"><span class="fpill-dot" style="background:#d08030"></span> High</button>
    <button class="filter-pill" data-priority="normal"><span class="fpill-dot" style="background:var(--color-accent)"></span> Normal</button>
    <button class="filter-pill" data-priority="low"><span class="fpill-dot" style="background:var(--color-ink-3)"></span> Low</button>
  </div>
  <div class="filter-sep"></div>
  <select class="sort-select" id="sortSelect">
    <option value="priority">Sort: Priority</option>
    <option value="date-desc">Sort: Newest</option>
    <option value="date-asc">Sort: Oldest</option>
    <option value="alpha">Sort: A-Z</option>
  </select>
  <span class="toolbar-spacer"></span>
  <div class="search-box">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="searchInput" type="search" placeholder="Search issues..." autocorrect="off" autocapitalize="off">
  </div>
</div>

<div class="board" id="board">
  <div class="loading" id="loadingMsg">Loading...</div>
</div>

<!-- Detail overlay -->
<div class="overlay" id="overlay" style="display:none">
  <div class="detail" id="detail">
    <div class="detail-header">
      <input class="detail-title-input" id="detailTitle" type="text" placeholder="Issue title...">
      <button class="detail-close" id="detailClose" title="Close">&times;</button>
    </div>
    <div class="detail-props">
      <div class="prop-pill">
        <span class="col-dot" id="detailStatusDot"></span>
        <select id="detailStatus"></select>
      </div>
      <div class="prop-pill">
        <span class="priority-dot" id="detailPriorityDot"></span>
        <select id="detailPriority"></select>
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-label">Description</div>
      <textarea class="detail-textarea" id="detailBody" placeholder="Write here..."></textarea>
    </div>
    <div class="detail-tags" id="detailTagsSection">
      <div class="detail-tags-label">Labels</div>
      <div class="detail-tags-row" id="detailTagsRow"></div>
    </div>
    <div class="detail-footer">
      <span class="detail-date" id="detailDate"></span>
      <span class="detail-footer-spacer"></span>
      <button class="detail-delete" id="detailDelete">Delete</button>
    </div>
  </div>
</div>

<div class="kbd-hint"><kbd>N</kbd> new &nbsp; <kbd>/</kbd> search</div>

<script type="module">
import { runtime } from '/sdk/mim.js'

// ── Constants ──

const STATUSES = ['backlog', 'plan', 'in-progress', 'review', 'done']
const STATUS_LABELS = {
  'backlog': 'Backlog',
  'plan': 'Plan',
  'in-progress': 'In Progress',
  'review': 'Review',
  'done': 'Done',
}
const PRIORITIES = ['urgent', 'high', 'normal', 'low']
const PRIORITY_LABELS = {
  'urgent': 'Urgent',
  'high': 'High',
  'normal': 'Normal',
  'low': 'Low',
}
const PRIORITY_WEIGHT = { urgent: 4, high: 3, normal: 2, low: 1 }

// Lenient mapping for legacy in-list values so the board never crashes on old data.
const STATUS_ALIAS = { todo: 'backlog' }
const PRIORITY_ALIAS = { critical: 'urgent', medium: 'normal', none: 'normal' }

function normStatus(s) {
  if (STATUS_ALIAS[s]) return STATUS_ALIAS[s]
  return STATUSES.includes(s) ? s : 'backlog'
}
function normPriority(p) {
  if (PRIORITY_ALIAS[p]) return PRIORITY_ALIAS[p]
  return PRIORITIES.includes(p) ? p : 'normal'
}

// Normalize a server entity (issues.list item or issues.get result) into the
// flat shape the board renders. `body` is present only after issues.get.
function normIssue(raw) {
  return {
    id: raw.id,
    title: raw.title || '',
    status: normStatus(raw.status),
    priority: normPriority(raw.priority),
    tags: Array.isArray(raw.tags) ? raw.tags : [],
    created: raw.created || '',
    updated: raw.updated || '',
    body: typeof raw.body === 'string' ? raw.body : undefined,
  }
}

// ── State ──

let issues = []
let folderPresent = true
let searchQuery = ''
let priorityFilter = 'all'  // 'all' | 'urgent' | 'high' | 'normal' | 'low'
let sortMode = 'priority'   // 'priority' | 'date-desc' | 'date-asc' | 'alpha'
let hiddenStatuses = new Set()
let openDetailId = null
let addingInColumn = null
let dragEntryId = null
let dragOverStatus = null
let dragOverIndex = -1  // insertion index within column
let saveTimer = null     // debounce timer for detail saves

// ── Data access (core tools via runtime SDK) ──

async function loadIssues() {
  const result = await runtime.call('issues.list', {})
  folderPresent = result.folderPresent !== false
  issues = (result.items || []).map(normIssue)
}

// Persist the mutable fields of an issue to the core tool. Returns the
// server's updated entity merged back into the local cache.
async function saveIssue(issue) {
  const result = await runtime.call('issues.update', {
    id: issue.id,
    title: issue.title,
    status: issue.status,
    priority: issue.priority,
    tags: issue.tags,
    body: issue.body || '',
  })
  if (result && result.folderPresent === false) { folderPresent = false; return }
  if (result && result.id) {
    const merged = normIssue(result)
    // Preserve a loaded body even if a list-style result came back.
    if (merged.body === undefined) merged.body = issue.body
    const idx = issues.findIndex(i => i.id === issue.id)
    if (idx !== -1) issues[idx] = merged
  }
}

async function createIssue(title, priority, status) {
  const result = await runtime.call('issues.create', {
    title,
    status: status || 'backlog',
    priority: priority || 'normal',
  })
  if (!result || result.folderPresent === false) { folderPresent = false; render(); return null }
  const issue = normIssue(result)
  if (issue.body === undefined) issue.body = ''
  issues.push(issue)
  return issue
}

async function deleteIssue(id) {
  const issue = issues.find(i => i.id === id)
  if (!issue) return
  await runtime.call('issues.delete', { id })
  issues = issues.filter(i => i.id !== id)
}

// Lazily fetch the full body for an issue (list items omit it).
async function ensureBody(issue) {
  if (typeof issue.body === 'string') return issue.body
  try {
    const full = await runtime.call('issues.get', { id: issue.id })
    issue.body = typeof full.body === 'string' ? full.body : ''
  } catch {
    issue.body = ''
  }
  return issue.body
}

// ── Filtering & Sorting ──

function getFilteredIssues(status) {
  const q = searchQuery.toLowerCase()
  let result = issues
    .filter(i => i.status === status)
    .filter(i => {
      if (!q) return true
      return (i.title || '').toLowerCase().includes(q) || (i.body || '').toLowerCase().includes(q)
    })
    .filter(i => {
      if (priorityFilter === 'all') return true
      return i.priority === priorityFilter
    })

  // Sort
  switch (sortMode) {
    case 'priority':
      result.sort((a, b) => (PRIORITY_WEIGHT[b.priority] || 0) - (PRIORITY_WEIGHT[a.priority] || 0))
      break
    case 'date-desc':
      result.sort((a, b) => new Date(b.created || 0) - new Date(a.created || 0))
      break
    case 'date-asc':
      result.sort((a, b) => new Date(a.created || 0) - new Date(b.created || 0))
      break
    case 'alpha':
      result.sort((a, b) => (a.title || '').localeCompare(b.title || ''))
      break
  }

  return result
}

// ── Render ──

const boardEl = document.getElementById('board')
const loadingEl = document.getElementById('loadingMsg')

// Offer-not-block panel shown when the issues/ folder does not exist.
function renderOffer() {
  const wrap = document.createElement('div')
  wrap.className = 'offer'
  wrap.innerHTML = `
    <div class="offer-title">No issues/ folder yet</div>
    <div class="offer-sub">The Board stores issues in an <code>issues/</code> folder in your workspace. Create it to start tracking work.</div>
    <button class="offer-btn" id="offerCreate">Create issues folder</button>
    <div class="offer-error" id="offerError" hidden></div>
  `
  boardEl.appendChild(wrap)
  const btn = wrap.querySelector('#offerCreate')
  const errEl = wrap.querySelector('#offerError')
  btn.addEventListener('click', async () => {
    btn.disabled = true
    errEl.hidden = true
    try {
      await runtime.call('app.enable', { app: 'issues' })
      await loadIssues()
      render()
    } catch (err) {
      console.warn('[board] enable error:', err)
      errEl.textContent = 'Could not create the issues folder: ' + (err && err.message ? err.message : String(err))
      errEl.hidden = false
      btn.disabled = false
    }
  })
}

function render() {
  boardEl.innerHTML = ''

  if (!folderPresent) {
    renderOffer()
    return
  }

  for (const status of STATUSES) {
    // Hidden/collapsed column
    if (hiddenStatuses.has(status)) {
      const allInCol = issues.filter(i => i.status === status)
      const colEl = document.createElement('div')
      colEl.className = 'column col-hidden'
      colEl.dataset.status = status
      colEl.innerHTML = `
        <span class="col-dot col-dot--${status}"></span>
        <span class="col-count">${allInCol.length}</span>
        <span class="col-hidden-label">${STATUS_LABELS[status]}</span>
      `
      colEl.addEventListener('click', () => {
        hiddenStatuses.delete(status)
        render()
      })
      // Allow dropping on collapsed columns
      colEl.addEventListener('dragover', (e) => {
        e.preventDefault()
        e.dataTransfer.dropEffect = 'move'
        if (dragOverStatus !== status) { dragOverStatus = status; dragOverIndex = 0 }
      })
      colEl.addEventListener('drop', (e) => {
        e.preventDefault()
        const entryId = e.dataTransfer.getData('text/plain')
        dragOverStatus = null; dragOverIndex = -1; dragEntryId = null
        if (entryId) handleDrop(entryId, status, 0)
      })
      boardEl.appendChild(colEl)
      continue
    }

    const colEntries = getFilteredIssues(status)

    const colEl = document.createElement('div')
    colEl.className = 'column'
    if (dragOverStatus === status && dragEntryId) colEl.classList.add('col-drop-active')
    colEl.dataset.status = status

    // Header
    const header = document.createElement('div')
    header.className = 'col-header'
    header.innerHTML = `
      <span class="col-dot col-dot--${status}"></span>
      <span class="col-label">${STATUS_LABELS[status]}</span>
      <span class="col-count">${colEntries.length}</span>
      <div class="col-header-menu">
        <button class="col-menu-btn" data-menu-toggle="${status}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
        </button>
      </div>
    `
    colEl.appendChild(header)

    // Cards container
    const cardsEl = document.createElement('div')
    cardsEl.className = 'col-cards'

    // Drop zone events on cards container
    cardsEl.addEventListener('dragover', (e) => {
      e.preventDefault()
      e.dataTransfer.dropEffect = 'move'
      dragOverStatus = status

      // Calculate drop index based on cursor Y position
      const cards = cardsEl.querySelectorAll('.card')
      let newIndex = cards.length
      for (let i = 0; i < cards.length; i++) {
        const rect = cards[i].getBoundingClientRect()
        const midY = rect.top + rect.height / 2
        if (e.clientY < midY) {
          newIndex = i
          break
        }
      }
      if (dragOverIndex !== newIndex) {
        dragOverIndex = newIndex
        render()
      }
    })
    cardsEl.addEventListener('dragleave', (e) => {
      if (!colEl.contains(e.relatedTarget)) {
        if (dragOverStatus === status) {
          dragOverStatus = null
          dragOverIndex = -1
          render()
        }
      }
    })
    cardsEl.addEventListener('drop', (e) => {
      e.preventDefault()
      const entryId = e.dataTransfer.getData('text/plain')
      const dropIdx = dragOverIndex
      dragOverStatus = null
      dragOverIndex = -1
      dragEntryId = null
      if (entryId) handleDrop(entryId, status, dropIdx)
    })

    if (colEntries.length === 0 && addingInColumn !== status && !(dragOverStatus === status && dragEntryId)) {
      const empty = document.createElement('div')
      empty.className = 'col-empty'
      empty.textContent = 'No issues'
      cardsEl.appendChild(empty)
    }

    for (let i = 0; i < colEntries.length; i++) {
      // Drop line before card
      if (dragOverStatus === status && dragOverIndex === i && dragEntryId) {
        const line = document.createElement('div')
        line.className = 'drop-line'
        cardsEl.appendChild(line)
      }
      const card = renderCard(colEntries[i], status)
      cardsEl.appendChild(card)
    }
    // Drop line at end
    if (dragOverStatus === status && dragOverIndex === colEntries.length && dragEntryId) {
      const line = document.createElement('div')
      line.className = 'drop-line'
      cardsEl.appendChild(line)
    }

    colEl.appendChild(cardsEl)

    // Inline add form or add button
    if (addingInColumn === status) {
      colEl.appendChild(renderInlineForm(status))
    } else {
      const addBtn = document.createElement('button')
      addBtn.className = 'col-add'
      addBtn.textContent = '+ Add issue'
      addBtn.addEventListener('click', () => {
        addingInColumn = status
        render()
        requestAnimationFrame(() => {
          const inp = boardEl.querySelector('.inline-form input[type="text"]')
          if (inp) inp.focus()
        })
      })
      colEl.appendChild(addBtn)
    }

    boardEl.appendChild(colEl)
  }
}

function renderCard(issue, colStatus) {
  const card = document.createElement('div')
  card.className = 'card'
  card.draggable = true
  card.dataset.id = issue.id

  if (dragEntryId === issue.id) card.classList.add('dragging')
  if (colStatus === 'done') card.classList.add('card--done')

  // Drag events
  card.addEventListener('dragstart', (e) => {
    dragEntryId = issue.id
    e.dataTransfer.setData('text/plain', issue.id)
    e.dataTransfer.effectAllowed = 'move'
    requestAnimationFrame(() => render())
  })
  card.addEventListener('dragend', () => {
    dragEntryId = null
    dragOverStatus = null
    dragOverIndex = -1
    render()
  })

  // Click to open detail
  card.addEventListener('click', () => openDetail(issue.id))

  const row = document.createElement('div')
  row.className = 'card-row'

  const titleSpan = document.createElement('span')
  titleSpan.className = 'card-title'
  titleSpan.textContent = issue.title || '(untitled)'
  row.appendChild(titleSpan)

  const dot = document.createElement('span')
  dot.className = `priority-dot priority-dot--${issue.priority || 'normal'}`
  row.appendChild(dot)

  card.appendChild(row)

  // Meta row: date + tags
  const hasMeta = issue.created || (issue.tags && issue.tags.length > 0)
  if (hasMeta) {
    const metaRow = document.createElement('div')
    metaRow.className = 'card-meta'

    if (issue.created) {
      const dateSpan = document.createElement('span')
      dateSpan.className = 'card-date'
      dateSpan.textContent = formatDate(issue.created)
      metaRow.appendChild(dateSpan)
    }

    if (issue.tags && issue.tags.length > 0) {
      const tagsDiv = document.createElement('div')
      tagsDiv.className = 'card-tags'
      for (const tag of issue.tags.slice(0, 3)) {
        const tagEl = document.createElement('span')
        tagEl.className = 'card-tag'
        tagEl.textContent = tag
        tagsDiv.appendChild(tagEl)
      }
      metaRow.appendChild(tagsDiv)
    }

    card.appendChild(metaRow)
  }

  return card
}

function renderInlineForm(status) {
  const form = document.createElement('div')
  form.className = 'inline-form'

  const titleInput = document.createElement('input')
  titleInput.type = 'text'
  titleInput.placeholder = 'Issue title...'

  const row = document.createElement('div')
  row.className = 'inline-form-row'

  const select = document.createElement('select')
  for (const p of PRIORITIES) {
    const opt = document.createElement('option')
    opt.value = p
    opt.textContent = PRIORITY_LABELS[p]
    if (p === 'normal') opt.selected = true
    select.appendChild(opt)
  }

  const saveBtn = document.createElement('button')
  saveBtn.className = 'inline-form-btn inline-form-btn--save'
  saveBtn.textContent = 'Add'
  saveBtn.addEventListener('click', async () => {
    const title = titleInput.value.trim()
    if (!title) return
    const created = await createIssue(title, select.value, status)
    if (created === null) return  // folder vanished; offer panel now shown
    addingInColumn = null
    render()
  })

  const cancelBtn = document.createElement('button')
  cancelBtn.className = 'inline-form-btn inline-form-btn--cancel'
  cancelBtn.textContent = 'Cancel'
  cancelBtn.addEventListener('click', () => {
    addingInColumn = null
    render()
  })

  row.appendChild(select)
  row.appendChild(document.createElement('span')).style.flex = '1'
  row.appendChild(cancelBtn)
  row.appendChild(saveBtn)

  form.appendChild(titleInput)
  form.appendChild(row)

  titleInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault()
      saveBtn.click()
    }
    if (e.key === 'Escape') {
      e.preventDefault()
      addingInColumn = null
      render()
    }
  })

  return form
}

// ── Drag & Drop ──

async function handleDrop(entryId, newStatus, dropIndex) {
  const issue = issues.find(i => i.id === entryId)
  if (!issue) return
  if (issue.status === newStatus && dropIndex === undefined) { render(); return }
  await ensureBody(issue)
  issue.status = newStatus
  render()
  await saveIssue(issue)
  render()
}

// ── Detail Overlay ──

const overlayEl = document.getElementById('overlay')
const detailEl = document.getElementById('detail')
const detailTitleEl = document.getElementById('detailTitle')
const detailStatusEl = document.getElementById('detailStatus')
const detailStatusDotEl = document.getElementById('detailStatusDot')
const detailPriorityEl = document.getElementById('detailPriority')
const detailPriorityDotEl = document.getElementById('detailPriorityDot')
const detailBodyEl = document.getElementById('detailBody')
const detailDateEl = document.getElementById('detailDate')
const detailDeleteEl = document.getElementById('detailDelete')
const detailCloseEl = document.getElementById('detailClose')
const detailTagsRowEl = document.getElementById('detailTagsRow')

// Populate selects
for (const s of STATUSES) {
  const opt = document.createElement('option')
  opt.value = s
  opt.textContent = STATUS_LABELS[s]
  detailStatusEl.appendChild(opt)
}
for (const p of PRIORITIES) {
  const opt = document.createElement('option')
  opt.value = p
  opt.textContent = PRIORITY_LABELS[p]
  detailPriorityEl.appendChild(opt)
}

async function openDetail(id) {
  const issue = issues.find(i => i.id === id)
  if (!issue) return
  openDetailId = id
  detailTitleEl.value = issue.title || ''
  detailStatusEl.value = issue.status || 'backlog'
  detailStatusDotEl.className = `col-dot col-dot--${issue.status || 'backlog'}`
  detailPriorityEl.value = issue.priority || 'normal'
  detailPriorityDotEl.className = `priority-dot priority-dot--${issue.priority || 'normal'}`
  detailBodyEl.value = ''
  detailDateEl.textContent = issue.created ? 'Created ' + formatDate(issue.created) : ''
  renderDetailTags()
  overlayEl.style.display = 'flex'
  requestAnimationFrame(() => {
    overlayEl.classList.add('visible')
    detailTitleEl.focus()
  })
  // Body is omitted from list items; fetch it lazily.
  await ensureBody(issue)
  if (openDetailId === id) detailBodyEl.value = issue.body || ''
}

function closeDetail() {
  if (openDetailId) saveDetailChangesImmediate()
  openDetailId = null
  overlayEl.classList.remove('visible')
  setTimeout(() => {
    overlayEl.style.display = 'none'
  }, 150)
  render()
}

function scheduleDetailSave() {
  if (saveTimer) clearTimeout(saveTimer)
  saveTimer = setTimeout(() => {
    saveDetailChangesImmediate()
  }, 600)
}

function saveDetailChangesImmediate() {
  if (saveTimer) { clearTimeout(saveTimer); saveTimer = null }
  const issue = issues.find(i => i.id === openDetailId)
  if (!issue) return
  issue.title = detailTitleEl.value.trim() || issue.title
  issue.status = detailStatusEl.value
  issue.priority = detailPriorityEl.value
  issue.body = detailBodyEl.value
  saveIssue(issue)
}

function renderDetailTags() {
  const issue = issues.find(i => i.id === openDetailId)
  if (!issue) return
  const tags = issue.tags || []
  detailTagsRowEl.innerHTML = ''
  for (const tag of tags) {
    const el = document.createElement('span')
    el.className = 'detail-tag'
    el.innerHTML = `${tag} <button class="detail-tag-x" data-tag="${tag}">&times;</button>`
    detailTagsRowEl.appendChild(el)
  }
  const addBtn = document.createElement('button')
  addBtn.className = 'detail-tag-add'
  addBtn.textContent = '+ Add'
  addBtn.addEventListener('click', () => startTagInput())
  detailTagsRowEl.appendChild(addBtn)
}

function startTagInput() {
  // Replace + Add with input
  const existing = detailTagsRowEl.querySelector('.detail-tag-add')
  if (existing) existing.remove()
  const input = document.createElement('input')
  input.className = 'detail-tag-input'
  input.placeholder = 'tag...'
  detailTagsRowEl.appendChild(input)
  input.focus()
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault()
      const val = input.value.trim().toLowerCase().replace(/[^a-z0-9-]/g, '')
      if (val) {
        const issue = issues.find(i => i.id === openDetailId)
        if (issue) {
          if (!issue.tags) issue.tags = []
          if (!issue.tags.includes(val)) {
            issue.tags.push(val)
            saveDetailChangesImmediate()
          }
        }
      }
      renderDetailTags()
    }
    if (e.key === 'Escape') {
      renderDetailTags()
    }
  })
  input.addEventListener('blur', () => renderDetailTags())
}

// Tag removal via delegation
detailTagsRowEl.addEventListener('click', (e) => {
  const btn = e.target.closest('.detail-tag-x')
  if (!btn) return
  const tag = btn.dataset.tag
  const issue = issues.find(i => i.id === openDetailId)
  if (issue && tag) {
    issue.tags = (issue.tags || []).filter(t => t !== tag)
    saveDetailChangesImmediate()
    renderDetailTags()
  }
})

// Close on overlay click (not detail click)
overlayEl.addEventListener('click', (e) => {
  if (e.target === overlayEl) closeDetail()
})

// Close button
detailCloseEl.addEventListener('click', () => closeDetail())

// Update dots and debounce save when selects change
detailStatusEl.addEventListener('change', () => {
  detailStatusDotEl.className = `col-dot col-dot--${detailStatusEl.value}`
  scheduleDetailSave()
})
detailPriorityEl.addEventListener('change', () => {
  detailPriorityDotEl.className = `priority-dot priority-dot--${detailPriorityEl.value}`
  scheduleDetailSave()
})

// Debounce save on title/body input
detailTitleEl.addEventListener('input', scheduleDetailSave)
detailBodyEl.addEventListener('input', scheduleDetailSave)

// Delete button
detailDeleteEl.addEventListener('click', async () => {
  const id = openDetailId
  if (!id) return
  openDetailId = null
  overlayEl.classList.remove('visible')
  setTimeout(() => { overlayEl.style.display = 'none' }, 150)
  await deleteIssue(id)
  render()
})

// ── Column menu (hide) ──

document.addEventListener('click', (e) => {
  const toggleBtn = e.target.closest('[data-menu-toggle]')
  if (toggleBtn) {
    const status = toggleBtn.dataset.menuToggle
    // Show menu
    const menuEl = document.createElement('div')
    menuEl.className = 'col-menu'
    menuEl.innerHTML = `<button class="col-menu-item" data-hide-col="${status}">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      Hide column
    </button>`
    toggleBtn.parentElement.appendChild(menuEl)

    const cleanup = (ev) => {
      if (!menuEl.contains(ev.target) && ev.target !== toggleBtn) {
        menuEl.remove()
        document.removeEventListener('click', cleanup)
      }
    }
    setTimeout(() => document.addEventListener('click', cleanup), 0)
    return
  }

  const hideBtn = e.target.closest('[data-hide-col]')
  if (hideBtn) {
    const status = hideBtn.dataset.hideCol
    hiddenStatuses.add(status)
    render()
  }
})

// ── Keyboard shortcuts ──

document.addEventListener('keydown', (e) => {
  // Don't intercept when in inputs
  const inInput = ['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement?.tagName)

  if (e.key === 'Escape') {
    if (openDetailId) {
      closeDetail()
      return
    }
    if (addingInColumn) {
      addingInColumn = null
      render()
      return
    }
  }

  if (inInput) return

  // N = new issue in first visible column
  if (e.key === 'n' || e.key === 'N') {
    e.preventDefault()
    const firstVisible = STATUSES.find(s => !hiddenStatuses.has(s)) || 'backlog'
    addingInColumn = firstVisible
    render()
    requestAnimationFrame(() => {
      const inp = boardEl.querySelector('.inline-form input[type="text"]')
      if (inp) inp.focus()
    })
    return
  }

  // / = focus search
  if (e.key === '/') {
    e.preventDefault()
    document.getElementById('searchInput').focus()
    return
  }
})

// ── Helpers ──

function formatDate(isoStr) {
  try {
    const d = new Date(isoStr)
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
  } catch { return '' }
}

// ── Search ──

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value
  render()
})

// ── Priority filter ──

document.getElementById('filterGroup').addEventListener('click', (e) => {
  const pill = e.target.closest('.filter-pill')
  if (!pill) return
  const val = pill.dataset.priority
  if (!val) return
  priorityFilter = val
  // Update active class
  document.querySelectorAll('.filter-pill').forEach(el => el.classList.remove('active'))
  pill.classList.add('active')
  render()
})

// ── Sort ──

document.getElementById('sortSelect').addEventListener('change', (e) => {
  sortMode = e.target.value
  render()
})

// ── Init ──

async function init() {
  try {
    await loadIssues()
  } catch (err) {
    console.warn('[board] init error:', err)
  }
  loadingEl.remove()
  render()
}

// Reload when workspace changes
runtime.on('workspace:changed', async () => {
  issues = []
  boardEl.innerHTML = ''
  const loader = document.createElement('div')
  loader.className = 'loading'
  loader.textContent = 'Loading...'
  boardEl.appendChild(loader)
  try {
    await loadIssues()
  } catch (err) {
    console.warn('[board] reload error:', err)
  }
  loader.remove()
  render()
})

// Reload when a core app is enabled/disabled elsewhere (mim.yaml flag changed; enable also creates the folder).
runtime.on('apps:changed', async () => {
  try {
    await loadIssues()
  } catch (err) {
    console.warn('[board] apps:changed reload error:', err)
  }
  render()
})

init()
</script>
</body>
</html>
