<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/sdk/tokens.css">
  <title>Knowledge</title>
  <style>
    /* ── Layout ── */
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; }

    .toolbar {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: 6px var(--space-md);
      border-bottom: 1px solid var(--color-rule-light);
      flex-shrink: 0;
    }
    .toolbar-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-ink-2);
    }
    .toolbar-spacer { flex: 1; }
    .search-box {
      display: flex;
      align-items: center;
      gap: 5px;
      height: 26px;
      padding: 0 8px;
      border-radius: var(--radius-md);
      background: var(--color-chrome-mid);
      border: 1px solid var(--color-rule-light);
    }
    .search-box:focus-within { border-color: var(--color-accent); }
    .search-box svg { flex-shrink: 0; color: var(--color-ink-3); }
    .search-input {
      flex: 1;
      min-width: 0;
      width: 180px;
      background: transparent;
      border: none;
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--color-ink);
      outline: none;
      padding: 0;
    }
    .search-input::placeholder { color: var(--color-ink-3); }

    .btn-new {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 26px;
      padding: 0 10px;
      border-radius: var(--radius-md);
      background: var(--color-accent);
      color: var(--color-accent-ink);
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
    }
    .btn-new:hover { opacity: 0.9; }

    /* ── Tag Bar ── */
    .tag-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px var(--space-md);
      border-bottom: 1px solid var(--color-rule-light);
      overflow-x: auto;
      flex-shrink: 0;
    }
    .tag-bar:empty { display: none; }
    .tag-chip {
      display: inline-flex;
      align-items: center;
      height: 20px;
      padding: 0 7px;
      border-radius: 100px;
      background: var(--color-chrome-mid);
      font-family: var(--font-sans);
      font-size: 10px;
      color: var(--color-ink-2);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tag-chip:hover { background: var(--color-chrome); }
    .tag-chip--active {
      background: var(--color-accent-soft);
      color: var(--color-accent);
    }

    /* ── Sort Toggle ── */
    .sort-toggle {
      font-family: var(--font-sans);
      font-size: 10px;
      color: var(--color-ink-3);
      padding: 0 6px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      border-radius: var(--radius-sm);
    }
    .sort-toggle:hover { color: var(--color-ink-2); background: var(--color-chrome-mid); }

    .view-toggle {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 2px;
      border-radius: var(--radius-sm);
      background: var(--color-chrome-mid);
      border: 1px solid var(--color-rule-light);
    }
    .view-toggle-btn {
      height: 20px;
      padding: 0 7px;
      border-radius: 3px;
      font-family: var(--font-sans);
      font-size: 10px;
      color: var(--color-ink-3);
    }
    .view-toggle-btn:hover { background: var(--color-chrome-high); color: var(--color-ink-2); }
    .view-toggle-btn--active {
      background: var(--color-surface);
      color: var(--color-ink);
    }
    .type-filter {
      height: 26px;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-rule-light);
      background: var(--color-chrome-mid);
      color: var(--color-ink-2);
      font-family: var(--font-sans);
      font-size: 11px;
      padding: 0 7px;
      outline: none;
    }
    .type-filter:focus { border-color: var(--color-accent); }

    /* ── Content Area ── */
    .content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: var(--space-md);
    }

    /* ── Card Grid ── */
    .card-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    }

    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-rule-light);
      border-radius: var(--radius-lg);
      padding: 12px;
      display: flex;
      flex-direction: column;
      cursor: default;
      transition: background 0.1s;
    }
    .card:hover { background: var(--color-chrome-high); }

    .card-title {
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 600;
      color: var(--color-ink);
      line-height: 1.35;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .card-type {
      font-family: var(--font-mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0;
      color: var(--color-ink-3);
      margin-bottom: 3px;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: 6px;
    }
    .card-tag {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 100px;
      background: var(--color-accent-soft);
      font-family: var(--font-sans);
      font-size: 10px;
      color: var(--color-accent);
    }
    .card-excerpt {
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--color-ink-3);
      line-height: 1.4;
      margin-top: 6px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
    .card-date {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--color-ink-4);
      margin-top: auto;
      padding-top: 8px;
    }

    /* ── Empty State ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: var(--space-lg);
    }
    .empty-icon {
      font-size: 28px;
      margin-bottom: 10px;
      opacity: 0.5;
    }
    .empty-title {
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--color-ink-2);
      margin-bottom: 4px;
    }
    .empty-sub {
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--color-ink-3);
      max-width: 240px;
      line-height: 1.5;
    }
    .empty-btn {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 28px;
      padding: 0 12px;
      border-radius: var(--radius-md);
      background: var(--color-accent);
      color: var(--color-accent-ink);
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
    }
    .empty-btn:hover { opacity: 0.9; }
    .empty-error {
      margin-top: 10px;
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--color-danger, #c0392b);
      max-width: 240px;
      line-height: 1.5;
    }
    .empty-content {
      color: var(--color-ink-3);
      font-style: italic;
    }

    /* ── Graph View ── */
    .graph-shell {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    .graph-meta {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--color-ink-3);
    }
    .graph-canvas {
      flex: 1;
      min-height: 520px;
      border: 1px solid var(--color-rule-light);
      border-radius: var(--radius-lg);
      background: var(--color-surface);
      overflow: hidden;
    }
    .graph-svg {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 520px;
    }
    .graph-edge {
      stroke: var(--color-rule);
      stroke-width: 1;
      opacity: 0.75;
    }
    .graph-edge--missing {
      stroke-dasharray: 4 4;
      opacity: 0.45;
    }
    .graph-node circle {
      stroke: var(--color-surface);
      stroke-width: 2;
    }
    .graph-node:hover circle {
      stroke: var(--color-accent);
    }
    .graph-node text {
      font-family: var(--font-sans);
      font-size: 10px;
      fill: var(--color-ink-2);
      paint-order: stroke;
      stroke: var(--color-surface);
      stroke-width: 3px;
      stroke-linejoin: round;
    }
    .graph-node-type {
      font-family: var(--font-mono);
      font-size: 8px;
      text-transform: uppercase;
      fill: var(--color-ink-4);
    }

    /* ── Loading ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--color-ink-3);
      font-size: 12px;
    }

    /* ── Detail Overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 48px;
      z-index: 100;
    }
    .detail {
      background: var(--color-surface);
      border: 1px solid var(--color-rule);
      border-radius: var(--radius-lg);
      width: 600px;
      max-width: 95vw;
      max-height: calc(100vh - 96px);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .detail-header {
      padding: var(--space-md);
      border-bottom: 1px solid var(--color-rule-light);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    .detail-title-input {
      display: block;
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font-sans);
      font-size: 16px;
      font-weight: 500;
      color: var(--color-ink);
      padding: 0;
    }
    .detail-title-input::placeholder { color: var(--color-ink-3); }
    .detail-open-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      font-family: var(--font-sans);
      font-size: 10px;
      color: var(--color-ink-3);
      flex-shrink: 0;
    }
    .detail-open-btn:hover { color: var(--color-ink-2); background: var(--color-chrome-mid); }

    .detail-tags-row {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      border-bottom: 1px solid var(--color-rule-light);
    }
    .detail-tags-label {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 500;
      color: var(--color-ink-3);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }
    .detail-tags-input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--color-ink);
      padding: 0;
    }
    .detail-tags-input::placeholder { color: var(--color-ink-3); }

    .detail-meta-row {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      border-bottom: 1px solid var(--color-rule-light);
    }
    .detail-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .detail-field-label {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 500;
      color: var(--color-ink-3);
      text-transform: uppercase;
      letter-spacing: 0;
    }
    .detail-select,
    .detail-summary-input {
      width: 100%;
      min-width: 0;
      height: 26px;
      border: 1px solid var(--color-rule-light);
      border-radius: var(--radius-sm);
      background: var(--color-surface);
      color: var(--color-ink);
      font-family: var(--font-sans);
      font-size: 11px;
      padding: 0 7px;
      outline: none;
    }
    .detail-summary-input::placeholder { color: var(--color-ink-3); }
    .detail-select:focus,
    .detail-summary-input:focus { border-color: var(--color-accent); }

    .detail-body {
      padding: var(--space-md);
      flex: 1;
    }
    .detail-body-view {
      font-family: var(--font-serif);
      font-size: 14px;
      line-height: 1.7;
      color: var(--color-ink);
      min-height: 120px;
      user-select: text;
      -webkit-user-select: text;
    }
    .detail-body-view h1, .detail-body-view h2, .detail-body-view h3 {
      font-family: var(--font-sans);
      font-weight: 600;
      margin-top: 1.2em;
      margin-bottom: 0.4em;
      color: var(--color-ink);
    }
    .detail-body-view h1 { font-size: 18px; }
    .detail-body-view h2 { font-size: 15px; }
    .detail-body-view h3 { font-size: 13px; }
    .detail-body-view p { margin-bottom: 0.7em; }
    .detail-body-view ul, .detail-body-view ol {
      margin-bottom: 0.7em;
      padding-left: 1.4em;
    }
    .detail-body-view li { margin-bottom: 0.2em; }
    .detail-body-view code {
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--color-chrome-mid);
      padding: 1px 4px;
      border-radius: 3px;
    }
    .detail-body-view pre {
      background: var(--color-chrome-mid);
      border: 1px solid var(--color-rule-light);
      border-radius: var(--radius-sm);
      padding: var(--space-sm);
      overflow-x: auto;
      margin-bottom: 0.7em;
    }
    .detail-body-view pre code {
      background: none;
      padding: 0;
    }
    .detail-body-view blockquote {
      border-left: 3px solid var(--color-accent);
      padding-left: var(--space-sm);
      color: var(--color-ink-2);
      margin-bottom: 0.7em;
    }
    .detail-body-view a {
      color: var(--color-accent);
      text-decoration: underline;
    }
    .detail-body-view strong { font-weight: 600; }
    .detail-body-view em { font-style: italic; }

    .detail-links {
      padding: 0 var(--space-md) var(--space-md);
    }
    .detail-links-label {
      display: block;
      margin-bottom: 5px;
      font-family: var(--font-mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0;
      color: var(--color-ink-4);
    }
    .detail-links-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .detail-link-item {
      display: grid;
      grid-template-columns: 100px minmax(0, 1fr);
      gap: var(--space-sm);
      align-items: center;
      min-height: 28px;
      padding: 4px 7px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-rule-light);
      color: var(--color-ink-2);
      text-align: left;
    }
    .detail-link-item:hover { background: var(--color-chrome-mid); }
    .detail-link-item[disabled] {
      opacity: 0.55;
    }
    .detail-link-rel {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--color-ink-3);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .detail-link-title {
      font-family: var(--font-sans);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .detail-textarea {
      display: block;
      width: 100%;
      min-height: 200px;
      resize: vertical;
      border: 1px solid var(--color-rule-light);
      border-radius: var(--radius-sm);
      padding: var(--space-sm);
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
      color: var(--color-ink);
      background: var(--color-surface);
      outline: none;
    }
    .detail-textarea:focus { border-color: var(--color-accent); }
    .detail-textarea::placeholder { color: var(--color-ink-3); }

    .detail-footer {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md) var(--space-md);
    }
    .detail-date {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--color-ink-4);
    }
    .detail-spacer { flex: 1; }
    .detail-edit-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 26px;
      padding: 0 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-rule-light);
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--color-ink-2);
    }
    .detail-edit-btn:hover { background: var(--color-chrome-mid); }
    .detail-edit-btn--active {
      background: var(--color-accent);
      color: var(--color-accent-ink);
      border-color: var(--color-accent);
    }
    .detail-edit-btn--active:hover { opacity: 0.9; background: var(--color-accent); }
    .detail-delete-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 26px;
      padding: 0 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-rem);
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      color: var(--color-rem);
    }
    .detail-delete-btn:hover { background: rgba(192, 93, 60, 0.08); }

    /* ── New Entry Form ── */
    .new-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 48px;
      z-index: 100;
    }
    .new-form {
      background: var(--color-surface);
      border: 1px solid var(--color-rule);
      border-radius: var(--radius-lg);
      width: 480px;
      max-width: 95vw;
      display: flex;
      flex-direction: column;
    }
    .new-form-header {
      padding: var(--space-md);
      border-bottom: 1px solid var(--color-rule-light);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      color: var(--color-ink);
    }
    .new-form-body {
      padding: var(--space-md);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .new-form-label {
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
      color: var(--color-ink-3);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 4px;
    }
    .new-form-field { display: flex; flex-direction: column; }
    .new-form-row {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: var(--space-sm);
    }
    .new-form-field input,
    .new-form-field select,
    .new-form-field textarea {
      font-family: var(--font-sans);
      font-size: 13px;
    }
    .new-form-field textarea {
      min-height: 120px;
      resize: vertical;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
    }
    .new-form-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md) var(--space-md);
    }
    .new-form-cancel {
      height: 28px;
      padding: 0 12px;
      border-radius: var(--radius-sm);
      font-family: var(--font-sans);
      font-size: 11px;
      color: var(--color-ink-3);
    }
    .new-form-cancel:hover { color: var(--color-ink-2); background: var(--color-chrome-mid); }
    .new-form-save {
      height: 28px;
      padding: 0 14px;
      border-radius: var(--radius-sm);
      background: var(--color-accent);
      color: var(--color-accent-ink);
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 500;
    }
    .new-form-save:hover { opacity: 0.9; }

    /* ── Kbd hint ── */
    .kbd-hint {
      position: fixed;
      bottom: 8px;
      right: 12px;
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--color-ink-4);
    }
  </style>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-title">Knowledge Base</span>
  <div class="sort-toggle" id="sortToggle" title="Toggle sort order">Newest</div>
  <div class="view-toggle" aria-label="View mode">
    <button class="view-toggle-btn view-toggle-btn--active" id="viewList" type="button">List</button>
    <button class="view-toggle-btn" id="viewGraph" type="button">Graph</button>
  </div>
  <span class="toolbar-spacer"></span>
  <select class="type-filter" id="typeFilter" title="Filter by type">
    <option value="">All types</option>
  </select>
  <div class="search-box">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="searchInput" type="search" placeholder="Search..." autocorrect="off" autocapitalize="off">
  </div>
  <button class="btn-new" id="btnNew">+ New</button>
</div>

<div class="tag-bar" id="tagBar"></div>

<div class="content" id="content">
  <div class="loading" id="loadingMsg">Loading...</div>
</div>

<!-- Detail overlay -->
<div class="overlay" id="overlay" style="display:none">
  <div class="detail" id="detail">
    <div class="detail-header">

      <span class="detail-spacer"></span>

<!-- New entry overlay -->
<div class="new-overlay" id="newOverlay" style="display:none">
  <div class="new-form">
    <div class="new-form-header">New Knowledge Entry</div>
    <div class="new-form-body">
      <div class="new-form-row">
        <div class="new-form-field">
          <label class="new-form-label">Type</label>
          <select id="newType">
            <option value="note">note</option>
            <option value="person">person</option>

            <option value="record">record</option>
          </select>

        <div class="new-form-field">

<div class="kbd-hint">/ search &middot; N new &middot; Esc close</div>

<script type="module">
import { runtime } from '/sdk/mim.js'

// ── State ──

let entries = []        // { id, title, type, summary, tags, links, extra, created, updated, body? }
let folderPresent = true
let searchQuery = ''
let activeTag = ''
let activeType = ''
let viewMode = 'list'
let sortMode = 'date'   // 'date' | 'alpha'
let openDetailId = null
let editMode = false
let showNewForm = false

// Normalize a server entity (knowledge.list item or knowledge.get result) into
// the flat shape the UI renders. `body` is present only after knowledge.get.
function normEntry(raw) {
  return {
    id: raw.id,
    title: raw.title || '',
    type: raw.type || 'note',
    summary: raw.summary || '',
    tags: Array.isArray(raw.tags) ? raw.tags : [],
    links: Array.isArray(raw.links) ? raw.links.map(normLink).filter(Boolean) : [],
    extra: raw.extra && typeof raw.extra === 'object' && !Array.isArray(raw.extra) ? raw.extra : {},
    created: raw.created || '',
    updated: raw.updated || '',
    body: typeof raw.body === 'string' ? raw.body : undefined,
  }
}

function normLink(link) {
  if (link && typeof link === 'object' && typeof link.rel === 'string' && typeof link.target === 'string') {
    return { rel: link.rel, target: link.target }
  }
  const parts = String(link || '').trim().split(/\s+/, 2)
  if (parts.length < 2) return null
  return { rel: parts[0], target: parts[1] }
}

// ── Simple Markdown renderer ──

function renderMarkdown(md) {
  if (!md) return '<p class="empty-content">No content.</p>'
  let html = escapeHtml(md)
    // Code blocks
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${code.trimEnd()}</code></pre>`)
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Headings
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // Bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Blockquotes
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    // Links
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, href) => `<a href="${escapeAttr(href)}" target="_blank">${label}</a>`)
    // Unordered lists
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
    // Ordered lists
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')

  // Wrap consecutive <li> in <ul>
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')

  // Paragraphs: split by double newlines
  html = html.split(/\n{2,}/).map(block => {
    block = block.trim()
    if (!block) return ''
    if (block.startsWith('<h') || block.startsWith('<pre') ||
        block.startsWith('<ul') || block.startsWith('<ol') ||
        block.startsWith('<blockquote')) return block
    return `<p>${block.replace(/\n/g, '<br>')}</p>`
  }).join('\n')

  return html
}

function escapeHtml(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/"/g, '&quot;')
}

// ── Data access (core tools via runtime SDK) ──

const LIST_PAGE_SIZE = 25

async function loadEntries() {
  const loaded = []
  let offset = 0
  let sawResult = false

  while (offset !== null) {
    const result = await runtime.call('knowledge.list', { limit: LIST_PAGE_SIZE, offset })
    sawResult = true
    if (result && result.folderPresent === false) {
      folderPresent = false
      entries = []
      return
    }

    const items = Array.isArray(result?.items) ? result.items : []
    loaded.push(...items.map(normEntry))

    if (typeof result?.nextOffset === 'number') {
      offset = result.nextOffset
    } else {
      offset = null
    }
  }

  folderPresent = sawResult
  entries = loaded
}

async function saveEntry(entry) {
  const result = await runtime.call('knowledge.update', {
    id: entry.id,
    title: entry.title,
    type: entry.type || 'note',
    summary: entry.summary || '',
    tags: entry.tags,
    links: (entry.links || []).map(link => `${link.rel} ${link.target}`),
    extra: entry.extra || {},
    body: entry.body || '',
  })
  if (result && result.folderPresent === false) { folderPresent = false; return }
  if (result && result.id) {
    const merged = normEntry(result)
    if (merged.body === undefined) merged.body = entry.body
    const idx = entries.findIndex(e => e.id === entry.id)
    if (idx !== -1) entries[idx] = merged
  }
}

async function createEntry(title, type, summary, tags, body) {
  const result = await runtime.call('knowledge.create', {
    title,
    type,
    summary,
    tags: tags.split(',').map(t => t.trim()).filter(Boolean),
    body,
  })
  if (!result || result.folderPresent === false) { folderPresent = false; render(); return null }
  const entry = normEntry(result)
  if (entry.body === undefined) entry.body = body
  entries.push(entry)
  return entry
}

async function deleteEntry(id) {
  const entry = entries.find(e => e.id === id)
  if (!entry) return
  await runtime.call('knowledge.delete', { id })
  entries = entries.filter(e => e.id !== id)
}

// Lazily fetch the full body for an entry (list items omit it).
async function ensureBody(entry) {
  if (typeof entry.body === 'string') return entry.body
  try {
    const full = await runtime.call('knowledge.get', { id: entry.id })
    Object.assign(entry, normEntry(full))
    entry.body = typeof full.body === 'string' ? full.body : ''
  } catch {
    entry.body = ''
  }
  return entry.body
}

// ── Filtering & Sorting ──

function getAllTags() {
  const set = new Set()
  entries.forEach(e => (e.tags || []).forEach(t => set.add(t)))
  return [...set].sort()
}

function getAllTypes() {
  const set = new Set()
  entries.forEach(e => set.add(e.type || 'note'))
  return [...set].sort()
}

function getFilteredEntries() {
  let result = [...entries]

  if (activeType) {
    result = result.filter(e => (e.type || 'note') === activeType)
  }

  // Tag filter
  if (activeTag) {
    result = result.filter(e => (e.tags || []).includes(activeTag))
  }

  // Search
  if (searchQuery) {
    const q = searchQuery.toLowerCase()
    result = result.filter(e =>
      (e.id || '').toLowerCase().includes(q) ||
      (e.title || '').toLowerCase().includes(q) ||
      (e.type || '').toLowerCase().includes(q) ||
      (e.summary || '').toLowerCase().includes(q) ||
      (e.tags || []).some(t => t.toLowerCase().includes(q)) ||
      (e.body || '').toLowerCase().includes(q)
    )
  }

  // Sort
  if (sortMode === 'date') {
    result.sort((a, b) => new Date(b.updated || b.created || 0) - new Date(a.updated || a.created || 0))
  } else {
    result.sort((a, b) => (a.title || '').localeCompare(b.title || ''))
  }

  return result
}

// ── Render ──

const contentEl = document.getElementById('content')
const tagBarEl = document.getElementById('tagBar')
const loadingEl = document.getElementById('loadingMsg')
const sortToggleEl = document.getElementById('sortToggle')
const typeFilterEl = document.getElementById('typeFilter')
const viewListEl = document.getElementById('viewList')
const viewGraphEl = document.getElementById('viewGraph')

function render() {
  if (!folderPresent) {
    tagBarEl.innerHTML = ''
    renderOffer()
    return
  }
  renderTagBar()
  renderTypeFilter()
  renderViewToggle()
  if (viewMode === 'graph') renderGraph()
  else renderCards()
  sortToggleEl.textContent = sortMode === 'date' ? 'Newest' : 'A-Z'
}

// Offer-not-block panel shown when the knowledge/ folder does not exist.
function renderOffer() {
  contentEl.innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">📚</div>
      <div class="empty-title">No knowledge/ folder yet</div>
      <div class="empty-sub">Knowledge entries live in a <code>knowledge/</code> folder in your workspace. Create it to start writing.</div>
      <button class="empty-btn" id="offerCreate">Create knowledge folder</button>
      <div class="empty-error" id="offerError" hidden></div>
    </div>
  `
  const btn = document.getElementById('offerCreate')
  const errEl = document.getElementById('offerError')
  if (btn) btn.addEventListener('click', async () => {
    btn.disabled = true
    if (errEl) errEl.hidden = true
    try {
      await runtime.call('app.enable', { app: 'knowledge' })
      await loadEntries()
      render()
    } catch (err) {
      console.warn('[knowledge] enable error:', err)
      if (errEl) {
        errEl.textContent = 'Could not create the knowledge folder: ' + (err && err.message ? err.message : String(err))
        errEl.hidden = false
      }
      btn.disabled = false
    }
  })
}

function renderTagBar() {
  const tags = getAllTags()
  if (tags.length === 0) {
    tagBarEl.innerHTML = ''
    return
  }
  tagBarEl.innerHTML = tags.map(t =>
    `<button class="tag-chip ${activeTag === t ? 'tag-chip--active' : ''}" data-tag="${escapeHtml(t)}">${escapeHtml(t)}</button>`
  ).join('')

  tagBarEl.querySelectorAll('.tag-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const tag = chip.dataset.tag
      activeTag = activeTag === tag ? '' : tag
      render()
    })
  })
}

function renderTypeFilter() {
  const types = getAllTypes()
  const options = ['<option value="">All types</option>']
  for (const type of types) {
    options.push(`<option value="${escapeHtml(type)}" ${activeType === type ? 'selected' : ''}>${escapeHtml(type)}</option>`)
  }
  typeFilterEl.innerHTML = options.join('')
}

function renderViewToggle() {
  viewListEl.classList.toggle('view-toggle-btn--active', viewMode === 'list')
  viewGraphEl.classList.toggle('view-toggle-btn--active', viewMode === 'graph')
}

function renderCards() {
  const filtered = getFilteredEntries()

  if (filtered.length === 0) {
    contentEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📚</div>
        <div class="empty-title">${searchQuery || activeTag || activeType ? 'No matching entries' : 'No knowledge entries yet'}</div>
        <div class="empty-sub">${searchQuery || activeTag || activeType
          ? 'Try different search terms or clear the filter.'
          : 'Create your first entry to start building your knowledge base.'}</div>
        ${!searchQuery && !activeTag && !activeType ? '<button class="empty-btn" id="emptyNewBtn">+ New Entry</button>' : ''}
      </div>
    `
    const emptyBtn = document.getElementById('emptyNewBtn')
    if (emptyBtn) emptyBtn.addEventListener('click', openNewForm)
    return
  }

  contentEl.innerHTML = `<div class="card-grid">${filtered.map(renderCardHTML).join('')}</div>`

  contentEl.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      openDetail(card.dataset.id)
    })
  })
}

function renderCardHTML(entry) {
  const excerpt = entry.summary || (entry.body || '').replace(/^#+\s+/gm, '').replace(/[*_`#>\-]/g, '').trim().slice(0, 100)
  const date = formatDate(entry.updated || entry.created)
  const tagsHtml = (entry.tags || []).slice(0, 4).map(t =>
    `<span class="card-tag">${escapeHtml(t)}</span>`
  ).join('')
  const typeLabel = entry.type && entry.type !== 'note'
    ? `<div class="card-type">${escapeHtml(entry.type)}</div>`
    : ''

  return `
    <div class="card" data-id="${entry.id}">
      ${typeLabel}
      <div class="card-title">${escapeHtml(entry.title || '(untitled)')}</div>
      ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
      ${excerpt ? `<div class="card-excerpt">${escapeHtml(excerpt)}</div>` : ''}
      <div class="card-date">${date}</div>
    </div>
  `
}

function renderGraph() {
  const filtered = getFilteredEntries()
  if (filtered.length === 0) {
    contentEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">Graph</div>
        <div class="empty-title">No graph nodes</div>
        <div class="empty-sub">Try different search terms or clear the filter.</div>
      </div>
    `
    return
  }

  const graph = buildGraph(filtered)
  contentEl.innerHTML = `
    <div class="graph-shell">
      <div class="graph-meta">${graph.nodes.length} nodes / ${graph.edges.length} links</div>
      <div class="graph-canvas">
        ${renderGraphSvg(graph)}
      </div>
    </div>
  `

  contentEl.querySelectorAll('.graph-node').forEach(node => {
    node.addEventListener('click', () => {
      const id = node.dataset.id
      if (id && entries.some(entry => entry.id === id)) openDetail(id)
    })
  })
}

function buildGraph(sourceEntries) {
  const nodesById = new Map(sourceEntries.map(entry => [entry.id, {
    id: entry.id,
    title: entry.title || entry.id,
    type: entry.type || 'note',
    missing: false,
  }]))
  const visibleIds = new Set(nodesById.keys())
  const edges = []

  for (const entry of sourceEntries) {
    for (const link of entry.links || []) {
      if (!visibleIds.has(link.target)) {
        const target = entries.find(e => e.id === link.target)
        if (!target) {
          nodesById.set(link.target, { id: link.target, title: link.target, type: 'missing', missing: true })
        } else if (!activeTag && !activeType && !searchQuery) {
          nodesById.set(target.id, { id: target.id, title: target.title || target.id, type: target.type || 'note', missing: false })
        }
      }
      if (nodesById.has(link.target)) edges.push({ source: entry.id, target: link.target, rel: link.rel, missing: !entries.some(e => e.id === link.target) })
    }
  }

  const nodes = [...nodesById.values()]
  layoutGraph(nodes, edges)
  return { nodes, edges }
}

function layoutGraph(nodes, edges) {
  const width = Math.max(contentEl.clientWidth - 32, 640)
  const height = Math.max(contentEl.clientHeight - 90, 520)
  const types = [...new Set(nodes.map(node => node.type))].sort()
  const typeIndex = new Map(types.map((type, index) => [type, index]))
  const radius = Math.min(width, height) * 0.32
  const cx = width / 2
  const cy = height / 2

  nodes.forEach((node, index) => {
    const typeAngle = ((typeIndex.get(node.type) || 0) / Math.max(types.length, 1)) * Math.PI * 2 - Math.PI / 2
    const jitter = (index / Math.max(nodes.length, 1)) * Math.PI * 2
    node.x = cx + Math.cos(typeAngle) * radius + Math.cos(jitter) * 35
    node.y = cy + Math.sin(typeAngle) * radius + Math.sin(jitter) * 35
    node.vx = 0
    node.vy = 0
  })

  const nodeMap = new Map(nodes.map(node => [node.id, node]))
  for (let step = 0; step < 120; step++) {
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i]
        const b = nodes[j]
        let dx = b.x - a.x
        let dy = b.y - a.y
        let d2 = dx * dx + dy * dy
        if (d2 < 1) { dx = 1; dy = 0; d2 = 1 }
        const force = 520 / d2
        a.vx -= dx * force
        a.vy -= dy * force
        b.vx += dx * force
        b.vy += dy * force
      }
    }

    for (const edge of edges) {
      const source = nodeMap.get(edge.source)
      const target = nodeMap.get(edge.target)
      if (!source || !target) continue
      const dx = target.x - source.x
      const dy = target.y - source.y
      const dist = Math.max(Math.sqrt(dx * dx + dy * dy), 1)
      const force = (dist - 135) * 0.012
      const fx = dx / dist * force
      const fy = dy / dist * force
      source.vx += fx
      source.vy += fy
      target.vx -= fx
      target.vy -= fy
    }

    for (const node of nodes) {
      const typeAngle = ((typeIndex.get(node.type) || 0) / Math.max(types.length, 1)) * Math.PI * 2 - Math.PI / 2
      const tx = cx + Math.cos(typeAngle) * radius
      const ty = cy + Math.sin(typeAngle) * radius
      node.vx += (tx - node.x) * 0.006
      node.vy += (ty - node.y) * 0.006
      node.x = clamp(node.x + node.vx, 70, width - 90)
      node.y = clamp(node.y + node.vy, 45, height - 45)
      node.vx *= 0.82
      node.vy *= 0.82
    }
  }

  nodes.width = width
  nodes.height = height
}

function renderGraphSvg(graph) {
  const width = graph.nodes.width || 800
  const height = graph.nodes.height || 520
  const nodeMap = new Map(graph.nodes.map(node => [node.id, node]))
  const edges = graph.edges.map(edge => {
    const source = nodeMap.get(edge.source)
    const target = nodeMap.get(edge.target)
    if (!source || !target) return ''
    return `<line class="graph-edge ${edge.missing ? 'graph-edge--missing' : ''}" x1="${source.x.toFixed(1)}" y1="${source.y.toFixed(1)}" x2="${target.x.toFixed(1)}" y2="${target.y.toFixed(1)}"><title>${escapeHtml(edge.rel)}</title></line>`
  }).join('')
  const nodes = graph.nodes.map(node => `
    <g class="graph-node" data-id="${escapeHtml(node.id)}" transform="translate(${node.x.toFixed(1)} ${node.y.toFixed(1)})">
      <circle r="${node.missing ? 6 : 8}" fill="${graphColor(node.type)}"></circle>
      <text x="12" y="-1">${escapeHtml(shortLabel(node.title, 28))}</text>
      <text class="graph-node-type" x="12" y="11">${escapeHtml(node.type)}</text>
      <title>${escapeHtml(node.id)}</title>
    </g>
  `).join('')
  return `<svg class="graph-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="Knowledge graph">${edges}${nodes}</svg>`
}

function graphColor(type) {
  const palette = {
    person: 'var(--color-accent)',
    org: 'var(--color-ink-2)',
    project: 'var(--color-ink)',
    record: 'var(--color-rem)',
    missing: 'var(--color-ink-4)',
    note: 'var(--color-ink-3)',
  }
  return palette[type] || 'var(--color-ink-3)'
}

function shortLabel(value, max) {
  const text = String(value || '')
  return text.length > max ? text.slice(0, max - 3) + '...' : text
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value))
}

// ── Detail View ──

const overlayEl = document.getElementById('overlay')
const detailEl = document.getElementById('detail')
const detailTitleEl = document.getElementById('detailTitle')
const detailTagsEl = document.getElementById('detailTags')
const detailTypeEl = document.getElementById('detailType')
const detailSummaryEl = document.getElementById('detailSummary')
const detailBodyEl = document.getElementById('detailBody')
const detailDateEl = document.getElementById('detailDate')
const detailEditBtn = document.getElementById('detailEditBtn')
const detailDeleteBtn = document.getElementById('detailDeleteBtn')
const detailOpenBtn = document.getElementById('detailOpenBtn')

async function openDetail(id) {
  const entry = entries.find(e => e.id === id)
  if (!entry) return
  openDetailId = id
  editMode = false
  detailTitleEl.value = entry.title || ''
  detailTagsEl.value = (entry.tags || []).join(', ')
  detailTypeEl.value = entry.type || 'note'
  detailSummaryEl.value = entry.summary || ''
  renderDetailBody(entry)
  detailDateEl.textContent = entry.created ? 'Created ' + formatDate(entry.created) : ''
  detailEditBtn.textContent = 'Edit'
  detailEditBtn.classList.remove('detail-edit-btn--active')
  overlayEl.style.display = 'flex'
  detailTitleEl.focus()
  // Body is omitted from list items; fetch it lazily then re-render the view.
  await ensureBody(entry)
  detailTypeEl.value = entry.type || 'note'
  detailSummaryEl.value = entry.summary || ''
  if (openDetailId === id && !editMode) renderDetailBody(entry)
}

function renderDetailBody(entry) {
  if (editMode) {
    detailBodyEl.innerHTML = `<textarea class="detail-textarea" id="detailTextarea" placeholder="Write markdown...">${escapeHtml(entry.body || '')}</textarea>`
  } else {
    detailBodyEl.innerHTML = `
      <div class="detail-body-view">${renderMarkdown(entry.body)}</div>
      ${renderDetailLinks(entry)}
    `
    bindDetailLinks()
  }
}

function renderDetailLinks(entry) {
  const links = entry.links || []
  if (links.length === 0) return ''
  const items = links.map(link => {
    const target = entries.find(e => e.id === link.target)
    const title = target ? (target.title || target.id) : `${link.target} (missing)`
    return `
      <button class="detail-link-item" data-id="${escapeHtml(link.target)}" ${target ? '' : 'disabled'}>
        <span class="detail-link-rel">${escapeHtml(link.rel)}</span>
        <span class="detail-link-title">${escapeHtml(title)}</span>
      </button>
    `
  }).join('')
  return `
    <div class="detail-links">
      <span class="detail-links-label">Links</span>
      <div class="detail-links-list">${items}</div>
    </div>
  `
}

function bindDetailLinks() {
  detailBodyEl.querySelectorAll('.detail-link-item').forEach(button => {
    button.addEventListener('click', () => {
      const id = button.dataset.id
      if (id) openDetail(id)
    })
  })
}

function closeDetail() {
  if (openDetailId) saveDetailChanges()
  openDetailId = null
  editMode = false
  overlayEl.style.display = 'none'
  render()
}

function saveDetailChanges() {
  const entry = entries.find(e => e.id === openDetailId)
  if (!entry) return
  entry.title = detailTitleEl.value.trim() || entry.title
  entry.type = detailTypeEl.value || 'note'
  entry.summary = detailSummaryEl.value.trim()
  entry.tags = detailTagsEl.value.split(',').map(t => t.trim()).filter(Boolean)
  if (editMode) {
    const textarea = document.getElementById('detailTextarea')
    if (textarea) entry.body = textarea.value
  }
  saveEntry(entry)
}

// Toggle edit mode
detailEditBtn.addEventListener('click', () => {
  const entry = entries.find(e => e.id === openDetailId)
  if (!entry) return

  if (editMode) {
    // Save and switch to view
    const textarea = document.getElementById('detailTextarea')
    if (textarea) entry.body = textarea.value
    editMode = false
    detailEditBtn.textContent = 'Edit'
    detailEditBtn.classList.remove('detail-edit-btn--active')
    saveEntry(entry)
  } else {
    // Switch to edit
    editMode = true
    detailEditBtn.textContent = 'Done'
    detailEditBtn.classList.add('detail-edit-btn--active')
  }
  renderDetailBody(entry)
})

// Delete
detailDeleteBtn.addEventListener('click', async () => {
  const id = openDetailId
  if (!id) return
  openDetailId = null
  overlayEl.style.display = 'none'
  await deleteEntry(id)
  render()
})

// Open in editor. Knowledge files live at {workspace}/knowledge/{id}.md.
detailOpenBtn.addEventListener('click', () => {
  const entry = entries.find(e => e.id === openDetailId)
  if (!entry) return
  runtime.call('editor.open', { path: `knowledge/${entry.id}.md` })
})

// Close on overlay click
overlayEl.addEventListener('click', (e) => {
  if (e.target === overlayEl) closeDetail()
})

// Save on title/tags blur
detailTitleEl.addEventListener('blur', () => {
  if (openDetailId) saveDetailChanges()
})
detailTagsEl.addEventListener('blur', () => {
  if (openDetailId) saveDetailChanges()
})
detailTypeEl.addEventListener('change', () => {
  if (openDetailId) saveDetailChanges()
})
detailSummaryEl.addEventListener('blur', () => {
  if (openDetailId) saveDetailChanges()
})

// ── New Entry Form ──

const newOverlayEl = document.getElementById('newOverlay')
const newTypeEl = document.getElementById('newType')
const newTitleEl = document.getElementById('newTitle')
const newTagsEl = document.getElementById('newTags')
const newSummaryEl = document.getElementById('newSummary')
const newBodyEl = document.getElementById('newBody')

function openNewForm() {
  showNewForm = true
  newTypeEl.value = activeType || 'note'
  newTitleEl.value = ''
  newTagsEl.value = ''
  newSummaryEl.value = ''
  newBodyEl.value = ''
  newOverlayEl.style.display = 'flex'
  requestAnimationFrame(() => newTitleEl.focus())
}

function closeNewForm() {
  showNewForm = false
  newOverlayEl.style.display = 'none'
}

document.getElementById('btnNew').addEventListener('click', openNewForm)

document.getElementById('newCancel').addEventListener('click', closeNewForm)

document.getElementById('newSave').addEventListener('click', async () => {
  const title = newTitleEl.value.trim()
  if (!title) { newTitleEl.focus(); return }
  const entry = await createEntry(title, newTypeEl.value || 'note', newSummaryEl.value.trim(), newTagsEl.value, newBodyEl.value)
  closeNewForm()
  render()
  if (entry) openDetail(entry.id)
})

newOverlayEl.addEventListener('click', (e) => {
  if (e.target === newOverlayEl) closeNewForm()
})

// Enter in title field submits new form
newTitleEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault()
    document.getElementById('newSave').click()
  }
})

// ── Sort Toggle ──

sortToggleEl.addEventListener('click', () => {
  sortMode = sortMode === 'date' ? 'alpha' : 'date'
  render()
})

viewListEl.addEventListener('click', () => {
  viewMode = 'list'
  render()
})

viewGraphEl.addEventListener('click', () => {
  viewMode = 'graph'
  render()
})

typeFilterEl.addEventListener('change', (e) => {
  activeType = e.target.value
  render()
})

// ── Search ──

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value
  render()
})

// ── Keyboard Shortcuts ──

document.addEventListener('keydown', (e) => {
  // Don't capture if inside an input/textarea
  const tag = document.activeElement?.tagName
  const isInput = tag === 'INPUT' || tag === 'TEXTAREA'

  if (e.key === 'Escape') {
    if (openDetailId) { closeDetail(); return }
    if (showNewForm) { closeNewForm(); return }
    if (isInput) { document.activeElement.blur(); return }
  }

  if (isInput) return

  if (e.key === '/') {
    e.preventDefault()
    document.getElementById('searchInput').focus()
  }
  if (e.key === 'n' || e.key === 'N') {
    e.preventDefault()
    openNewForm()
  }
})

// ── Helpers ──

function formatDate(isoStr) {
  try {
    const d = new Date(isoStr)
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
  } catch { return '' }
}

// ── Init ──

async function init() {
  try {
    await loadEntries()
  } catch (err) {
    console.warn('[knowledge] init error:', err)
  }
  loadingEl.remove()
  render()
}

// Reload when workspace changes
runtime.on('workspace:changed', async () => {
  entries = []
  activeTag = ''
  activeType = ''
  searchQuery = ''
  openDetailId = null
  overlayEl.style.display = 'none'
  newOverlayEl.style.display = 'none'
  contentEl.innerHTML = ''
  const loader = document.createElement('div')
  loader.className = 'loading'
  loader.textContent = 'Loading...'
  contentEl.appendChild(loader)
  try {
    await loadEntries()
  } catch (err) {
    console.warn('[knowledge] reload error:', err)
  }
  loader.remove()
  render()
})

// Reload when a core app is enabled/disabled elsewhere (mim.yaml flag changed; enable also creates the folder).
runtime.on('apps:changed', async () => {
  try {
    await loadEntries()
  } catch (err) {
    console.warn('[knowledge] apps:changed reload error:', err)
  }
  render()
})

init()
</script>
</body>
</html>
