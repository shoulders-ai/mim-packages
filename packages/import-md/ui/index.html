<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/sdk/tokens.css">
  <title>Import to Markdown</title>
  <style>
    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      background:
        linear-gradient(180deg, rgba(249, 248, 245, 0.96), rgba(255, 255, 255, 0.98) 46%),
        var(--color-surface);
      color: var(--color-ink);
      font-family: var(--font-sans);
      font-size: 12px;
    }

    button,
    input {
      font: inherit;
    }

    button {
      height: 28px;
      border: 1px solid var(--color-rule-light);
      border-radius: var(--radius-sm);
      background: var(--color-chrome-high);
      color: var(--color-ink-2);
      padding: 0 10px;
      cursor: default;
      white-space: nowrap;
    }

    button:hover:not(:disabled) {
      border-color: var(--color-rule);
      background: var(--color-chrome-mid);
      color: var(--color-ink);
    }

    button:disabled {
      opacity: 0.46;
    }

    .primary {
      min-width: 92px;
      border-color: var(--color-accent);
      background: var(--color-accent);
      color: var(--color-accent-ink);
      font-weight: 650;
    }

    .primary:hover:not(:disabled) {
      background: #ad4f31;
      color: var(--color-accent-ink);
    }

    .ghost {
      background: transparent;
    }

    .topbar {
      height: 46px;
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      padding: 0 18px;
      border-bottom: 1px solid var(--color-rule-light);
      background: rgba(249, 248, 245, 0.9);
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .mark {
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      border: 1px solid var(--color-rule);
      border-radius: var(--radius-sm);
      background: var(--color-surface);
      color: var(--color-accent);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .title-block {
      min-width: 0;
      display: grid;
      gap: 1px;
    }

    .title {
      color: var(--color-ink);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
    }

    .scope {
      color: var(--color-ink-3);
      font-family: var(--font-mono);
      font-size: 10px;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .state-pill {
      min-width: 0;
      height: 24px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--color-rule-light);
      border-radius: 999px;
      background: var(--color-surface);
      color: var(--color-ink-3);
      padding: 0 9px;
      font-size: 11px;
      line-height: 1;
      white-space: nowrap;
    }

    .dot {
      width: 6px;
      height: 6px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--color-ink-4);
    }

    .dot.running {
      background: var(--color-accent);
    }

    .dot.done {
      background: var(--color-add);
    }

    .dot.fail {
      background: var(--color-rem);
    }

    .layout {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(420px, 1fr) minmax(320px, 390px);
    }

    .launcher {
      min-width: 0;
      min-height: 0;
      display: grid;
      align-content: start;
      gap: 18px;
      padding: 24px;
      overflow: auto;
    }

    .rail {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--color-rule-light);
      background: rgba(243, 241, 236, 0.64);
    }

    .panel-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--color-rule-light);
      padding-bottom: 10px;
    }

    .panel-title h1,
    .panel-title h2 {
      margin: 0;
      color: var(--color-ink);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.15;
    }

    .panel-title h2 {
      font-size: 12px;
      text-transform: uppercase;
    }

    .micro {
      color: var(--color-ink-3);
      font-family: var(--font-mono);
      font-size: 10px;
      line-height: 1.4;
      text-align: right;
      white-space: nowrap;
    }

    .form {
      max-width: 760px;
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--color-ink-3);
      font-size: 11px;
    }

    .label-row label {
      color: var(--color-ink-2);
      font-weight: 650;
    }

    .field-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .input {
      width: 100%;
      min-width: 0;
      height: 34px;
      border: 1px solid var(--color-rule-light);
      border-radius: var(--radius-sm);
      background: var(--color-surface);
      color: var(--color-ink);
      padding: 0 10px;
      outline: none;
      box-shadow: inset 0 0 0 1px transparent;
    }

    .input:focus {
      border-color: rgba(192, 93, 60, 0.64);
      box-shadow: inset 0 0 0 1px rgba(192, 93, 60, 0.16);
    }

    .limits {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      border-top: 1px solid var(--color-rule-light);
      border-bottom: 1px solid var(--color-rule-light);
      padding: 10px 0;
    }

    .limit {
      display: grid;
      grid-template-columns: auto minmax(56px, 1fr);
      align-items: center;
      gap: 8px;
      color: var(--color-ink-3);
      font-size: 11px;
    }

    .limit input {
      height: 28px;
      text-align: right;
      font-family: var(--font-mono);
      font-size: 11px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .feedback {
      min-height: 18px;
      color: var(--color-ink-3);
      font-family: var(--font-mono);
      font-size: 10px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .rail-head {
      flex: 0 0 auto;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 12px 0 14px;
      border-bottom: 1px solid var(--color-rule-light);
      background: rgba(249, 248, 245, 0.76);
    }

    .rail-head h2 {
      margin: 0;
      color: var(--color-ink-2);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .activity-list {
      min-height: 0;
      display: grid;
      align-content: start;
      gap: 1px;
      padding: 8px;
      overflow: auto;
    }

    .activity-row {
      width: 100%;
      height: auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      border: 0;
      border-radius: var(--radius-sm);
      background: transparent;
      padding: 9px 8px;
      text-align: left;
    }

    .activity-row:hover {
      background: var(--color-chrome-high);
    }

    .activity-main {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .activity-title {
      min-width: 0;
      color: var(--color-ink-2);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .activity-meta {
      min-width: 0;
      display: flex;
      gap: 8px;
      color: var(--color-ink-3);
      font-family: var(--font-mono);
      font-size: 10px;
      overflow: hidden;
      white-space: nowrap;
    }

    .activity-meta span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty {
      min-height: 120px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--color-rule);
      border-radius: var(--radius-sm);
      color: var(--color-ink-3);
      background: rgba(255, 255, 255, 0.52);
      padding: 18px;
      text-align: center;
    }

    @media (max-width: 820px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .rail {
        border-left: 0;
        border-top: 1px solid var(--color-rule-light);
      }

      .launcher {
        padding: 18px;
      }

      .limits {
        grid-template-columns: 1fr;
      }

    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="mark">MD</div>
      <div class="title-block">
        <div class="title">Import to Markdown</div>
        <div class="scope">DOCX XLSX XLSM PDF BIB</div>
      </div>
    </div>
    <div class="state-pill"><span id="state-dot" class="dot"></span><span id="state-text">Ready</span></div>
  </header>

  <main class="layout">
    <section class="launcher" aria-label="Import launcher">
      <div class="panel-title">
        <h1>New import</h1>
        <div class="micro">Workspace</div>
      </div>

      <div class="form">
        <div class="field">
          <div class="label-row">
            <label for="source">Source file</label>
            <span id="source-hint">Workspace path</span>
          </div>
          <div class="field-row">
            <input id="source" class="input" spellcheck="false" autocomplete="off" placeholder="reports/source.docx">
            <button id="pick">Pick</button>
          </div>
        </div>

        <div class="field">
          <div class="label-row">
            <label for="output">Markdown output</label>
            <span>Optional</span>
          </div>
          <input id="output" class="input" spellcheck="false" autocomplete="off" placeholder="imports/source.md">
        </div>

        <div class="limits" aria-label="Import limits">
          <label class="limit" for="max-rows">
            <span>Rows</span>
            <input id="max-rows" class="input" type="number" min="1" max="5000" value="1000">
          </label>
          <label class="limit" for="max-cols">
            <span>Columns</span>
            <input id="max-cols" class="input" type="number" min="1" max="120" value="60">
          </label>
          <label class="limit" for="max-pages">
            <span>Pages</span>
            <input id="max-pages" class="input" type="number" min="1" max="500" value="150">
          </label>
        </div>

        <div class="actions">
          <button id="import" class="primary">Import</button>
          <button id="open-source" class="ghost">Open source</button>
        </div>
        <div id="feedback" class="feedback"></div>
      </div>
    </section>

    <aside class="rail" aria-label="Recent imports">
      <div class="rail-head">
        <h2>Recent imports</h2>
        <button id="refresh" class="ghost">Refresh</button>
      </div>
      <div id="recent" class="activity-list"></div>
    </aside>
  </main>

  <script type="module">
    import { runtime } from '/sdk/mim.js'

    const el = {
      source: document.getElementById('source'),
      output: document.getElementById('output'),
      pick: document.getElementById('pick'),
      import: document.getElementById('import'),
      openSource: document.getElementById('open-source'),
      refresh: document.getElementById('refresh'),
      recent: document.getElementById('recent'),
      feedback: document.getElementById('feedback'),
      stateDot: document.getElementById('state-dot'),
      stateText: document.getElementById('state-text'),
      maxRows: document.getElementById('max-rows'),
      maxCols: document.getElementById('max-cols'),
      maxPages: document.getElementById('max-pages'),
    }

    const DEFAULT_LIMITS = {
      rows: '1000',
      cols: '60',
      pages: '150',
    }

    function setState(label, kind = '') {
      el.stateText.textContent = label
      el.stateDot.className = `dot ${kind}`.trim()
    }

    function setControlsDisabled(disabled) {
      el.import.disabled = disabled
      el.pick.disabled = disabled
      el.refresh.disabled = disabled
    }

    function resetLauncher() {
      el.source.value = ''
      el.output.value = ''
      el.maxRows.value = DEFAULT_LIMITS.rows
      el.maxCols.value = DEFAULT_LIMITS.cols
      el.maxPages.value = DEFAULT_LIMITS.pages
      el.openSource.disabled = true
      setControlsDisabled(false)
      setState('Ready')
    }

    function defaultOutputFor(path) {
      const name = String(path || '').split('/').pop() || 'document'
      const dot = name.lastIndexOf('.')
      const stem = dot > 0 ? name.slice(0, dot) : name
      return `imports/${stem}.md`
    }

    function displayName(path) {
      return String(path || '').split('/').filter(Boolean).pop() || String(path || '')
    }

    function numericValue(input) {
      const value = Number(input.value)
      return Number.isFinite(value) && value > 0 ? value : undefined
    }

    function importParams() {
      const path = el.source.value.trim()
      if (!path) throw new Error('Choose a source file.')
      const output = el.output.value.trim()
      return {
        path,
        ...(output ? { output_path: output } : {}),
        max_rows: numericValue(el.maxRows),
        max_cols: numericValue(el.maxCols),
        max_pages: numericValue(el.maxPages),
      }
    }

    function runStatusKind(status) {
      if (status === 'completed') return 'done'
      if (status === 'failed' || status === 'cancelled') return 'fail'
      return 'running'
    }

    function runFormat(run) {
      const format = run.result?.format
      if (format) return String(format).toUpperCase()
      const path = run.inputs?.path || ''
      const ext = String(path).split('.').pop()
      return ext ? ext.toUpperCase() : ''
    }

    async function loadRecent() {
      const result = await runtime.jobs.list()
      const runs = (result?.runs || result || [])
        .filter(run => run.jobId === 'importMarkdown')
        .slice(0, 12)

      if (runs.length === 0) {
        el.recent.innerHTML = '<div class="empty">No imports yet.</div>'
        return
      }

      el.recent.innerHTML = runs.map(run => {
        const output = run.result?.outputPath || run.inputs?.output_path || defaultOutputFor(run.inputs?.path || '')
        const source = run.result?.sourcePath || run.inputs?.path || ''
        const status = run.status || 'queued'
        return `
          <button class="activity-row" data-run="${escapeHtml(run.runId)}">
            <span class="activity-main">
              <span class="activity-title">${escapeHtml(displayName(output))}</span>
              <span class="activity-meta">
                <span>${escapeHtml(status)}</span>
                <span>${escapeHtml(source)}</span>
              </span>
            </span>
            <span class="state-pill"><span class="dot ${runStatusKind(status)}"></span>${escapeHtml(runFormat(run))}</span>
          </button>
        `
      }).join('')
    }

    async function startImport() {
      const params = importParams()
      setControlsDisabled(true)
      setState('Starting', 'running')
      el.feedback.textContent = ''

      const run = await runtime.jobs.start('importMarkdown', params)
      el.feedback.textContent = `Started ${displayName(params.path)} as ${run.runId}.`
      resetLauncher()
      await loadRecent()
    }

    el.pick.addEventListener('click', async () => {
      try {
        setState('Picking', 'running')
        const picked = await runtime.call('documents.pickImportFile', {})
        if (!picked?.cancelled && picked?.path) {
          el.source.value = picked.path
          el.output.value = defaultOutputFor(picked.path)
          el.openSource.disabled = false
          el.feedback.textContent = picked.copied ? `Copied to ${picked.path}.` : picked.path
        }
        setState('Ready')
      } catch (err) {
        setState('Failed', 'fail')
        el.feedback.textContent = err.message
      }
    })

    el.source.addEventListener('input', () => {
      const source = el.source.value.trim()
      el.openSource.disabled = !source
      if (source && !el.output.value.trim()) el.output.value = defaultOutputFor(source)
    })

    el.import.addEventListener('click', async () => {
      try {
        await startImport()
      } catch (err) {
        setControlsDisabled(false)
        setState('Failed', 'fail')
        el.feedback.textContent = err.message
      }
    })

    el.openSource.addEventListener('click', async () => {
      const path = el.source.value.trim()
      if (!path) return
      await runtime.call('fs.openNative', { path })
    })

    el.refresh.addEventListener('click', async () => {
      setState('Refreshing', 'running')
      try {
        await loadRecent()
        setState('Ready')
      } catch (err) {
        setState('Failed', 'fail')
        el.feedback.textContent = err.message
      }
    })

    el.recent.addEventListener('click', async event => {
      const row = event.target.closest('[data-run]')
      if (!row) return
      await runtime.workbench.openRun(row.dataset.run)
    })

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
    }

    resetLauncher()
    runtime.ready
      .then(loadRecent)
      .catch(err => {
        setState('Failed', 'fail')
        el.feedback.textContent = err.message
      })
  </script>
</body>
</html>
